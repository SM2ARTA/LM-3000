<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ML3K — FA Goods</title>
<link rel="icon" type="image/svg+xml" href="ml3k-favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script async src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1"></script>
<style>
:root{--bg:#F4F5F7;--sf:#FFF;--bd:#E2E4E9;--bl:#EDEEF1;--tp:#111318;--ts:#60646C;--tt:#9CA0AA;--ac:#CF5D5D;--as:#FDF0F0;--ab:#E8A5A5;--gn:#12804A;--gs:#E6F5ED;--or:#C4550A;--os:#FEF3EB;--rd:#C62A2F;--rs:#FDEBED;--pu:#6E3FF3;--ps:#F0EBFE;--fd:'DM Sans',system-ui,sans-serif;--fm:'IBM Plex Mono',monospace;--r:10px;--cy:#0891B2;--cs:#ECFEFF}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fd);background:var(--bg);color:var(--tp);font-size:13px;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.mono{font-family:var(--fm)}
.fw6{font-weight:600}
.hd{background:var(--sf);border-bottom:1px solid var(--bd);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hl{display:flex;align-items:center;gap:10px}
.main{flex:1;overflow:hidden;padding:20px;padding-bottom:44px;display:flex;flex-direction:column}

/* Badges */
.bg{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;white-space:nowrap}
.bg-bl{background:var(--as);color:var(--ac)}.bg-gn{background:var(--gs);color:var(--gn)}.bg-or{background:var(--os);color:var(--or)}.bg-rd{background:var(--rs);color:var(--rd)}.bg-pu{background:var(--ps);color:var(--pu)}.bg-gy{background:#F0F1F3;color:var(--tt)}.bg-cy{background:var(--cs);color:var(--cy)}

/* Buttons */
.rbtn{padding:5px 12px;font-size:11px;border-radius:6px;border:1px solid var(--bd);cursor:pointer;font-family:var(--fd);font-weight:600;background:var(--sf);color:var(--tp);transition:all .15s}
.rbtn:hover{box-shadow:0 2px 6px rgba(0,0,0,.08)}
.mbtn{padding:9px 22px;font-size:12px;font-weight:700;border-radius:8px;border:1px solid var(--bd);cursor:pointer;font-family:var(--fd);background:var(--sf);color:var(--tp);transition:all .15s}
.mbtn-primary{background:var(--ac);color:#fff;border-color:var(--ac)}
.mbtn-danger{background:var(--rd);color:#fff;border-color:var(--rd)}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--bd);margin-bottom:16px}
.tab{padding:8px 20px;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--ts);transition:all .15s}
.tab:hover{color:var(--tp)}
.tab.act{color:var(--ac);border-bottom-color:var(--ac)}
.tab-panel{display:none}.tab-panel.vis{display:flex;flex-direction:column;flex:1;min-height:0}

/* Cards */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}

/* Tables */
.dtb{width:100%;border-collapse:collapse;font-size:12px}
.dtb th{text-align:left;padding:8px 10px;font-weight:600;color:var(--ts);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--bd);background:var(--bg)}
.dtb td{padding:7px 10px;border-bottom:1px solid var(--bl)}
.dtb tr:hover{background:#FAFBFC}

/* KPI cards */
.kpi-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.kpi{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:12px 16px;min-width:120px}
.kpi .kl{font-size:10px;color:var(--ts);margin-bottom:4px}
.kpi .kv{font-size:22px;font-weight:700;font-family:var(--fm)}

/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--sf);border-radius:12px;max-width:640px;width:90%;max-height:85vh;overflow-y:auto;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:16px;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* Form elements */
input[type=text],input[type=number],input[type=date],select{padding:6px 10px;font-size:12px;font-family:var(--fd);border:1px solid var(--bd);border-radius:6px;outline:none;transition:border .15s}
input:focus,select:focus{border-color:var(--ac)}
.form-row{display:flex;gap:10px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.form-label{font-size:11px;font-weight:600;color:var(--ts);min-width:60px}

/* Search/lookup */
.lookup-wrap{position:relative}
.lookup-results{position:absolute;top:100%;left:0;right:0;max-height:240px;overflow-y:auto;background:var(--sf);border:1px solid var(--bd);border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:50;display:none}
.lookup-results.vis{display:block}
.lookup-item{padding:6px 10px;cursor:pointer;font-size:11px;display:flex;gap:8px;align-items:center}
.lookup-item:hover{background:var(--bg)}
.lookup-item .sku{font-family:var(--fm);font-weight:600;min-width:120px}
.lookup-item .nm{color:var(--ts);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Shipment cards */
.ship-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .2s}
.ship-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.06)}

/* Status badges */
.st-draft{background:#F0F1F3;color:var(--tt)}
.st-oor{background:var(--os);color:var(--or)}
.st-packed{background:var(--ps);color:var(--pu)}
.st-shipped{background:var(--cs);color:var(--cy)}
.st-delivered{background:var(--gs);color:var(--gn)}

/* Bottom bar */
#fa-bar{position:fixed;bottom:0;left:0;right:0;height:44px;background:var(--sf);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:8px;z-index:65}

/* Supabase status */
.sb-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.sb-ok{background:var(--gn)}.sb-err{background:var(--rd)}.sb-chk{background:var(--or)}

/* Responsive */
@media(max-width:768px){.hd{padding:8px 12px;flex-wrap:wrap;gap:8px}.main{padding:12px}.kpi-row{gap:8px}.kpi{min-width:90px;padding:8px 10px}.kpi .kv{font-size:18px}}
body.viewer .fa-admin{display:none!important}
</style>
</head>
<body>

<!-- Header -->
<div class="hd">
  <div class="hl">
    <div style="width:28px;height:28px;background:var(--ac);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700">FA</div>
    <div>
      <div style="font-size:14px;font-weight:700">FA Goods
        <span id="faRoleBadge"></span>
        <span id="sbStatus" style="font-size:10px;font-weight:500;color:var(--tt)"><span class="sb-dot sb-chk"></span>Connecting...</span>
      </div>
      <div style="font-size:10px;color:var(--tt)" id="hdrSummary">No data loaded</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <button class="rbtn" onclick="FA_sync()" title="Refresh from server" style="background:var(--gs);color:var(--gn);border-color:#B8DFCA">⟳ Sync</button>
    <button class="rbtn" onclick="window.open('/','_self')" style="background:var(--as);color:var(--ac);border-color:var(--ab)">← ML3K</button>
  </div>
</div>

<!-- Tabs -->
<div style="padding:12px 20px 0;background:var(--sf);flex-shrink:0">
  <div class="tabs" id="faTabs">
    <div class="tab act" onclick="FA_tab('nom')">📋 Nomenclature</div>
    <div class="tab" onclick="FA_tab('demand')">📦 Demand</div>
    <div class="tab" onclick="FA_tab('groups')">📐 Delivery Groups</div>
  </div>
</div>

<!-- Tab panels -->
<div class="main" id="faMain">
  <!-- NOM tab -->
  <div class="tab-panel vis" id="pNom">
    <div class="card" style="flex:1;display:flex;flex-direction:column;min-height:0">
      <div class="card-hd">
        <div>
          <span style="font-weight:700;font-size:14px">FA Nomenclature</span>
          <span class="bg bg-gy" id="nomCount">0 SKUs</span>
        </div>
        <div style="display:flex;gap:6px">
          <input type="file" id="nomFileInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="FA_parseNom(this.files[0]);this.value=''">
          <button class="rbtn fa-admin" onclick="document.getElementById('nomFileInput').click()" style="background:var(--as);color:var(--ac);border-color:var(--ab)">📎 Upload NOM</button>
          <button class="rbtn fa-admin" onclick="FA_addNomManual()" style="background:var(--gs);color:var(--gn);border-color:#B8DFCA">+ Add SKU</button>
          <button class="rbtn fa-admin" onclick="FA_clearNom()" style="background:var(--rs);color:var(--rd);border-color:#F5C6C7">✕ Clear</button>
        </div>
      </div>
      <input type="text" id="nomSearch" placeholder="Search SKU or name..." oninput="FA_filterNom()" style="width:100%;margin-bottom:8px">
      <div id="nomTable" style="flex:1;overflow-y:auto"></div>
    </div>
  </div>

  <!-- Demand tab -->
  <div class="tab-panel" id="pDemand">
    <div class="kpi-row" id="demKpis"></div>
    <div class="card" style="flex:1;display:flex;flex-direction:column;min-height:0">
      <div class="card-hd">
        <div>
          <span style="font-weight:700;font-size:14px">FA Demand</span>
          <span class="bg bg-gy" id="demCount">0 items</span>
        </div>
        <div style="display:flex;gap:6px">
          <button class="rbtn fa-admin" onclick="FA_showPasteDemand()" style="background:var(--cs);color:var(--cy);border-color:#A5F3FC">📋 Paste</button>
          <button class="rbtn fa-admin" onclick="FA_showAddDemand()" style="background:var(--gs);color:var(--gn);border-color:#B8DFCA">+ Add</button>
          <button class="rbtn fa-admin" onclick="FA_clearDemand()" style="background:var(--rs);color:var(--rd);border-color:#F5C6C7">✕ Clear</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <input type="text" id="demSearch" placeholder="Search SKU, name, venue..." oninput="FA_filterDem()" style="flex:1;min-width:200px">
        <select id="demVenueFilter" onchange="FA_filterDem()" style="min-width:140px"><option value="">All Venues</option></select>
        <select id="demStatusFilter" onchange="FA_filterDem()" style="min-width:120px">
          <option value="">All</option>
          <option value="assigned">Grouped</option>
          <option value="open">Ungrouped</option>
        </select>
      </div>
      <div id="demTable" style="flex:1;overflow-y:auto"></div>
    </div>
  </div>

  <!-- Delivery Groups tab -->
  <div class="tab-panel" id="pGroups">
    <div class="kpi-row" id="grpKpis"></div>
    <div class="card" style="flex:1;display:flex;flex-direction:column;min-height:0">
      <div class="card-hd">
        <div>
          <span style="font-weight:700;font-size:14px">Delivery Groups</span>
          <span class="bg bg-gy" id="grpCount">0 groups</span>
        </div>
        <div style="display:flex;gap:6px">
          <button class="rbtn fa-admin" onclick="FA_regenGroups()" style="background:var(--gs);color:var(--gn);border-color:#B8DFCA">⟳ Regenerate</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <input type="text" id="grpSearch" placeholder="Search venue, FA, SKU..." oninput="FA_filterGroups()" style="flex:1;min-width:200px">
      </div>
      <div id="grpTable" style="flex:1;overflow-y:auto"></div>
    </div>
  </div>

</div>

<!-- Bottom bar -->
<div id="fa-bar">
  <span style="font-size:10px;color:var(--tt)">©2026 Vladislav Abramov | <span style="font-weight:600">SM²ARTA™</span> — FA Goods Module</span>
  <span style="margin-left:auto;display:flex;gap:6px">
    <button class="rbtn" onclick="FA_exportAll()" style="background:var(--ps);color:var(--pu);border-color:#D4C5FE">⬇ Export</button>
    <button class="rbtn" onclick="FA_help()" style="background:var(--bg);color:var(--ts)">? Help</button>
  </span>
</div>

<!-- Modal container -->
<div id="faModal"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// FA Goods Module — Standalone, isolated from ML3K index.html
// Reads/writes only fa-* Supabase keys. Zero coupling.
// ═══════════════════════════════════════════════════════════════

// ── Supabase ──
const SUPABASE_URL='https://stwopndhnxcjyomkufii.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN0d29wbmRobnhjanlvbWt1ZmlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDgyNjgsImV4cCI6MjA4ODQ4NDI2OH0.YNhp7z5kxnzpX15Vw8NVVWaZG1-Lj3Q9uaZDiKmBvf8';
let SB=null;
try{SB=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY)}catch(e){console.warn('Supabase init failed:',e)}

// ── State ──
let FA_NOM={};       // {sku: {name, uom, pq, ps, src, ppu}}
let FA_DEMAND=[];    // [{id, sku, name, venue, fa, qty, biDate, note, created}]
let FA_nextDemId=1;
let FA_GROUPS=[];    // [{id, venue, biDate, fa, sku, pallets, items:[], linkedLP, linkedLM, linkedKit, created}]
let _faGroupNextId=1;
let FA_curTab='nom';
// Role: from URL param (?role=admin) or cookie (ml3k_role)
const FA_ROLE=(()=>{const p=new URLSearchParams(window.location.search).get('role');if(p==='admin'||p==='viewer')return p;const c=document.cookie.match(/ml3k_role=(admin|viewer)/);return c?c[1]:'viewer'})();
function _faIsViewer(){return FA_ROLE==='viewer'}

// ── Supabase read/write helpers ──
async function FA_sbRead(key){
  if(!SB)return null;
  try{
    const{data,error}=await SB.from('shared_state').select('value').eq('id',key).single();
    if(error||!data)return null;
    return JSON.parse(data.value);
  }catch(e){console.warn('FA read '+key+':',e);return null}
}
async function FA_sbWrite(key,val){
  if(!SB)return;
  try{
    await SB.from('shared_state').upsert({id:key,value:JSON.stringify(val),updated_at:new Date().toISOString()});
  }catch(e){console.warn('FA write '+key+':',e)}
}

// ── ML3K Lookup (read-only — never writes to these keys) ──
let FA_ML3K_VENUES=[];// [{name, cluster, biDate}] — from fm-rw
let FA_ML3K_TRUCKS=[];// [{id, dest, date, type:'lp'|'lm'}] — from lp-plan + lm dispatch
let FA_ML3K_KITS=[];  // [{id, sku, venue, type, truckRef}] — from fm-lm-kits
let _faKitTruckMap={}; // kitId → truck ref (from locked snapshots)
let _faLockedTrucks=new Set(); // set of locked truck refs (LP dispatched + LM locked)
let _faLockedLP=new Set(); // set of dispatched LP truck IDs
let FA_ASSIGNMENTS={}; // groupId -> {lp:{truckId,date,dest}, lm:{truckId,date,dest,biK,locked}}
async function FA_loadML3K(){
  try{
    const[rw,lpPlan,lmDisp,lmKits]=await Promise.all([
      FA_sbRead('fm-rw'),FA_sbRead('lp-plan'),FA_sbRead('fm-lm-dispatch'),FA_sbRead('fm-lm-kits')
    ]);
    // Extract unique venues + earliest BI date from RW
    if(rw&&Array.isArray(rw)){
      const vmap={};
      for(const r of rw){
        const v=r["Venue"];if(!v)continue;
        const bi=r["Estimated bump-in date"]||'';
        const cl=r["Venue cluster"]||'';
        if(!vmap[v]||(bi&&(!vmap[v].biDate||bi<vmap[v].biDate)))vmap[v]={name:v,cluster:cl,biDate:bi};
      }
      FA_ML3K_VENUES=Object.values(vmap).sort((a,b)=>a.name.localeCompare(b.name));
    }
    // Extract LP truck list with dates
    const _fmtD=d=>{if(!d)return'';try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}catch(e){return d}};
    // ── Build separate LP and LM truck lists ──
    let _faLPTrucks=[];// LP trucks (Dallas → WHS)
    if(lpPlan&&Array.isArray(lpPlan)){
      const tmap={};
      for(const r of lpPlan){
        const tid=r['Truck ID']||r.truckId;if(!tid)continue;
        if(!tmap[tid])tmap[tid]={id:'LP-'+tid,dest:r.Destination||r.destination||'',date:r.Date||r.date||'',type:'lp'};
      }
      _faLPTrucks=Object.values(tmap).sort((a,b)=>{const na=parseInt(a.id.replace(/\D/g,'')),nb=parseInt(b.id.replace(/\D/g,''));return na-nb});
    }
    FA_ML3K_TRUCKS=[];// LM trucks only (WHS → venue)
    _faKitTruckMap={};_faLockedTrucks=new Set();_faLockedLP=new Set();
    // LP dispatched trucks
    const lpTruckState=await FA_sbRead('lp-truck-state');
    if(lpTruckState&&lpTruckState.dispatched){
      for(const tid of lpTruckState.dispatched){_faLockedLP.add(Number(tid));_faLockedTrucks.add('LP-'+tid)}
    }
    console.log('[FA] Locked: '+_faLockedTrucks.size+' trucks ('+_faLockedLP.size+' LP dispatched)');
    if(lmDisp&&lmDisp.lockedSnapshots){
      const lsrMap=lmDisp.lsrNumbers||{};
      for(const fp in lmDisp.lockedSnapshots){
        const snap=lmDisp.lockedSnapshots[fp];
        const dest=snap.destLabel||snap.destDisplay||'';
        const lsr=lsrMap[fp]||'';
        const dd=snap.dKey||snap.dd||'';
        const truckRef='LM '+dest+(lsr?' · '+lsr:'');
        const biK=snap.biK||'';
        if(dest){FA_ML3K_TRUCKS.push({id:truckRef,dest,date:dd,biDate:biK,type:'lm',lsr,locked:true});_faLockedTrucks.add(truckRef)}
        if(snap.items){for(const it of snap.items){if(it._kitId)_faKitTruckMap[it._kitId]=truckRef}}
      }
    }
    // Store LP trucks globally for LP assignment dropdown
    window._faLPTrucks=_faLPTrucks;
    // Extract kits with truck reference — use numeric id for map lookup, sku for display
    if(lmKits&&Array.isArray(lmKits)){
      FA_ML3K_KITS=lmKits.map(k=>{
        const numId=k.id;// numeric kit ID (e.g., 9659)
        const sku=k.sku||'';// display SKU (e.g., FNKIT-002-9660)
        const name=k.name||k.venue||'';
        const trRef=_faKitTruckMap[numId]||_faKitTruckMap[sku]||null;
        return{id:numId,sku,name,venue:k.venue||'',type:sku.startsWith('FNKIT')?'FF&E':'Stationery',truckRef:trRef};
      });
    }
    // Load main NOM for pallet estimates (pq/ps per SKU)
    const nomData=await FA_sbRead('fm-nom');
    window._faML3KNom={};
    if(nomData&&typeof nomData==='object'){for(const sku in nomData){const n=nomData[sku];if(n.pq||n.pqA)window._faML3KNom[sku]={pq:n.pq||0,ps:n.ps||0,pqA:n.pqA||0,psA:n.psA||0}}}
    console.log('[FA] ML3K lookup: '+FA_ML3K_VENUES.length+' venues, '+FA_ML3K_TRUCKS.length+' trucks, '+FA_ML3K_KITS.length+' kits, '+Object.keys(window._faML3KNom).length+' NOM pallet entries');
    // Load FA assignments (engine truck placements from ML3K)
    const assigns=await FA_sbRead('fa-assignments');
    if(assigns&&typeof assigns==='object'){FA_ASSIGNMENTS=assigns;console.log('[FA] Assignments loaded:',Object.keys(assigns).length,'groups')}
  }catch(e){console.warn('[FA] ML3K lookup failed:',e)}
}
function _faIsLocked(ref){
  if(!ref)return false;
  // Exact match first
  if(_faLockedTrucks.has(ref))return true;
  // LP trucks: strict numeric check only
  const lpMatch=ref.match(/^LP-(\d+)$/);
  if(lpMatch)return _faLockedLP.has(parseInt(lpMatch[1]));
  // LM trucks: partial match for LSR variations (e.g., "LM Houston · LSR-001" vs "LM Houston")
  if(ref.startsWith('LM ')){
    const rl=ref.toLowerCase();
    for(const k of _faLockedTrucks){
      if(!k.startsWith('LM '))continue;// only match LM against LM
      const kl=k.toLowerCase();
      if(rl.includes(kl)||kl.includes(rl))return true;
    }
  }
  return false;
}
// LP destination abbreviation → city name mapping
const _FA_DEST_MAP={hou:'houston',kchouston:'houston',kc:'kansas city',ny:'new york',tor:'toronto',van:'vancouver',cdmx:'mexico city',gdl:'guadalajara',mty:'monterrey'};
function _faDestCity(dest){
  const dl=dest.toLowerCase();
  // Try abbreviation match (e.g., "USA HOU" → "houston")
  for(const[abbr,city] of Object.entries(_FA_DEST_MAP)){if(dl.includes(abbr))return city}
  return dl;
}
// Get LM trucks relevant to a venue (by destination match)
function _faTrucksForVenue(venue){
  if(!venue)return FA_ML3K_TRUCKS;
  const vl=venue.toLowerCase();
  const ml=FA_ML3K_VENUES.find(v=>v.name===venue);
  const cl=(ml?.cluster||'').toLowerCase();
  return FA_ML3K_TRUCKS.filter(t=>{
    const dl=t.dest.toLowerCase();
    const city=_faDestCity(t.dest);
    return dl.includes(vl)||vl.includes(dl)||vl.includes(city)||(cl&&(dl.includes(cl)||cl.includes(city)));
  });
}
// Get LP trucks relevant to a venue (match via cluster → LP destination city)
function _faLPTrucksForVenue(venue){
  const lpTrucks=window._faLPTrucks||[];
  if(!venue)return lpTrucks;
  const vl=venue.toLowerCase();
  const ml=FA_ML3K_VENUES.find(v=>v.name===venue);
  const cl=(ml?.cluster||'').toLowerCase();
  return lpTrucks.filter(t=>{
    const dl=t.dest.toLowerCase();
    const city=_faDestCity(t.dest);
    return vl.includes(city)||dl.includes(vl)||(cl&&(dl.includes(cl)||cl.includes(city)));
  });
}
function _faKitsForVenue(venue){
  if(!venue)return FA_ML3K_KITS;
  // Exact match first
  const exact=FA_ML3K_KITS.filter(k=>k.venue===venue);
  if(exact.length)return exact;
  // Fallback: same city/cluster (e.g., "Houston Accreditation Centre" → all Houston kits)
  const vl=venue.toLowerCase();
  const ml=FA_ML3K_VENUES.find(v=>v.name===venue);
  const cl=(ml?.cluster||'').toLowerCase();
  return FA_ML3K_KITS.filter(k=>{
    const kl=k.venue.toLowerCase();
    // Share a common city word (first significant word)
    const vWords=vl.split(/[\s\/]+/).filter(w=>w.length>3);
    return vWords.some(w=>kl.includes(w))||(cl&&kl.includes(cl));
  });
}

function FA_parseNom(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=function(e){
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!rows.length)throw new Error('Empty file');
      const hdrs=Object.keys(rows[0]);
      const hl=h=>h.toLowerCase().replace(/[\s_\-\.]/g,'');
      const skuCol=hdrs.find(h=>hl(h).includes('nomenclaturecode'))||hdrs.find(h=>hl(h).includes('code'))||hdrs.find(h=>hl(h).includes('sku'))||hdrs[0];
      const nameCol=hdrs.find(h=>hl(h).includes('nomenclaturename'))||hdrs.find(h=>hl(h).includes('name'))||hdrs[1];
      const uomCol=hdrs.find(h=>hl(h).includes('uom'))||hdrs.find(h=>hl(h).includes('unit'));
      const srcCol=hdrs.find(h=>hl(h).includes('source'))||hdrs.find(h=>hl(h).includes('supplier'));
      const pqCol=hdrs.find(h=>h.toLowerCase().includes('pallet')&&h.toLowerCase().includes('quantity')&&h.toLowerCase().includes('disassembled'))||hdrs.find(h=>hl(h).includes('disqty'))||hdrs.find(h=>hl(h).includes('palletqty')||hl(h)==='pq');
      const psCol=hdrs.find(h=>h.toLowerCase().includes('pallet')&&h.toLowerCase().includes('spaces')&&h.toLowerCase().includes('disassembled'))||hdrs.find(h=>hl(h).includes('disspc'))||hdrs.find(h=>hl(h).includes('palletspc')||hl(h)==='ps');
      const pqACol=hdrs.find(h=>h.toLowerCase().includes('pallet')&&h.toLowerCase().includes('quantity')&&h.toLowerCase().includes('assembled')&&!h.toLowerCase().includes('dis'))||hdrs.find(h=>hl(h)==='pqa');
      const psACol=hdrs.find(h=>h.toLowerCase().includes('pallet')&&h.toLowerCase().includes('spaces')&&h.toLowerCase().includes('assembled')&&!h.toLowerCase().includes('dis'))||hdrs.find(h=>hl(h)==='psa');
      const ppuCol=hdrs.find(h=>hl(h)==='ppu'||hl(h).includes('piecesper')||hl(h).includes('perunit')||h.toLowerCase().includes('pieces per'));
      const hsCol=hdrs.find(h=>hl(h)==='hscode'||h.toLowerCase().includes('hs code'));
      const countryCol=hdrs.find(h=>h.toLowerCase().includes('country of origin'));
      const priceCol=hdrs.find(h=>hl(h).includes('price')||hl(h).includes('unitprice')||hl(h).includes('cost'));
      window._faNomHdrs=hdrs;
      console.log('[FA NOM] Headers:',JSON.stringify(hdrs),'| Detected: sku='+skuCol+' name='+nameCol+' src='+srcCol+' uom='+uomCol+' pq='+pqCol+' ps='+psCol+' price='+priceCol);
      // Merge into existing NOM — new file updates/adds SKUs but does NOT remove existing ones
      // This protects demand items that reference SKUs not in the new file
      let count=0;
      for(const row of rows){
        const sku=String(row[skuCol]||'').trim();
        if(!sku||sku.toLowerCase()==='total')continue;
        const existing=FA_NOM[sku];
        const isManual=existing&&existing._manual;
        FA_NOM[sku]={
          name:String(row[nameCol]||'').trim(),
          uom:uomCol?String(row[uomCol]||'').trim():'Each',
          src:srcCol?String(row[srcCol]||'').trim():'',
          // Preserve manual pq/ps if _manual flag set
          pq:isManual&&existing.pq?(existing.pq):(pqCol?parseFloat(row[pqCol])||0:0),
          ps:isManual&&existing.ps?(existing.ps):(psCol?parseFloat(row[psCol])||0:0),
          pqA:pqACol?parseFloat(row[pqACol])||0:(existing?.pqA||0),
          psA:psACol?parseFloat(row[psACol])||0:(existing?.psA||0),
          ppu:ppuCol?parseFloat(row[ppuCol])||1:1,
          price:priceCol?parseFloat(String(row[priceCol]||'').replace(/[,$]/g,''))||0:0,
          hsCode:hsCol?String(row[hsCol]||'').trim():'',
          country:countryCol?String(row[countryCol]||'').trim():'',
          _manual:isManual||false
        };
        count++;
      }
      console.log('[FA NOM] Parsed '+count+' SKUs ('+Object.keys(FA_NOM).length+' total) from columns: sku='+skuCol+' name='+nameCol);
      _faNomCache=null;FA_save();
      FA_render();
    }catch(err){alert('Failed to parse NOM: '+err.message)}
  };
  r.readAsArrayBuffer(file);
}

    <div style="display:flex;gap:12px;flex:1;min-height:0">
      <div style="flex:1;display:flex;flex-direction:column;min-width:0">

        <textarea id="_faPasteArea" style="flex:1;width:100%;font-family:var(--fm);font-size:11px;padding:8px;border:1px solid var(--bd);border-radius:6px;resize:none" placeholder="Paste from Excel here (Ctrl+V)...&#10;&#10;Supports:&#10;• Matrix: venues as columns, SKUs as rows&#10;• Rows: SKU  Name  Venue  Qty  Date"></textarea>
      </div>
      <div id="_faPastePreview" style="flex:1;overflow-y:auto;min-width:0;padding:2px">
        <div style="color:var(--tt);font-size:11px;padding:20px;text-align:center">Paste data and click <b>👁 Preview</b></div>
      </div>

    </div></div>`;
  document.getElementById('faModal').innerHTML=h;
  document.getElementById('_faPasteArea').focus();
}

// ── Step 1: Parse pasted data into items ──
function _faParsePaste(){
  const raw=document.getElementById('_faPasteArea').value;
  if(!raw.trim()){document.getElementById('_faPastePreview').innerHTML='<div style="color:var(--tt);padding:20px;text-align:center">Paste data then click Preview.</div>';return}
  const fa=document.getElementById('_faPasteFa').value.trim()||'TEC';
  const dd='';
  const lines=raw.split('\n').map(l=>l.split('\t').map(c=>c.trim()));
  if(!lines.length)return;
  const hdr=lines[0];
  const dRows=lines.filter((l,i)=>i>0&&l[0]&&/^[A-Z]{2,}/.test(l[0]));
  const isMatrix=hdr.length>=4&&dRows.some(r=>r.slice(2).some(c=>/^\d+$/.test(c||'')));
  const items=[];
  if(isMatrix){
    const vc=[];for(let c=2;c<hdr.length;c++){if(hdr[c]&&!/^\d+$/.test(hdr[c]))vc.push({col:c,venue:hdr[c],biDate:''})}
    for(let r=1;r<Math.min(5,lines.length);r++){const row=lines[r];if(!row)continue;for(const v of vc){const d=_faTryDate(row[v.col]);if(d)v.biDate=d}}
    const ds=lines.findIndex((l,i)=>i>0&&l[0]&&/^[A-Z]{2,}/.test(l[0]));
    if(ds>=0)for(let r=ds;r<lines.length;r++){const row=lines[r];if(!row||!row[0])continue;const sku=row[0],nm=row[1]||FA_NOM[sku]?.name||sku;for(const v of vc){const q=parseInt(row[v.col]);if(q>0)items.push({sku,name:nm,venue:v.venue,fa,qty:q,biDate:v.biDate||dd})}}
  } else {
    for(const row of lines){if(!row||!row[0]||row[0].toLowerCase()==='sku')continue;let s,n,v,q,d;
      if(row.length>=5){s=row[0];n=row[1];v=row[2];q=parseInt(row[3]);d=_faTryDate(row[4])||dd}
      else if(row.length>=4){s=row[0];n=row[1];v=row[2];q=parseInt(row[3]);d=dd}
      else if(row.length>=3){s=row[0];v=row[1];q=parseInt(row[2]);n=FA_NOM[s]?.name||s;d=dd}
      else continue;if(s&&v&&q>0)items.push({sku:s,name:n||s,venue:v,fa,qty:q,biDate:d||''})}
  }
  window._faPaste={items,venueMap:{},dateMap:{},ovrMap:{}};
  // Best-guess venue mapping
  const rv=[...new Set(items.map(i=>i.venue))];
  for(const r of rv){
    const exact=FA_ML3K_VENUES.find(v=>v.name===r);
    if(exact){window._faPaste.venueMap[r]=r;continue}
    let best='',bestN=0;const rl=r.toLowerCase();
    for(const v of FA_ML3K_VENUES){const vl=v.name.toLowerCase();const n=rl.split(/[\s,\/]+/).filter(w=>w.length>2&&vl.includes(w)).length;if(n>bestN){bestN=n;best=v.name}}
    window._faPaste.venueMap[r]=best;
    // Init date from parsed or ML3K venue
    const gd=items.find(i=>i.venue===r)?.biDate||'';
    const vd=FA_ML3K_VENUES.find(v=>v.name===best)?.biDate||'';
    window._faPaste.dateMap[r]=gd||vd||dd;
  }
  _faRenderPasteCards();
}
function _faTryDate(s){if(!s)return'';if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;const w=s.includes('202')?s:s+' 2026';const d=new Date(w);if(!isNaN(d))return d.toISOString().slice(0,10);const m=/(\d{1,2})[-\/](\w+)/.exec(s);if(m){const d2=new Date(m[2]+' '+m[1]+', 2026');if(!isNaN(d2))return d2.toISOString().slice(0,10)}return''}

// ── Step 2: Render venue cards (full rebuild on every change) ──
function _faRenderPasteCards(){
  const P=window._faPaste;if(!P||!P.items.length){document.getElementById('_faPastePreview').innerHTML='<div style="color:var(--tt);text-align:center;padding:20px">No items parsed.</div>';return}
  // Build existing demand lookup: sku|venue → qty
  const exist={};FA_DEMAND.forEach(d=>{exist[d.sku+'|'+d.venue]=d.qty});
  const rawVenues=[...new Set(P.items.map(i=>i.venue))];
  const opts=FA_ML3K_VENUES.map(v=>'<option value="'+v.name+'">'+v.name+'</option>').join('');
  let h='<div style="font-size:11px;margin-bottom:6px"><b>'+P.items.length+'</b> items · <b>'+rawVenues.length+'</b> venues</div>';
  for(const rv of rawVenues){
    const grp=P.items.filter(i=>i.venue===rv);
    const mapped=P.venueMap[rv]||'';
    const dt=P.dateMap[rv]||'';
    // Count overlaps
    let nNew=0,nSame=0,nDiff=0;
    if(mapped)for(const it of grp){const k=it.sku+'|'+mapped;if(exist[k]===undefined)nNew++;else if(exist[k]===it.qty)nSame++;else nDiff++}
    const hasOld=nSame+nDiff>0;
    const ovr=P.ovrMap[rv]!==undefined?P.ovrMap[rv]:hasOld;// default checked when existing found
    const e=rv.replace(/'/g,"\\'").replace(/"/g,'&quot;');
    h+=`<div style="margin-bottom:8px;padding:10px;background:var(--sf);border:1px solid ${hasOld?'var(--pu)':'var(--bd)'};border-radius:8px">`;
    h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap"><b>"${rv}"</b> <span class="bg bg-gy">${grp.length}</span>`;
    if(mapped){if(nNew)h+=` <span class="bg bg-gn">${nNew} new</span>`;if(nSame)h+=` <span class="bg bg-gy">${nSame} same</span>`;if(nDiff)h+=` <span class="bg bg-pu">${nDiff} qty↕</span>`}
    h+=`</div>`;
    const dlId='_fpVDL'+rawVenues.indexOf(rv);
    h+=`<div style="display:flex;gap:6px;align-items:center;margin-bottom:4px"><span style="font-size:10px;color:var(--ts);min-width:50px">Map to</span><input type="text" list="${dlId}" value="${mapped}" placeholder="— skip —" style="flex:1;font-size:11px;border:1px solid var(--bd);border-radius:4px;padding:4px 6px" onchange="window._faPaste.venueMap['${e}']=this.value;_faRenderPasteCards()" oninput="window._faPaste.venueMap['${e}']=this.value"><datalist id="${dlId}"><option value="">— skip —</option>${opts}</datalist></div>`;
    h+=`<div style="display:flex;gap:6px;align-items:center;margin-bottom:4px"><span style="font-size:10px;color:var(--ts);min-width:50px">BI Date</span><input type="date" value="${dt}" style="font-size:11px;font-family:var(--fm)" onchange="window._faPaste.dateMap['${e}']=this.value"></div>`;
    if(hasOld)h+=`<label style="font-size:10px;color:var(--pu);display:flex;align-items:center;gap:4px;margin-bottom:4px;cursor:pointer"><input type="checkbox" ${ovr?'checked':''} onchange="window._faPaste.ovrMap['${e}']=this.checked"> Overwrite ${nSame+nDiff} existing</label>`;
    // Per-item pallet calculation from NOM (pq/ps)
    if(!P.asmMap)P.asmMap={};
    if(!P.pqOvr)P.pqOvr={};// manual pq overrides: "sku" → number
    if(!P.psOvr)P.psOvr={};// manual ps overrides: "sku" → number
    const nom=window._faML3KNom||{};
    let grpTotal=0;
    h+=`<div style="font-size:10px;max-height:200px;overflow-y:auto"><table style="width:100%;border-collapse:collapse;font-size:10px"><thead><tr style="color:var(--ts);border-bottom:1px solid var(--bd)"><th style="width:16px" title="Assembled">A</th><th style="text-align:left">SKU</th><th style="text-align:left">Name</th><th style="text-align:right">Qty</th><th style="text-align:right;min-width:38px">PQ</th><th style="text-align:right;min-width:38px">PS</th><th style="text-align:right">Pallets</th></tr></thead><tbody>`;
    for(const it of grp){
      const asmKey=rv+'|'+it.sku;
      const isAsm=!!P.asmMap[asmKey];
      const mn=nom[it.sku]||{};const fn=FA_NOM[it.sku]||{};
      const nomPq=isAsm?(fn.pqA||mn.pqA||0):(fn.pq||mn.pq||0);
      const nomPs=isAsm?(fn.psA||mn.psA||0):(fn.ps||mn.ps||0);
      // Manual PQ/PS override (per SKU, shared across venues)
      const pq=P.pqOvr[it.sku]!==undefined?P.pqOvr[it.sku]:nomPq;
      const ps=P.psOvr[it.sku]!==undefined?P.psOvr[it.sku]:nomPs;
      const hasData=pq>0&&ps>0;
      const calcPlt=hasData?Math.round((it.qty/pq)*ps*100)/100:0;
      grpTotal+=calcPlt;
      const pqIsOvr=P.pqOvr[it.sku]!==undefined;
      const psIsOvr=P.psOvr[it.sku]!==undefined;
      const ex=mapped?exist[it.sku+'|'+mapped]:undefined;
      const mark=ex===undefined?'':(ex===it.qty?' <span style="color:var(--tt)">=</span>':' <span style="color:var(--pu)">was '+ex+'</span>');
      const _inp='width:36px;font-size:10px;font-family:var(--fm);text-align:right;border-radius:3px;padding:1px 2px;';
      h+=`<tr style="border-bottom:1px solid var(--bl)">`;
      h+=`<td><input type="checkbox" ${isAsm?'checked':''} onchange="window._faPaste.asmMap['${asmKey.replace(/'/g,"\\'")}']=this.checked;_faRenderPasteCards()" style="margin:0" title="Assembled (use pqA/psA)"></td>`;
      h+=`<td class="mono" style="color:var(--cy)">${it.sku}</td>`;
      h+=`<td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px">${it.name}${mark}</td>`;
      h+=`<td class="mono" style="text-align:right">${it.qty}</td>`;
      h+=`<td><input type="number" value="${pq||''}" min="0" step="1" style="${_inp}border:1px solid ${pqIsOvr?'var(--pu)':hasData?'var(--bd)':'var(--rd)'};color:${pqIsOvr?'var(--pu)':hasData?'var(--tp)':'var(--rd)'}" onchange="window._faPaste.pqOvr['${it.sku}']=parseFloat(this.value)||0;_faRenderPasteCards()" placeholder="—"></td>`;
      h+=`<td><input type="number" value="${ps||''}" min="0" step="0.1" style="${_inp}border:1px solid ${psIsOvr?'var(--pu)':hasData?'var(--bd)':'var(--rd)'};color:${psIsOvr?'var(--pu)':hasData?'var(--tp)':'var(--rd)'}" onchange="window._faPaste.psOvr['${it.sku}']=parseFloat(this.value)||0;_faRenderPasteCards()" placeholder="—"></td>`;
      h+=`<td class="mono fw6" style="text-align:right;color:${hasData?'var(--ac)':'var(--rd)'}">${hasData?calcPlt:'—'}</td>`;
      h+=`</tr>`;
    }
    h+=`</tbody></table></div>`;
    h+=`<div style="display:flex;justify-content:flex-end;margin-top:4px;font-size:11px;font-weight:700;color:var(--ac)">Total: ${Math.round(grpTotal*100)/100} plt</div>`;
    h+=`</div>`;
  }
  document.getElementById('_faPastePreview').innerHTML=h;
  document.getElementById('_faPasteAddBtn').disabled=false;
}

// ── Step 3: Confirm and add ──
function _faConfirmPaste(){
  const P=window._faPaste;if(!P||!P.items.length){alert('Run Preview first.');return}
  const exist={};FA_DEMAND.forEach(d=>{exist[d.sku+'|'+d.venue]=true});
  let added=0,skipped=0,overwritten=0;
  const byVenue={};for(const it of P.items){if(!byVenue[it.venue])byVenue[it.venue]=[];byVenue[it.venue].push(it)}
  for(const rv in byVenue){
    const mapped=P.venueMap[rv];if(!mapped){skipped+=byVenue[rv].length;continue}
    const bi=P.dateMap[rv]||'';const grp=byVenue[rv];
    const doOvr=P.ovrMap[rv]!==undefined?P.ovrMap[rv]:false;
    if(doOvr){const skus=new Set(grp.map(i=>i.sku));const b=FA_DEMAND.length;FA_DEMAND=FA_DEMAND.filter(d=>!(d.venue===mapped&&skus.has(d.sku)));overwritten+=b-FA_DEMAND.length}
    else{const existSet=new Set(FA_DEMAND.filter(d=>d.venue===mapped).map(d=>d.sku));const before=grp.length;grp.splice(0,grp.length,...grp.filter(i=>!existSet.has(i.sku)));skipped+=before-grp.length}
    for(const it of grp){
      const asmKey=rv+'|'+it.sku;const isAsm=!!P.asmMap?.[asmKey];
      FA_DEMAND.push({id:FA_nextDemId++,sku:it.sku,name:it.name,venue:mapped,fa:it.fa,qty:it.qty,biDate:bi||it.biDate||'',note:'',
        _asm:isAsm||undefined,
        created:new Date().toISOString()});
      added++;
    }
  }
  // Save manual PQ/PS overrides to FA_NOM
  const pqOvr=P.pqOvr||{};const psOvr=P.psOvr||{};
  let nomChanged=false;
  for(const sku in pqOvr){
    if(!FA_NOM[sku])FA_NOM[sku]={name:P.items.find(i=>i.sku===sku)?.name||sku,src:'',uom:'Each',pq:0,ps:0,pqA:0,psA:0,price:0};
    FA_NOM[sku].pq=pqOvr[sku];FA_NOM[sku]._manual=true;nomChanged=true;
  }
  for(const sku in psOvr){
    if(!FA_NOM[sku])FA_NOM[sku]={name:P.items.find(i=>i.sku===sku)?.name||sku,src:'',uom:'Each',pq:0,ps:0,pqA:0,psA:0,price:0};
    FA_NOM[sku].ps=psOvr[sku];FA_NOM[sku]._manual=true;nomChanged=true;
  }
  window._faPaste=null;document.getElementById('faModal').innerHTML='';
  if(nomChanged){_faNomCache=null;FA_sbWrite('fa-nom',FA_NOM).catch(e=>console.warn('FA NOM save:',e))}
  FA_saveDebounced();FA_render();
  console.log('[FA] Paste: added '+added+', overwritten '+overwritten+', skipped '+skipped);
}

function FA_filterDem(){

// ═══════════════════════════════════════════════════════════════
// DELIVERY GROUPS — auto-generated from demand (venue+biDate+FA)
// Each group is an indivisible block with manual pallet input.
// Groups are the source of truth for LP and LM capacity reservations.
// ═══════════════════════════════════════════════════════════════

// LP destination abbreviation from venue name (for SKU generation)
const _FA_LP_ABBRS={toronto:'TOR',vancouver:'VAN','mexico city':'CDMX',guadalajara:'GDL',monterrey:'MTY','kansas city':'KC',houston:'HOU','new york':'NY'};
function _faVenueToLPAbbr(venue){
  const vl=(venue||'').toLowerCase();
  for(const[city,abbr]of Object.entries(_FA_LP_ABBRS)){if(vl.includes(city))return abbr}
  // Try cluster match
  const ml=FA_ML3K_VENUES.find(v=>v.name===venue);
  if(ml&&ml.cluster){const cl=ml.cluster.toLowerCase();for(const[city,abbr]of Object.entries(_FA_LP_ABBRS)){if(cl.includes(city))return abbr}}
  return null;// non-LP venue (Dallas direct, IBC, etc.)
}

// Generate group SKU: FA-{FA}-{DEST}-G{id}
function _faGroupSku(fa,venue,id){
  const abbr=_faVenueToLPAbbr(venue)||'DFW';
  return'FA-'+(fa||'OTH').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4)+'-'+abbr+'-G'+id;
}

// Auto-generate groups from demand. Preserves existing locked groups.
function FA_buildGroups(){
  // Index locked groups (assigned to locked truck) — these are immutable
  const lockedGrpIds=new Set();
  for(const g of FA_GROUPS){
    if((g.linkedLP&&_faIsLocked(g.linkedLP))||(g.linkedLM&&_faIsLocked(g.linkedLM)))lockedGrpIds.add(g.id);
  }
  // Collect demand IDs already in locked groups
  const lockedDemIds=new Set();
  for(const g of FA_GROUPS){if(lockedGrpIds.has(g.id)){for(const did of g.items||[])lockedDemIds.add(did)}}
  // Keep locked groups as-is
  const kept=FA_GROUPS.filter(g=>lockedGrpIds.has(g.id));
  // Build new groups from ungrouped demand
  const ungrouped=FA_DEMAND.filter(d=>!lockedDemIds.has(d.id));
  const newGroups={};// key → {venue, biDate, fa, items:[]}
  for(const d of ungrouped){
    const key=(d.venue||'')+'|'+(d.biDate||'')+'|'+(d.fa||'');
    if(!newGroups[key])newGroups[key]={venue:d.venue,biDate:d.biDate,fa:d.fa||'',items:[]};
    newGroups[key].items.push(d.id);
  }
  // Merge with existing open groups (preserve pallets + truck assignments if key matches)
  const oldOpen={};// key → group (for preserving manual pallets)
  for(const g of FA_GROUPS){
    if(lockedGrpIds.has(g.id))continue;
    const key=(g.venue||'')+'|'+(g.biDate||'')+'|'+(g.fa||'');
    oldOpen[key]=g;
  }
  const built=[];
  for(const[key,ng] of Object.entries(newGroups)){
    if(!ng.items.length)continue;
    const old=oldOpen[key];
    built.push({
      id:old?.id||_faGroupNextId++,
      venue:ng.venue,
      biDate:ng.biDate,
      fa:ng.fa,
      sku:old?.sku||_faGroupSku(ng.fa,ng.venue,old?.id||(_faGroupNextId-1)),
      pallets:old?.pallets||0,
      items:ng.items,
      linkedLP:old?.linkedLP||null,
      linkedLM:old?.linkedLM||null,
      created:old?.created||new Date().toISOString()
    });
    // Remove from oldOpen so we know which are stale
    delete oldOpen[key];
  }
  FA_GROUPS=[...kept,...built];
  for(const g of FA_GROUPS){if(!g.sku)g.sku=_faGroupSku(g.fa,g.venue,g.id)}
  // Auto-compute pallets from NOM for groups without manual pallets
  for(const g of FA_GROUPS){
    if(!lockedGrpIds.has(g.id)){
      const computed=FA_computeGroupPallets(g);
      if(computed>0&&(g.pallets||0)===0)g.pallets=computed;
      // If group has items with _pltOvr, always recompute (user set per-item values)
      const hasOvr=g.items?.some(did=>{const d=FA_DEMAND.find(x=>x.id===did);return d&&d._pltOvr!==undefined});
      if(hasOvr)g.pallets=computed;
    }
  }
}

function FA_grpKitAutoLM(){
  const kitVal=document.getElementById('_faGrpKit').value.trim();
  if(!kitVal)return;
  const lmEl=document.getElementById('_faGrpLM');
  if(!lmEl||lmEl.value)return;// don't overwrite existing
  // Find kit by SKU or numeric ID
  const kit=FA_ML3K_KITS.find(k=>k.sku===kitVal||String(k.id)===kitVal);
  if(!kit)return;
  // Locked kit → use truckRef directly
  if(kit.truckRef){lmEl.value=kit.truckRef;return}
  // Unlocked kit → find first LM truck matching kit venue
  const lmTrucks=_faTrucksForVenue(kit.venue);
  if(lmTrucks.length===1)lmEl.value=lmTrucks[0].id;// auto-fill only if exactly 1 match
}
function FA_saveGroupEdit(id){
  const g=FA_GROUPS.find(x=>x.id===id);if(!g)return;
  g.pallets=parseFloat(document.getElementById('_faGrpPlt').value)||0;
  g.linkedLP=document.getElementById('_faGrpLP').value.trim()||null;
  g.linkedLM=document.getElementById('_faGrpLM').value.trim()||null;
  g.linkedKit=document.getElementById('_faGrpKit').value.trim()||null;
  document.getElementById('faModal').innerHTML='';
  FA_saveGroups();FA_render();
}

// Compute group pallets from demand items + NOM pq/ps
function FA_computeGroupPallets(g){
  if(!g||!g.items)return 0;
  const ml3kNom=window._faML3KNom||{};
  let total=0;
  for(const did of g.items){
    const d=FA_DEMAND.find(x=>x.id===did);if(!d)continue;
    // Look up pq/ps: FA_NOM first (has manual overrides), then ML3K NOM
    const fn=FA_NOM[d.sku]||{};
    const mn=ml3kNom[d.sku]||{};
    const isAsm=!!d._asm;
    const pq=isAsm?(fn.pqA||mn.pqA||fn.pq||mn.pq||0):(fn.pq||mn.pq||0);
    const ps=isAsm?(fn.psA||mn.psA||fn.ps||mn.ps||0):(fn.ps||mn.ps||0);
    if(pq>0&&ps>0)total+=(d.qty/pq)*ps;
  }
  return Math.round(total*100)/100;
}

// Render Delivery Groups tab
function FA_renderGroups(){
  // Auto-build groups if none exist but demand does
  if(!FA_GROUPS.length&&FA_DEMAND.length)FA_buildGroups();
  const totalPlt=FA_GROUPS.reduce((s,g)=>s+(g.pallets||0),0);
  const lpAssigned=FA_GROUPS.filter(g=>g.linkedLP).length;
  const lmAssigned=FA_GROUPS.filter(g=>g.linkedLM).length;
  const locked=FA_GROUPS.filter(g=>(g.linkedLP&&_faIsLocked(g.linkedLP))||(g.linkedLM&&_faIsLocked(g.linkedLM))).length;
  document.getElementById('grpKpis').innerHTML=`
    <div class="kpi"><div class="kl">📐 Groups</div><div class="kv" style="color:var(--cy)">${FA_GROUPS.length}</div></div>
    <div class="kpi"><div class="kl">📦 Total Pallets</div><div class="kv" style="color:var(--ac)">${totalPlt}</div></div>
    <div class="kpi"><div class="kl">📦 LP Assigned</div><div class="kv" style="color:#2563eb">${lpAssigned}</div></div>
    <div class="kpi"><div class="kl">🚛 LM Assigned</div><div class="kv" style="color:var(--pu)">${lmAssigned}</div></div>
    <div class="kpi"><div class="kl">🔒 Locked</div><div class="kv" style="color:var(--gn)">${locked}</div></div>`;
  document.getElementById('grpCount').textContent=FA_GROUPS.length+' groups';

  if(!FA_GROUPS.length){
    document.getElementById('grpTable').innerHTML='<div style="color:var(--tt);padding:20px;text-align:center">No groups yet. Add demand items first, then click <b>⟳ Regenerate</b> to create delivery groups.</div>';return;
  }

  const _fmtD=dt=>{if(!dt)return'—';try{return new Date(dt+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}catch(e){return dt}};
  // Build truck date lookups
  const _lpTruckMap={};for(const t of window._faLPTrucks||[]){_lpTruckMap[t.id]=t}
  const _lmTruckMap={};for(const t of FA_ML3K_TRUCKS){_lmTruckMap[t.id]=t}
  // Fuzzy LM truck lookup (linkedLM may include LSR suffix not in truck ID)
  const _lmFind=ref=>{if(!ref)return null;if(_lmTruckMap[ref])return _lmTruckMap[ref];for(const t of FA_ML3K_TRUCKS){if(ref.includes(t.id)||t.id.includes(ref))return t}return null}
  let h='<table class="dtb"><thead><tr><th>SKU</th><th>Venue</th><th>FA</th><th>FA BI Date</th><th>Dispatch</th><th>Delivery</th><th style="text-align:right">Items</th><th style="text-align:center">Pallets</th><th>LP Truck</th><th>LM Truck</th><th>Kit</th><th>Status</th></tr></thead><tbody>';
  const sorted=[...FA_GROUPS].sort((a,b)=>((a.biDate||'9').localeCompare(b.biDate||'9'))||(a.venue||'').localeCompare(b.venue));
  for(const g of sorted){
    const asgn=FA_ASSIGNMENTS[g.id]||{};
    const isLocked=(g.linkedLP&&_faIsLocked(g.linkedLP))||(g.linkedLM&&_faIsLocked(g.linkedLM))||(asgn.lm&&asgn.lm.locked);
    // LP: manual link or engine assignment
    const lpRef=g.linkedLP||(asgn.lp?asgn.lp.truckId:null);
    const lpIsEngine=!g.linkedLP&&asgn.lp;
    const lpDisp=lpRef?'<span class="bg" style="background:'+(lpIsEngine?'#ECFEFF;color:#0891B2;border:1px solid #A5F3FC':'#EFF6FF;color:#2563eb;border:1px solid #BFDBFE')+'">'+lpRef+'</span>'+(g.linkedLP&&_faIsLocked(g.linkedLP)?' 🔒':''):'<span style="color:var(--tt)">—</span>';
    // LM: manual link or engine assignment
    const lmRef=g.linkedLM||(asgn.lm?asgn.lm.truckId:null);
    const lmIsEngine=!g.linkedLM&&asgn.lm;
    const isFaTruck=asgn.lm&&asgn.lm.faTruck;
    const lmDisp=lmRef?'<span class="bg" style="background:'+(lmIsEngine?'#ECFEFF;color:#0891B2;border:1px solid #A5F3FC':'var(--ps);color:var(--pu);border:1px solid #D4C5FE')+'">'+lmRef+'</span>'+(isFaTruck?' <span style="font-size:8px;font-weight:700;color:#0891B2;background:#ECFEFF;border:1px solid #A5F3FC;padding:1px 4px;border-radius:3px">📐 FA</span>':'')+(asgn.lm&&asgn.lm.locked?' 🔒':(g.linkedLM&&_faIsLocked(g.linkedLM)?' 🔒':'')):'<span style="color:var(--tt)">—</span>';
    const kitDisp=g.linkedKit?'<span class="bg bg-gn">📦 '+g.linkedKit+'</span>':'<span style="color:var(--tt)">—</span>';
    const hasAsgn=lpRef||lmRef;
    const statusBadge=isLocked?'<span class="bg bg-gn">🔒 Locked</span>':hasAsgn?'<span class="bg bg-cy">On Truck</span>':g.pallets>0?'<span class="bg bg-or">Pallets set</span>':'<span class="bg bg-gy">Open</span>';
    // Dispatch: earliest of LP or LM truck date (manual or engine)
    const lpDate=g.linkedLP&&_lpTruckMap[g.linkedLP]?_lpTruckMap[g.linkedLP].date:(asgn.lp?asgn.lp.date:null);
    const lmT=_lmFind(g.linkedLM);
    const lmDate=lmT?lmT.date:(asgn.lm?asgn.lm.date:null);
    const dispDate=lpDate&&lmDate?(lpDate<lmDate?lpDate:lmDate):lpDate||lmDate;
    // Delivery: LM biK (manual or engine)
    const delDate=lmT?(lmT.biDate||lmT.date):(asgn.lm?asgn.lm.biK:null);
    h+=`<tr data-search="${g.sku} ${g.venue} ${g.fa} ${lpRef||''} ${lmRef||''} ${g.linkedKit||''}" style="cursor:pointer" onclick="FA_editGroup(${g.id})">
      <td class="mono fw6" style="color:var(--cy)">${g.sku}</td>
      <td>${g.venue}</td>
      <td style="color:var(--pu)">${g.fa||'—'}</td>
      <td>${_fmtD(g.biDate)}</td>
      <td>${dispDate?_fmtD(dispDate):'<span style="color:var(--tt)">—</span>'}</td>
      <td>${delDate?_fmtD(delDate):'<span style="color:var(--tt)">—</span>'}</td>
      <td class="mono" style="text-align:right">${(g.items||[]).length}</td>
      <td style="text-align:center" onclick="event.stopPropagation()"><input type="number" value="${g.pallets||0}" min="0" max="26" step="0.1" style="width:50px;font-family:var(--fm);font-size:11px;text-align:center;border:1px solid ${g.pallets>0?'var(--ac)':'var(--bd)'};border-radius:4px;padding:2px;color:${g.pallets>0?'var(--ac)':'var(--tt)'}" onchange="FA_setGroupPallets(${g.id},this.value)" ${isLocked?'readonly':''}></td>
      <td>${lpDisp}</td>
      <td>${lmDisp}</td>
      <td>${kitDisp}</td>
      <td>${statusBadge}</td></tr>`;
  }
  h+='</tbody></table>';
  document.getElementById('grpTable').innerHTML=h;
  FA_filterGroups();
}
function FA_setGroupPallets(id,val){
  const g=FA_GROUPS.find(x=>x.id===id);if(!g)return;
  g.pallets=parseFloat(val)||0;FA_saveGroups();
}
function FA_filterGroups(){
  const q=(document.getElementById('grpSearch').value||'').toLowerCase();
  document.querySelectorAll('#grpTable tbody tr').forEach(r=>{
    r.style.display=!q||r.getAttribute('data-search').toLowerCase().includes(q)?'':'none';
  });
}

// OOR EXPORT
// ═══════════════════════════════════════════════════════════════
async function FA_exportOORGroup(groupKey){
  // Find group by SKU
  const grp=FA_GROUPS.find(g=>g.sku===groupKey);
  const items=grp?FA_DEMAND.filter(d=>grp.items&&grp.items.includes(d.id)):[];
  if(!items.length)return alert('No items for '+groupKey);
  const venue=[...new Set(items.map(d=>d.venue))].join(' / ');
  if(typeof ExcelJS==='undefined')return alert('ExcelJS not loaded yet, try again');
  try{
    const wb=new ExcelJS.Workbook();
    const ws=wb.addWorksheet('OOR',{pageSetup:{paperSize:9,orientation:'portrait',fitToPage:true,fitToWidth:1,fitToHeight:0}});
    ws.columns=[{width:12},{width:20},{width:32},{width:12},{width:12},{width:12}];
    const COLS=6;
    const C_HDR='FF5B1A18',C_WH='FFFFFFFF',C_BG='FFFDF5F0',C_BRD='FFB8805A',C_DK='FF3B0F0D';
    const mkF=c=>({type:'pattern',pattern:'solid',fgColor:{argb:c}});
    const fillH=mkF(C_HDR),fillW=mkF(C_WH),fillBg=mkF(C_BG);
    const brd={top:{style:'thin',color:{argb:C_BRD}},left:{style:'thin',color:{argb:C_BRD}},bottom:{style:'thin',color:{argb:C_BRD}},right:{style:'thin',color:{argb:C_BRD}}};
    const fTtl={name:'Calibri',size:14,bold:true,color:{argb:C_DK}};
    const fLbl={name:'Calibri',size:10,bold:true,color:{argb:C_WH}};
    const fVal={name:'Calibri',size:10,color:{argb:C_DK}};
    const fValB={name:'Calibri',size:10,bold:true,color:{argb:C_DK}};
    const fHdr={name:'Calibri',size:10,bold:true,color:{argb:C_WH}};
    const fData={name:'Calibri',size:10,color:{argb:C_DK}};
    const alC={horizontal:'center',vertical:'middle',wrapText:true},alL={horizontal:'left',vertical:'middle'};
    const cl=(r,c,val,font,align,fill,border)=>{const x=ws.getRow(r).getCell(c);x.value=val!=null?val:'';if(font)x.font=font;if(align)x.alignment=align;if(fill)x.fill=fill;if(border)x.border=border};
    const mg=(r1,c1,r2,c2)=>{try{ws.mergeCells(r1,c1,r2,c2)}catch(e){}};
    const fillRow=(r,c1,c2,fill,border)=>{for(let c=c1;c<=c2;c++){cl(r,c,'',null,null,fill,border)}};
    const now=new Date();
    const ts=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+' '+String(now.getDate()).padStart(2,'0')+'.'+String(now.getMonth()+1).padStart(2,'0')+'.'+now.getFullYear();

    let R=2;fillRow(R,1,COLS,fillW,brd);mg(R,1,R,COLS);
    cl(R,1,'Outbound Order Request # '+groupKey,fTtl,alC,fillW,brd);ws.getRow(R).height=30;
    R=3;fillRow(R,1,COLS,fillBg,brd);mg(R,1,R,2);cl(R,1,'Dispatch Date and Time',fLbl,alC,fillH,brd);mg(R,3,R,COLS);cl(R,3,ts,fVal,alC,fillBg,brd);
    R=4;fillRow(R,1,COLS,fillBg,brd);mg(R,1,R,2);cl(R,1,'Delivery Date and Time',fLbl,alC,fillH,brd);mg(R,3,R,4);cl(R,3,'',fVal,alC,fillBg,brd);cl(R,5,'Requestor Name',fLbl,alC,fillH,brd);cl(R,6,'',fVal,alC,fillBg,brd);
    R=5;fillRow(R,1,COLS,fillBg,brd);cl(R,1,'Ship From',fLbl,alC,fillH,brd);mg(R,2,R,4);cl(R,2,'Dallas - Main Logistics Center',fValB,alC,fillBg,brd);cl(R,5,'LSR',fLbl,alC,fillH,brd);cl(R,6,'',fVal,alC,fillBg,brd);
    R=6;fillRow(R,1,COLS,fillBg,brd);cl(R,1,'Ship To',fLbl,alC,fillH,brd);mg(R,2,R,4);cl(R,2,venue,fValB,alC,fillBg,brd);cl(R,5,'Reference',fLbl,alC,fillH,brd);cl(R,6,groupKey,fValB,alC,fillBg,brd);
    R=7;ws.getRow(R).height=8;
    R=8;['Line #','Nomenclature Code','Nomenclature name','Source','UOM','Quantity'].forEach((h,i)=>{cl(R,i+1,h,fHdr,alC,fillH,brd)});ws.getRow(R).height=28;
    items.forEach((item,idx)=>{
      R++;const rFill=idx%2===0?fillW:fillBg;const n=FA_NOM[item.sku]||{};
      cl(R,1,idx+1,fValB,alC,rFill,brd);cl(R,2,item.sku,fData,alL,rFill,brd);cl(R,3,item.name,fData,alL,rFill,brd);
      cl(R,4,n.src||'',fData,alC,rFill,brd);cl(R,5,n.uom||'Each',fData,alC,rFill,brd);cl(R,6,item.qty,fValB,alC,rFill,brd);
    });

    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='FA_OOR_'+groupKey.replace(/[^a-zA-Z0-9]/g,'_')+'.xlsx';a.click();
  }catch(e){alert('Export failed: '+e.message);console.error(e)}
}

async function FA_exportAll(){
  if(typeof ExcelJS==='undefined')return alert('ExcelJS not loaded yet');
  try{
    const wb=new ExcelJS.Workbook();
    // NOM sheet
    const ws1=wb.addWorksheet('Nomenclature');
    ws1.columns=[{header:'SKU',key:'sku',width:18},{header:'Name',key:'name',width:35},{header:'Source',key:'src',width:10},{header:'UoM',key:'uom',width:10},{header:'Plt Qty',key:'pq',width:10},{header:'Plt Spc',key:'ps',width:10},{header:'Price',key:'price',width:12}];
    const hdr1=ws1.getRow(1);hdr1.font={bold:true,size:10};hdr1.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF0F1F3'}};
    for(const sku of Object.keys(FA_NOM).sort()){const n=FA_NOM[sku];ws1.addRow({sku,name:n.name,src:n.src,uom:n.uom,pq:n.pq,ps:n.ps,price:n.price})}
    ws1.views=[{state:'frozen',ySplit:1}];ws1.autoFilter={from:'A1',to:'G1'};

    // Demand sheet
    const ws2=wb.addWorksheet('Demand');
    ws2.columns=[{header:'#',key:'id',width:6},{header:'SKU',key:'sku',width:18},{header:'Name',key:'name',width:30},{header:'Venue',key:'venue',width:25},{header:'FA',key:'fa',width:15},{header:'Qty',key:'qty',width:10},{header:'BI Date',key:'biDate',width:14},{header:'Group',key:'group',width:18},{header:'Note',key:'note',width:20}];
    const hdr2=ws2.getRow(1);hdr2.font={bold:true,size:10};hdr2.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF0F1F3'}};
    const _demGrpX={};for(const g of FA_GROUPS){for(const did of g.items||[])_demGrpX[did]=g.sku}
    for(const d of FA_DEMAND){ws2.addRow({id:d.id,sku:d.sku,name:d.name,venue:d.venue,fa:d.fa||'',qty:d.qty,biDate:d.biDate||'',group:_demGrpX[d.id]||'',note:d.note||''})}
    ws2.views=[{state:'frozen',ySplit:1}];ws2.autoFilter={from:'A1',to:'I1'};

    // Groups sheet
    const ws3=wb.addWorksheet('Delivery Groups');
    const _xLpMap={};for(const t of window._faLPTrucks||[]){_xLpMap[t.id]=t}
    const _xLmFind=ref=>{if(!ref)return null;for(const t of FA_ML3K_TRUCKS){if(ref.includes(t.id)||t.id.includes(ref))return t}return null};
    ws3.columns=[{header:'SKU',key:'sku',width:20},{header:'Venue',key:'venue',width:28},{header:'FA',key:'fa',width:12},{header:'FA BI Date',key:'biDate',width:14},{header:'Dispatch',key:'dispatch',width:14},{header:'Delivery',key:'delivery',width:14},{header:'Pallets',key:'pallets',width:10},{header:'Items',key:'items',width:8},{header:'LP Truck',key:'lp',width:14},{header:'LM Truck',key:'lm',width:28},{header:'Kit',key:'kit',width:18},{header:'Status',key:'status',width:12}];
    const hdr3=ws3.getRow(1);hdr3.font={bold:true,size:10};hdr3.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF0F1F3'}};
    for(const g of FA_GROUPS){
      const lpT=g.linkedLP&&_xLpMap[g.linkedLP]?_xLpMap[g.linkedLP]:null;
      const lmT=_xLmFind(g.linkedLM);
      const lpDate=lpT?lpT.date:null;const lmDate=lmT?lmT.date:null;
      const dispatch=lpDate&&lmDate?(lpDate<lmDate?lpDate:lmDate):lpDate||lmDate||'';
      const delivery=lmT?(lmT.biDate||lmT.date):'';
      const isLocked=(g.linkedLP&&_faIsLocked(g.linkedLP))||(g.linkedLM&&_faIsLocked(g.linkedLM));
      const status=isLocked?'Locked':g.linkedLP||g.linkedLM?'Assigned':g.pallets>0?'Pallets set':'Open';
      ws3.addRow({sku:g.sku,venue:g.venue,fa:g.fa,biDate:g.biDate||'',dispatch,delivery,pallets:g.pallets||0,items:(g.items||[]).length,lp:g.linkedLP||'',lm:g.linkedLM||'',kit:g.linkedKit||'',status})
    }
    ws3.views=[{state:'frozen',ySplit:1}];ws3.autoFilter={from:'A1',to:'L1'};

    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='FA_Goods_Export_'+new Date().toISOString().slice(0,10)+'.xlsx';a.click();
  }catch(e){alert('Export failed: '+e.message);console.error(e)}
}

// ═══════════════════════════════════════════════════════════════
// SYNC — reload from Supabase
// ═══════════════════════════════════════════════════════════════
async function FA_sync(){
  const btn=document.querySelector('.sys-sync,.hd .rbtn:first-of-type');
  if(btn){btn.disabled=true;btn.textContent='⟳ Loading...'}
  await Promise.all([FA_load(),FA_loadML3K()]);
  // Migrate stale kit references after sync
  if(FA_GROUPS.length&&FA_ML3K_KITS.length){
    let migrated=false;
    for(const g of FA_GROUPS){
      if(!g.linkedKit)continue;
      const exact=FA_ML3K_KITS.find(k=>k.sku===g.linkedKit||k.id===g.linkedKit);
      if(exact)continue;
      const prefix=g.linkedKit.startsWith('FNKIT')?'FNKIT':(g.linkedKit.startsWith('OSKIT')?'OSKIT':'');
      if(!prefix)continue;
      const match=FA_ML3K_KITS.find(k=>k.venue===g.venue&&k.sku.startsWith(prefix));
      if(match){console.log('[FA] Kit migrate: '+g.linkedKit+' → '+match.sku+' ('+g.venue+')');g.linkedKit=match.sku;migrated=true}
    }
    if(migrated&&!_faIsViewer())FA_save();
  }
  if(btn){btn.disabled=false;btn.textContent='⟳ Sync'}
  FA_render();
}

(async function(){

    await Promise.all([FA_load(),FA_loadML3K()]);

    if(FA_GROUPS.length&&FA_ML3K_KITS.length){
      let migrated=false;
      for(const g of FA_GROUPS){
        if(!g.linkedKit)continue;

        const prefix=g.linkedKit.startsWith('FNKIT')?'FNKIT':(g.linkedKit.startsWith('OSKIT')?'OSKIT':'');
        if(!prefix)continue;
        const match=FA_ML3K_KITS.find(k=>k.venue===g.venue&&k.sku.startsWith(prefix));
        if(match){console.log('[FA] Kit migrate: '+g.linkedKit+' → '+match.sku+' ('+g.venue+')');g.linkedKit=match.sku;migrated=true}
      }
      if(migrated&&!_faIsViewer())FA_save();
    }
    FA_render();
  }catch(e){console.warn('FA init:',e);FA_updateStatus(false);FA_render()}
})();

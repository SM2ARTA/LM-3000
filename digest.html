<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
<meta charset="UTF-8">
<meta name="x-apple-disable-message-reformatting">
<!--[if mso]>
<noscript><xml><o:OfficeDocumentSettings><o:AllowPNG/><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript>
<style type="text/css">table{border-collapse:collapse;mso-table-lspace:0pt;mso-table-rspace:0pt}td{mso-line-height-rule:exactly}</style>
<![endif]-->
<title>FF&amp;E Daily Digest</title>
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#F0F0F5}
.toolbar{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid #ddd;padding:10px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.toolbar button{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none}
.btn-copy{background:#4A148C;color:#fff}.btn-copy:hover{background:#6A1B9A}
.btn-mail{background:#304FFE;color:#fff}.btn-mail:hover{background:#1E40FF}
.btn-close{background:#eee;color:#333}.btn-close:hover{background:#ddd}
.status{font-size:12px;color:#12804A;font-weight:600;display:none;margin-left:8px}
.loading{padding:60px;text-align:center;color:#888;font-size:14px}
.preview{padding:20px}
</style>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<div class="toolbar">
  <button class="btn-copy" id="btnCopy" disabled>Copy to Clipboard</button>
  <button class="btn-mail" id="btnMail" disabled>Open in Outlook</button>
  <button id="btnXl" style="padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:#12804A;color:#fff;display:none">⬇ Excel Report</button>
  <button class="btn-close" onclick="window.close()">Close</button>
  <span class="status" id="copyStatus">Copied! Paste into your email.</span>
  <span id="uploadStatus" style="font-size:11px;color:#888;margin-left:auto"></span>
</div>
<div class="preview" id="emailContent"><div class="loading">Generating digest...</div></div>

<script>
(async function(){
  // ── Load data from sessionStorage ──
  const raw=sessionStorage.getItem('_digestData');
  if(!raw){document.getElementById('emailContent').innerHTML='<div class="loading" style="color:#C62828">No digest data found. Please generate from ML3K.</div>';return}
  const D=JSON.parse(raw);

  const today=new Date();
  const dStr=today.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const _dk=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const dShort=_dk(today);
  const fD=d=>{if(!d||d==='—')return'—';try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}catch(e){return d}};
  const hr=today.getHours();
  const greeting=hr<12?'Good morning':'Good afternoon';

  // ── 3-day window ──
  const _d3=new Date(today);_d3.setDate(_d3.getDate()+3);
  const d3Short=_dk(_d3);

  // ── LP Status ──
  const dispatched=new Set(D.dispatched);
  const lsrNumbers=D.lsrNumbers||{};
  const lpTrucks={};
  for(const r of D.generatedPlan){if(!lpTrucks[r.truckId])lpTrucks[r.truckId]={id:r.truckId,date:r.date,dest:r.destination,plt:0,qty:0};lpTrucks[r.truckId].plt+=r.pallets||0;lpTrucks[r.truckId].qty+=r.qty||0}
  const lpList=Object.values(lpTrucks);
  const lpMaxPlt=D.maxPallets||26;
  const nom=D.nomenclature||{};
  const clDisp=d=>D.destNames[d]||d;

  // Total demand from materialPlan (includes held items)
  const _isTruck=d=>{const u=(d||'').toUpperCase();return u.includes('MEX')||u.includes('CAN')||u.includes('RIC')};
  const _allDemand=(D.materialPlan||[]).filter(d=>_isTruck(d.destination));
  const lpTotalQty=_allDemand.reduce((s,d)=>s+(d.effQty||0),0);
  const lpTotalPlt=Math.round(_allDemand.reduce((s,d)=>{const n=nom[d.sku];const pq=n?.palletQty||0;const ps=n?.palletSpc||0;return s+(pq>0?(d.effQty||0)/pq*ps:0)},0));
  const lpTotalTrucks=lpMaxPlt>0?Math.ceil(lpTotalPlt/lpMaxPlt):0;
  const lpTotal=Math.max(lpList.length,lpTotalTrucks);

  const lpDispatched=lpList.filter(t=>dispatched.has(t.id)&&lsrNumbers[t.id]&&t.date<=dShort).length;
  const lpReady=lpList.filter(t=>dispatched.has(t.id)&&lsrNumbers[t.id]&&t.date>dShort).length;
  const lpPending=lpTotal-lpDispatched-lpReady;
  const lpPctDone=lpTotal>0?Math.round(lpDispatched/lpTotal*100):0;

  // ── LM Status (pre-computed with dedup in index.html) ──
  const _lm=D.lmTotals||{trucks:0,cort:0,cortPcs:0,items:0,dispatched:0};
  const lmTrucks=_lm.trucks;
  const lmCort=_lm.cort;
  const lmCortPcs=_lm.cortPcs;
  const lmItems=_lm.items;
  const _stpQty=D.stpQty||0;

  // ── Inbounds ──
  const contMap={};
  for(const a of D.arrivals){
    const key=a.container||a._localName||('Ungrouped-'+(a.arrivalDate||'?'));
    const isLocal=!!a._localName||!a.container;
    if(!contMap[key])contMap[key]={name:a._localName||a.container||'Ungrouped',readyDate:a.readyDate||'—',skuCount:0,skus:{},qty:0,isLocal};
    if(!contMap[key].skus[a.sku]){contMap[key].skus[a.sku]=1;contMap[key].skuCount++}
    contMap[key].qty+=(a.qty||0);
    if(a.readyDate&&a.readyDate<contMap[key].readyDate)contMap[key].readyDate=a.readyDate;
  }
  const allInbounds=Object.values(contMap).sort((a,b)=>(a.readyDate||'').localeCompare(b.readyDate||''));
  const arrived=allInbounds.filter(c=>c.readyDate<=dShort);
  const upcoming=allInbounds.filter(c=>c.readyDate>dShort);
  const upcoming3d=upcoming.filter(c=>c.readyDate<=d3Short);

  // ── Outbounds ──
  // Include all non-sent LP trucks: pending (not locked) + ready (locked+LSR but date > today)
  const _isSent=t=>dispatched.has(t.id)&&lsrNumbers[t.id]&&t.date<=dShort;
  const _isReady=t=>dispatched.has(t.id)&&lsrNumbers[t.id]&&t.date>dShort;
  const pendingShips=lpList.filter(t=>_isReady(t)).sort((a,b)=>a.date.localeCompare(b.date));
  const nextToShip=pendingShips.filter(t=>t.date<=d3Short);
  const nextToShipDisplay=nextToShip.length>0?nextToShip:pendingShips.slice(0,4);

  // ── Late Arrivals (from LM All Venues dashboard) — exclude +0d items ──
  const lmLate=(D.lmLateArrivals||[]).filter(l=>l.daysLate!=null&&l.daysLate>0);
  const lateByDest={};
  for(const it of lmLate){
    if(!lateByDest[it.dest])lateByDest[it.dest]={dest:it.dest,path:it.path||'',skus:new Set(),trucks:new Set(),items:[],qty:0,maxDays:0};
    lateByDest[it.dest].items.push(it);
    lateByDest[it.dest].skus.add(it.sku);
    lateByDest[it.dest].trucks.add(it.truckId);
    lateByDest[it.dest].qty+=(it.qty||0);
    if(it.daysLate!=null&&it.daysLate>lateByDest[it.dest].maxDays)lateByDest[it.dest].maxDays=it.daysLate;
  }

  // ── Kickoff ──
  const daysToKickoff=Math.round((new Date('2026-06-11T12:00:00')-today)/86400000);

  // ── Generate Excel → upload to Supabase ──
  let downloadUrl='';
  const statusEl=document.getElementById('uploadStatus');
  try{
    statusEl.textContent='Generating Excel...';
    const wb=new ExcelJS.Workbook();
    const _hdr=ws=>{const r=ws.getRow(1);r.font={bold:true,size:10};r.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF0F1F3'}};r.border={bottom:{style:'medium',color:{argb:'FFE2E4E9'}}};ws.views=[{state:'frozen',ySplit:1}]};
    const _fmtD=d=>(d&&d!=='—'&&d!=='In stock')?new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):(d==='In stock'?'In stock':'—');

    // Sheet 1: Assembly Timeline
    const asmRows=D.asmTimeline||[];
    const ws1=wb.addWorksheet('Assembly Timeline');
    ws1.columns=[{header:'Arrives Dallas',key:'arrDal',width:16},{header:'Leaves Dallas',key:'lpDep',width:16},{header:'Arrives Satellite',key:'arrWhs',width:16},{header:'Leaves Satellite',key:'lvWhs',width:14},{header:'Bump-in',key:'bumpin',width:14},{header:'Truck',key:'truckId',width:10},{header:'Assembly At',key:'whs',width:22},{header:'Ship To',key:'dest',width:30},{header:'SKU',key:'sku',width:18},{header:'Item',key:'nm',width:35},{header:'Source',key:'src',width:10},{header:'Qty',key:'qty',width:10},{header:'Status',key:'status',width:16}];
    _hdr(ws1);
    for(const r of asmRows){
      const arrDal=r.inStock?'In stock':_fmtD(r.arrivesDallas);
      const _dL=r.arrivesDallas&&r.arrivesDallas!=='in-stock'&&r.lpDeparts&&r.arrivesDallas>r.lpDeparts;
      const _sL=r.arrivesWhs&&r.leavesWhs&&r.arrivesWhs>r.leavesWhs;
      const days=_dL?Math.round((new Date(r.arrivesDallas+'T12:00:00')-new Date(r.lpDeparts+'T12:00:00'))/86400000):(_sL?Math.round((new Date(r.arrivesWhs+'T12:00:00')-new Date(r.leavesWhs+'T12:00:00'))/86400000):0);
      const status=r.notInLp?'Not in LP':(!r.arrivesWhs&&!r.arrivesDallas)?'—':_dL?days+'d late (Dallas)':_sL?days+'d late':'On time';
      ws1.addRow({arrDal,lpDep:r.notInLp?'Not in LP':_fmtD(r.lpDeparts),arrWhs:r.notInLp?'Not in LP':_fmtD(r.arrivesWhs),lvWhs:_fmtD(r.leavesWhs),bumpin:_fmtD(r.bumpin),truckId:r.truckId,whs:r.whs||'',dest:r.dest,sku:r.sku,nm:r.nm,src:r.src,qty:r.qty,status});
    }
    ws1.getColumn('qty').numFmt='#,##0';ws1.getColumn('qty').alignment={horizontal:'right'};

    // Sheet 2: Kitting Timeline
    const kitRows=D.kitTimeline||[];
    const ws2=wb.addWorksheet('Kitting Timeline');
    ws2.columns=[{header:'Dispatch',key:'dd',width:14},{header:'Truck',key:'truckId',width:10},{header:'Destination',key:'dest',width:28},{header:'Type',key:'kitType',width:12},{header:'Kit',key:'kitName',width:22},{header:'Venue',key:'venue',width:28},{header:'Component SKU',key:'compSku',width:18},{header:'Component',key:'compNm',width:35},{header:'Qty',key:'compQty',width:8},{header:'Readiness',key:'readiness',width:12}];
    _hdr(ws2);
    for(const r of kitRows){(r.items||[]).forEach((item,i)=>{const n=D.nom[item.sku];ws2.addRow({dd:i===0?_fmtD(r.dd):'',truckId:i===0?r.truckId:'',dest:i===0?r.dest:'',kitType:i===0?r.kitType:'',kitName:i===0?r.kitName:'',venue:i===0?r.venue:'',compSku:item.sku,compNm:n?.nm||item.sku,compQty:item.qty,readiness:i===0?r.readiness?.pct+'%':''})})}
    ws2.getColumn('compQty').numFmt='#,##0';ws2.getColumn('compQty').alignment={horizontal:'right'};

    // Sheet 3: Late Arrivals (from LM All Venues — matching dashboard Late Engine)
    const _xlLate=(D.lmLateArrivals||[]).filter(l=>l.daysLate!=null&&l.daysLate>0);
    const ws3=wb.addWorksheet('Late Arrivals');
    ws3.columns=[
      {header:'Destination',key:'dest',width:32},{header:'Path',key:'path',width:8},
      {header:'SKU',key:'sku',width:18},{header:'Item',key:'name',width:35},{header:'Source',key:'src',width:10},
      {header:'Truck',key:'truckId',width:10},
      {header:'Arrives Dallas',key:'rawArr',width:14},{header:'Ready Dallas',key:'arrDal',width:14},
      {header:'LP Ship',key:'lpShip',width:14},{header:'Arrives WHS',key:'satArr',width:14},
      {header:'WHS Processing',key:'whsProc',width:14},
      {header:'LM Dispatch',key:'dispatch',width:14},{header:'Bump-in',key:'bumpin',width:14},
      {header:'Why Late',key:'lateType',width:20},{header:'Days Late',key:'daysLate',width:10},
      {header:'Qty',key:'qty',width:10}
    ];
    _hdr(ws3);
    for(const r of [..._xlLate].sort((a,b)=>(b.daysLate||0)-(a.daysLate||0))){
      ws3.addRow({dest:r.dest,path:r.path||'',sku:r.sku,name:r.name,src:r.src||'—',truckId:r.truckId,
        rawArr:r.rawArrival==='In stock'?'In stock':_fmtD(r.rawArrival),
        arrDal:r.arrDallas==='In stock'?'':_fmtD(r.arrDallas),
        lpShip:r.path==='LP'?(r.notInLp?'None':_fmtD(r.lpShip)):'—',
        satArr:r.path==='LP'?(r.notInLp?'None':_fmtD(r.satArr)):'—',
        whsProc:r.whsProc>0?r.whsProc+'d':'—',
        dispatch:_fmtD(r.dispatch),bumpin:_fmtD(r.bumpin),
        lateType:r.notInLp?'Not in LP plan':r.lateType||'—',daysLate:r.daysLate,qty:r.qty})
    }
    ws3.getColumn('daysLate').numFmt='#,##0';ws3.getColumn('daysLate').alignment={horizontal:'right'};
    ws3.getColumn('qty').numFmt='#,##0';ws3.getColumn('qty').alignment={horizontal:'right'};
    _xlLate.forEach((_,i)=>{try{ws3.getRow(i+2).getCell('daysLate').font={bold:true,color:{argb:'FFC62A2F'}}}catch(e){}});

    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});

    // Save blob for local download button
    window._digestExcelBlob=blob;
    window._digestExcelName='FF&E_Digest_'+dShort+'.xlsx';

    // Upload to Supabase Storage
    if(D.sbUrl&&D.sbKey){
      try{
        statusEl.textContent='Uploading to cloud...';
        const SB=supabase.createClient(D.sbUrl,D.sbKey);
        await SB.storage.createBucket('digests',{public:true,fileSizeLimit:52428800}).catch(()=>{});
        const{error:upErr}=await SB.storage.from('digests').upload('FF&E_Digest_'+dShort+'.xlsx',blob,{upsert:true,contentType:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
        if(upErr)throw upErr;
        const{data:urlData}=SB.storage.from('digests').getPublicUrl('FF&E_Digest_'+dShort+'.xlsx');
        if(urlData?.publicUrl)downloadUrl=urlData.publicUrl;
        statusEl.textContent='Uploaded';statusEl.style.color='#12804A';
      }catch(storageErr){
        console.warn('Upload failed:',storageErr);
        statusEl.textContent='Upload failed — local download available';statusEl.style.color='#C4550A';
      }
    }
  }catch(e){console.error('Excel error:',e);statusEl.textContent='Excel error';statusEl.style.color='#C62828'}

  // ── Build Outlook-safe HTML email ──
  // MUST declare _T before any helpers that reference it
  const _T='border-collapse:collapse;border-spacing:0;mso-table-lspace:0pt;mso-table-rspace:0pt;';
  const _B='border:none;';// reset all borders on td
  const _stat=(label,value,color,sub)=>'<td width="25%" valign="top" style="padding:4px;'+_B+'"><table width="100%" cellpadding="0" cellspacing="0" border="0" style="'+_T+'"><tr><td bgcolor="#F4F5F7" style="padding:12px 8px;border-left:4px solid '+color+';border-top:none;border-right:none;border-bottom:none" align="center"><b style="font-size:20px;font-family:Courier New,monospace">'+value+'</b><br><span style="font-size:11px">'+label+'</span>'+(sub?'<br><span style="font-size:10px">'+sub+'</span>':'')+'</td></tr></table></td>';
  const _trow=(cells,bg)=>'<tr>'+cells.map(c=>'<td bgcolor="'+(bg||'#ffffff')+'" style="padding:6px 10px;font-size:12px;border-bottom:1px solid #E8E8ED;border-top:none;border-left:none;border-right:none;'+(c.style||'')+'">'+c.v+'</td>').join('')+'</tr>';
  const _sec=(emoji,title,color)=>'<tr><td style="padding:20px 32px 8px;'+_B+'"><table width="100%" cellpadding="0" cellspacing="0" border="0" style="'+_T+'"><tr><td style="border-bottom:2px solid '+color+';border-top:none;border-left:none;border-right:none;padding-bottom:6px"><span style="font-size:14px;font-weight:700;color:'+color+'">'+emoji+' '+title+'</span></td></tr></table></td></tr>';
  let html='<!--[if mso]><style type="text/css">table{border-collapse:collapse;mso-table-lspace:0pt;mso-table-rspace:0pt}td{mso-line-height-rule:exactly;border:none}img{-ms-interpolation-mode:bicubic}</style><![endif]-->'+
  '<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#F0F0F5" style="'+_T+'margin:0;padding:0;width:100%;background:#F0F0F5;font-family:Segoe UI,Helvetica,Arial,sans-serif">'+
  '<tr><td align="center" valign="top" bgcolor="#F0F0F5" style="padding:20px 10px;background:#F0F0F5;border:none">'+
  '<!--[if mso]><table role="presentation" cellpadding="0" cellspacing="0" border="0" width="800" align="center" style="'+_T+'"><tr><td style="border:none"><![endif]-->'+
  '<table role="presentation" cellpadding="0" cellspacing="0" border="0" bgcolor="#ffffff" style="'+_T+'margin:0 auto;max-width:800px;width:100%">'+
  '<tr><td bgcolor="#4A148C" style="padding:28px 32px;color:#ffffff;font-family:Segoe UI,Helvetica,Arial,sans-serif;'+_B+'">'+
    '<span style="font-size:11px;color:#C5B3E6">FIFA WORLD CUP 2026&#8482; &middot; FF&amp;E SUPPLY CHAIN</span><br>'+
    '<b style="font-size:26px;color:#ffffff">FF&amp;E Daily Digest</b><br>'+
    '<span style="font-size:14px;color:#E8D5F0">'+dStr+'</span>'+
  '</td></tr>'+
  '<tr><td style="padding:24px 32px 16px;'+_B+'">'+
    '<table cellpadding="0" cellspacing="0" border="0" style="'+_T+'"><tr><td style="font-size:15px;color:#333333;font-family:Segoe UI,Helvetica,Arial,sans-serif;padding-bottom:12px;'+_B+'">'+greeting+' Team,</td></tr>'+
    '<tr><td style="font-size:13px;color:#666666;font-family:Segoe UI,Helvetica,Arial,sans-serif;'+_B+'">Here is today&#8217;s FF&amp;E Supply Chain update. Please share with relevant teams and stakeholders.</td></tr></table>'+
  '</td></tr>'+
  '<tr><td style="padding:0 32px 20px;'+_B+'"><table width="100%" cellpadding="0" cellspacing="0" border="0" style="'+_T+'"><tr>'+
    '<td bgcolor="#F0EBFE" align="center" style="padding:16px 24px;'+_B+'">'+
      '<span style="font-size:42px;font-weight:800;color:#4A148C;font-family:Courier New,monospace">'+daysToKickoff+'</span><br>'+
      '<span style="font-size:12px;font-weight:600;color:#751312;font-family:Segoe UI,Helvetica,Arial,sans-serif">DAYS TO KICKOFF &middot; JUN 11</span>'+
    '</td></tr></table></td></tr>';

  // ── Shared values for status sections ──
  const _stpCount=D.stpTrucks||0;
  const _totalItems=D.lmTotalItems>0?D.lmTotalItems:lmItems;
  const _venues=D.venueCount||217;
  const _allTrucks=lpTotal+lmTrucks+lmCort+_stpCount;
  const _segDisp=_allTrucks>0?Math.round(lpDispatched/_allTrucks*100):0;
  const _segReady=_allTrucks>0?Math.round(lpReady/_allTrucks*100):0;

  // ── Overall ──
  html+=_sec('&#127758;','Overall Project Status','#00897B');
  html+='<tr><td style="padding:0 32px 20px"><table width="100%" cellpadding="0" cellspacing="0" bgcolor="#E0F7F3" style="'+_T+'">';
  html+='<tr>'+_stat('items',_totalItems.toLocaleString(),'#00897B')+_stat('venues',_venues,'#4A148C')+_stat('trucks',_allTrucks,'#304FFE')+_stat('dispatched',lpDispatched,'#12804A')+'</tr>';
  html+='<tr><td colspan="4" style="padding:8px 16px 12px">';
  html+='<table width="100%" cellpadding="0" cellspacing="0"><tr><td bgcolor="#E8E8ED" style="height:10px;padding:0">';
  html+='<table width="100%" cellpadding="0" cellspacing="0" style="table-layout:fixed"><tr>';
  if(_segDisp>0)html+='<td bgcolor="#12804A" style="height:10px;padding:0;width:'+_segDisp+'%;font-size:1px">&nbsp;</td>';
  if(_segReady>0)html+='<td bgcolor="#304FFE" style="height:10px;padding:0;width:'+_segReady+'%;font-size:1px">&nbsp;</td>';
  html+='<td style="height:10px;padding:0;font-size:1px">&nbsp;</td>';
  html+='</tr></table></td></tr></table>';
  html+='<table cellpadding="0" cellspacing="0" align="center" style="margin-top:4px"><tr>';
  html+='<td bgcolor="#12804A" style="width:10px;height:10px;font-size:1px">&nbsp;</td><td style="padding:0 12px 0 4px;font-size:10px;font-weight:600">'+lpDispatched+' dispatched</td>';
  html+='<td bgcolor="#304FFE" style="width:10px;height:10px;font-size:1px">&nbsp;</td><td style="padding:0 0 0 4px;font-size:10px;font-weight:600">'+lpReady+' ready</td>';
  html+='</tr></table>';
  html+='</td></tr></table></td></tr>';

  // ── LP ──
  html+=_sec('&#128230;','Load Plan &#8212; Dallas &#8594; Regional / Satellite Warehouses','#4A148C');
  html+='<tr><td style="padding:0 32px 20px"><table width="100%" cellpadding="0" cellspacing="0" bgcolor="#F8F8FC" style="'+_T+'">';
  html+='<tr>'+_stat(lpTotal+' trucks',lpTotalPlt.toLocaleString(),'#4A148C')+_stat('dispatched ('+lpPctDone+'%)',lpDispatched,'#12804A')+_stat('ready',lpReady,'#304FFE')+_stat('pending',lpPending,'#C4550A')+'</tr>';

          {v:'<span style="color:#C62828;font-weight:600">'+fD(t.date)+'</span>',style:'color:#C62828'},
          {v:'<span style="font-family:Courier New,monospace;font-weight:700">'+t.id+'</span>'+(t.lsr?'<br><span style="font-size:9px;color:#888">LSR '+t.lsr+'</span>':'')},
          {v:'<span style="font-size:10px;font-weight:700;color:'+typeClr+';background:'+typeBg+';padding:2px 6px">'+t.type+'</span>'},
          {v:t.dest},
          {v:_st},
          {v:t.pallets,style:'text-align:right;font-family:Courier New,monospace;font-weight:600'}
        ],bg);
        _outRowIdx++;
      }
    }
    if(onTime.length===0&&overdue.length===0){
      html+='<tr><td colspan="6" bgcolor="#F9F9FB" style="padding:5px 10px;font-size:11px;color:#BBB;border-bottom:1px solid #E8E8ED">'+dayLabel+' &#8212; <span style="font-style:italic">No dispatches</span></td></tr>';
    }else if(onTime.length>0){
      for(let j=0;j<onTime.length;j++){
        const t=onTime[j];const bg=_outRowIdx%2?'#FAFBFC':'#ffffff';
        const typeClr=t.type==='LP'?'#4A148C':'#304FFE';
        const typeBg=t.type==='LP'?'#F0EBFE':'#E3F2FD';
        const _st=t.status==='ready'?'<span style="font-size:9px;font-weight:700;color:#304FFE;background:#E3F2FD;padding:2px 6px">READY</span>':'<span style="font-size:9px;font-weight:700;color:#C4550A;background:#FEF3EB;padding:2px 6px">PENDING</span>';
        html+=_trow([
          {v:j===0?'<span style="font-weight:700">'+dayLabel+'</span>':''},
          {v:'<span style="font-family:Courier New,monospace;font-weight:700">'+t.id+'</span>'+(t.lsr?'<br><span style="font-size:9px;color:#888">LSR '+t.lsr+'</span>':'')},
          {v:'<span style="font-size:10px;font-weight:700;color:'+typeClr+';background:'+typeBg+';padding:2px 6px">'+t.type+'</span>'},
          {v:t.dest},
          {v:_st},
          {v:t.pallets,style:'text-align:right;font-family:Courier New,monospace;font-weight:600'}
        ],bg);
        _outRowIdx++;
      }
    }
  }
  html+='</table></td></tr>';

  const _lateDestKeys=Object.keys(lateByDest).sort((a,b)=>lateByDest[b].maxDays-lateByDest[a].maxDays);
  const _lateTotalSKUs=[...new Set(lmLate.map(l=>l.sku))].length;
  const _lateTotalTrucks=[...new Set(lmLate.map(l=>l.truckId))].length;
  const _lateTotalQty=lmLate.reduce((s,l)=>s+(l.qty||0),0);
  const _maxLateAll=lmLate.length>0?Math.max(...lmLate.filter(l=>l.daysLate!=null).map(l=>l.daysLate),0):0;

  html+=
  _sec('&#9888;&#65039;','Risks &#8212; Late Arrivals','#C62828')+
  '<tr><td style="padding:0 32px 20px">'+
  (lmLate.length===0?
    '<table width="100%" cellpadding="0" cellspacing="0"><tr><td bgcolor="#E6F5ED" style="padding:14px 18px;font-size:13px;color:#12804A;font-weight:600;border:none">&#10004; No late arrival risks detected. All items on track.</td></tr></table>'
  :
    '<table width="100%" cellpadding="0" cellspacing="0" border="0" style="'+_T+'">'+
    '<tr><td colspan="6" bgcolor="#FDEBED" style="padding:12px 18px;font-size:13px;color:#C62828;font-weight:600;border:none">'+
      lmLate.length+' items &middot; '+_lateTotalSKUs+' SKUs &middot; '+_lateTotalTrucks+' trucks &middot; max +'+_maxLateAll+'d'+
    '</td></tr>'+
    '<tr bgcolor="#FDEBED"><td style="padding:6px 10px;font-size:10px;font-weight:700;color:#C62828">DESTINATION</td><td style="padding:6px 10px;font-size:10px;font-weight:700;color:#C62828">PATH</td><td style="padding:6px 10px;font-size:10px;font-weight:700;color:#C62828;text-align:right">SKUs</td><td style="padding:6px 10px;font-size:10px;font-weight:700;color:#C62828;text-align:right">TRUCKS</td><td style="padding:6px 10px;font-size:10px;font-weight:700;color:#C62828;text-align:right">QTY</td><td style="padding:6px 10px;font-size:10px;font-weight:700;color:#C62828;text-align:right">MAX LATE</td></tr>'+
    _lateDestKeys.map((dest,i)=>{const d=lateByDest[dest];return _trow([
      {v:'<b>'+dest+'</b>'},
      {v:d.path||'—',style:'font-weight:600'},
      {v:d.skus.size,style:'text-align:right;font-weight:600'},
      {v:d.trucks.size,style:'text-align:right;font-weight:600'},
      {v:d.qty.toLocaleString(),style:'text-align:right;font-family:Courier New,monospace;font-weight:600'},
      {v:'<span style="color:#C62828;font-weight:800">+'+d.maxDays+'d</span>',style:'text-align:right'}
    ],i%2?'#FFF8F8':'#fff')}).join('')+
    '<tr bgcolor="#F0F1F3" style="font-weight:700;border-top:2px solid #F5B8BA"><td style="padding:6px 10px;font-size:10px">Total &middot; '+_lateDestKeys.length+' destinations</td><td style="padding:6px 10px"></td><td style="padding:6px 10px;font-size:10px;text-align:right">'+_lateTotalSKUs+'</td><td style="padding:6px 10px;font-size:10px;text-align:right">'+_lateTotalTrucks+'</td><td style="padding:6px 10px;font-size:10px;text-align:right;font-family:Courier New,monospace">'+_lateTotalQty.toLocaleString()+'</td><td style="padding:6px 10px;font-size:10px;text-align:right;color:#C62828;font-weight:800">+'+_maxLateAll+'d</td></tr>'+
    '</table>'
  )+'</td></tr>'+
  (downloadUrl?
    '<tr><td style="padding:0 32px 24px"><table width="100%" cellpadding="0" cellspacing="0"><tr>'+
      '<td bgcolor="#F0EBFE" style="padding:18px 24px;border:none">'+
        '<b style="font-size:12px">&#128206; Reports &amp; Links</b><br><br>'+
        '<table width="100%" cellpadding="0" cellspacing="0" border="0">'+
          '<tr><td bgcolor="#F4F5F7" style="padding:8px 14px;border-bottom:1px solid #E2E4E9">&#128202; <a href="'+downloadUrl+'" style="color:#4A148C;font-size:12px;font-weight:600;text-decoration:none">Download Excel Report</a> <span style="font-size:10px;color:#888">(Assembly Timeline &middot; Kitting Timeline &middot; Late Arrivals)</span></td></tr>'+
          '<tr><td bgcolor="#F4F5F7" style="padding:8px 14px;border-bottom:1px solid #E2E4E9">&#127760; <a href="https://ml3000.smmarta.com/supply-chain-overview.html" style="color:#4A148C;font-size:12px;font-weight:600;text-decoration:none">FF&amp;E Supply Chain Overview</a></td></tr>'+
          '<tr><td bgcolor="#F4F5F7" style="padding:8px 14px;border-bottom:1px solid #E2E4E9">&#128214; <a href="https://ecatalogs.plytix.com/68a86f753a74399b2298f8ee" style="color:#4A148C;font-size:12px;font-weight:600;text-decoration:none">Product Catalog &amp; Assembly Instructions</a></td></tr>'+
          '<tr><td bgcolor="#F4F5F7" style="padding:8px 14px">&#128230; <a href="https://stwopndhnxcjyomkufii.supabase.co/storage/v1/object/public/digests/Palletisation_Guide.pdf" style="color:#4A148C;font-size:12px;font-weight:600;text-decoration:none">Palletisation Guide (PDF)</a></td></tr>'+
        '</table>'+
      '</td></tr></table></td></tr>'
  :'')+
  '<tr><td bgcolor="#F8F8FC" style="padding:20px 32px;border-top:1px solid #E0E0EE">'+
    '<table cellpadding="0" cellspacing="0"><tr><td style="font-size:11px;color:#888888;font-family:Segoe UI,Helvetica,Arial,sans-serif">Generated from <a href="https://ml3000.smmarta.com" style="color:#4A148C;font-weight:600;text-decoration:none">ML3K</a> &middot; <a href="https://ml3000.smmarta.com" style="color:#4A148C;text-decoration:none">ml3000.smmarta.com</a> &middot; view &middot; me</td></tr>'+
    '<tr><td style="font-size:11px;font-family:Segoe UI,Helvetica,Arial,sans-serif;padding-top:4px;color:#666666;font-weight:600">Materials Management Team</td></tr></table>'+
  '</td></tr></table>'+
  '<!--[if mso]></td></tr></table><![endif]-->'+
  '</td></tr></table>';

  // ── Render ──
  document.getElementById('emailContent').innerHTML=html;
  const mailSubj=encodeURIComponent('FF&E Supply Chain \u2014 '+dStr);

  // ── Wire up buttons ──
  const btnCopy=document.getElementById('btnCopy');
  const btnMail=document.getElementById('btnMail');
  btnCopy.disabled=false;btnMail.disabled=false;
  const btnXl=document.getElementById('btnXl');
  if(window._digestExcelBlob){
    btnXl.style.display='';
    btnXl.onclick=function(){
      var a=document.createElement('a');
      a.href=URL.createObjectURL(window._digestExcelBlob);
      a.download=window._digestExcelName;
      a.click();
      setTimeout(function(){URL.revokeObjectURL(a.href)},1000);
    };
  }

  btnCopy.onclick=async function(){
    const el=document.getElementById('emailContent');
    const rawHtml=el.innerHTML;
    const st=document.getElementById('copyStatus');
    try{
      // Use clipboard API with raw HTML — preserves all inline styles including color
      await navigator.clipboard.write([new ClipboardItem({
        'text/html':new Blob([rawHtml],{type:'text/html'}),
        'text/plain':new Blob([el.innerText],{type:'text/plain'})
      })]);
      st.textContent='Copied! Paste into your email.';
    }catch(e){
      // Fallback: execCommand (may lose some colors)
      const range=document.createRange();range.selectNodeContents(el);
      const sel2=window.getSelection();sel2.removeAllRanges();sel2.addRange(range);
      document.execCommand('copy');sel2.removeAllRanges();
      st.textContent='Copied (basic). Some formatting may differ.';
    }
    st.style.display='inline';
    setTimeout(function(){st.style.display='none'},3000);
  };
  btnMail.onclick=function(){window.location.href='mailto:?subject='+mailSubj};
})();
</script>

<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
<meta charset="UTF-8">
<meta name="x-apple-disable-message-reformatting">
<!--[if mso]>
<noscript><xml><o:OfficeDocumentSettings><o:AllowPNG/><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript>
<style type="text/css">table{border-collapse:collapse;mso-table-lspace:0pt;mso-table-rspace:0pt}td{mso-line-height-rule:exactly}</style>
<![endif]-->
<title>FF&amp;E Daily Digest</title>
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#F0F0F5}
.toolbar{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid #ddd;padding:10px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.toolbar button{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none}
.btn-copy{background:#4A148C;color:#fff}.btn-copy:hover{background:#6A1B9A}
.btn-mail{background:#304FFE;color:#fff}.btn-mail:hover{background:#1E40FF}
.btn-close{background:#eee;color:#333}.btn-close:hover{background:#ddd}
.status{font-size:12px;color:#12804A;font-weight:600;display:none;margin-left:8px}
.loading{padding:60px;text-align:center;color:#888;font-size:14px}
.preview{padding:20px}
</style>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<div class="toolbar">
  <button class="btn-copy" id="btnCopy" disabled>Copy to Clipboard</button>
  <button class="btn-mail" id="btnMail" disabled>Open in Outlook</button>
  <button id="btnXl" style="padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:#12804A;color:#fff;display:none">⬇ Excel Report</button>
  <button class="btn-close" onclick="window.close()">Close</button>
  <span class="status" id="copyStatus">Copied! Paste into your email.</span>
  <span id="uploadStatus" style="font-size:11px;color:#888;margin-left:auto"></span>
</div>
<div class="preview" id="emailContent"><div class="loading">Generating digest...</div></div>

<script>
(async function(){try{
  // ── Load data from sessionStorage ──
  const raw=sessionStorage.getItem('_digestData');
  if(!raw){document.getElementById('emailContent').innerHTML='<div class="loading" style="color:#C62828">No digest data found. Please generate from ML3K.</div>';return}
  const D=JSON.parse(raw);

  const today=new Date();
  const dStr=today.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const _dk=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const dShort=_dk(today);
  const fD=d=>{if(!d||d==='—')return'—';try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}catch(e){return d}};
  const hr=today.getHours();
  const greeting=hr<12?'Good morning':'Good afternoon';

  // ── FA Goods lookup ──
  const _faItems=D.faItems||[];
  const _faByTruck={};// truckRef → [{sku,name,qty,pallets,venue}]
  const _faByKit={};
  for(const it of _faItems){
    if(it.linkedTruck){if(!_faByTruck[it.linkedTruck])_faByTruck[it.linkedTruck]=[];_faByTruck[it.linkedTruck].push(it)}
    if(it.linkedKit){if(!_faByKit[it.linkedKit])_faByKit[it.linkedKit]=[];_faByKit[it.linkedKit].push(it)}
  }
  // Match FA to LP truck by ID
  const _faForLP=tid=>{const k='LP-'+tid;return _faByTruck[k]||null};
  // Match FA to LM truck by dest substring
  const _faForLM=(dest,lsr)=>{for(const k in _faByTruck){if(k.startsWith('LP-'))continue;if(dest&&k.includes(dest))return _faByTruck[k];if(lsr&&k.includes(lsr))return _faByTruck[k]}return null};
  const _faBadgeHtml=(items)=>{if(!items||!items.length)return'';const qty=items.reduce((s,i)=>s+i.qty,0);const fas=[...new Set(items.map(i=>i.fa||'FA'))].join(', ');return' <span style="font-size:9px;font-weight:700;color:#0891B2;background:#ECFEFF;padding:2px 6px;border:1px solid #A5F3FC">&#128230; '+fas+' '+items.length+' &middot; '+qty+'qty</span>'};
  if(_faItems.length)console.log('[Digest] FA:',_faItems.length,'items, trucks:',Object.keys(_faByTruck),'kits:',Object.keys(_faByKit));

  // ── Football "On This Day" icebreaker (ESPN historical matches) ──
  let footballFact='';
  try{
    // Try multiple years to find the most interesting match for this date
    const _years=[2024,2023,2022,2021,2019,2018,2017,2016,2015,2014,2013,2012,2011,2010];
    const mm=String(today.getMonth()+1).padStart(2,'0');
    const dd=String(today.getDate()).padStart(2,'0');
    let bestMatch=null;
    // Priority keywords for notable matches
    const _priKw=/world cup|champions league|euro |copa |nations league/i;
    const _intlKw=/international|friendly|qualifier|eliminatori/i;
    for(const yr of _years){
      try{
        const espnUrl='https://site.api.espn.com/apis/site/v2/sports/soccer/all/scoreboard?dates='+yr+mm+dd;
        const r=await fetch(espnUrl);
        if(!r.ok)continue;
        const d=await r.json();
        const evts=d.events||[];
        for(const ev of evts){
          const comp=ev.competitions?.[0];if(!comp)continue;
          const teams=comp.competitors||[];if(teams.length<2)continue;
          const t1=teams.find(t=>t.homeAway==='home')||teams[0];
          const t2=teams.find(t=>t.homeAway==='away')||teams[1];
          const s1=t1.score||'?';const s2=t2.score||'?';
          const n1=t1.team?.displayName||t1.team?.name||'?';
          const n2=t2.team?.displayName||t2.team?.name||'?';
          const league=ev.league?.name||ev.name||'';
          const status=comp.status?.type?.completed;
          if(!status)continue;// skip unfinished
          const entry={y:yr,home:n1,away:n2,s1,s2,league,totalGoals:parseInt(s1)+parseInt(s2)};
          // Prioritize: World Cup/UCL > international > high-scoring
          if(_priKw.test(league)){bestMatch=entry;break}
          if(!bestMatch&&_intlKw.test(league))bestMatch=entry;
          if(!bestMatch||(entry.totalGoals>bestMatch.totalGoals))bestMatch=entry;
        }
        if(bestMatch&&_priKw.test(bestMatch.league))break;// found a top-tier match
      }catch(e){continue}
    }
    if(bestMatch){
      const{y,home,away,s1,s2,league}=bestMatch;
      let funFact='';
      // Ask AI for an interesting fact about this specific match
      try{
        const aiProvider=localStorage.getItem('hs-ai-provider')||'';
        const aiKey=localStorage.getItem('hs-ai-key')||'';
        if(aiProvider&&aiKey){
          const sys='Return ONLY a JSON object: {"fact":"one fun sentence under 80 chars"}. No markdown.';
          const usr=home+' '+s1+'-'+s2+' '+away+' on '+today.toLocaleDateString('en-US',{month:'long'})+' '+today.getDate()+', '+y+(league?' ('+league+')':'')+'. Give one interesting or fun fact about this match — a record broken, a famous goal, a milestone, or a quirky detail. If you don\'t know anything specific, return {"fact":""}';
          let text='';
          if(aiProvider==='claude'){
            const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':aiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:120,system:sys,messages:[{role:'user',content:usr}]})});
            if(r.ok){const d=await r.json();text=d?.content?.[0]?.text||''}
          }else if(aiProvider==='openai'){
            const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+aiKey},body:JSON.stringify({model:'gpt-4o-mini',messages:[{role:'system',content:sys},{role:'user',content:usr}],max_completion_tokens:120})});
            if(r.ok){const d=await r.json();text=d?.choices?.[0]?.message?.content||''}
          }else if(aiProvider==='gemini'){
            const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+aiKey,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({systemInstruction:{parts:[{text:sys}]},contents:[{parts:[{text:usr}]}],generationConfig:{temperature:0.7,maxOutputTokens:120}})});
            if(r.ok){const d=await r.json();text=d?.candidates?.[0]?.content?.parts?.[0]?.text||''}
          }
          if(text){
            const j=JSON.parse(text.replace(/```json?\s*/g,'').replace(/```\s*/g,'').trim());
            if(j.fact)funFact=' — '+j.fact;
          }
        }
      }catch(e){/* AI fun fact is optional */}
      footballFact='&#9917; <b>On This Day ('+y+')</b>: '+home+' '+s1+'&#8211;'+s2+' '+away+(league?' ('+league+')':'')+funFact;
    }
  }catch(e){console.warn('Football fact fetch skipped:',e)}

  // ── 3-day window ──
  const _d3=new Date(today);_d3.setDate(_d3.getDate()+3);
  const d3Short=_dk(_d3);

  // ── LP Status ──
  const dispatched=new Set(D.dispatched);
  const lsrNumbers=D.lsrNumbers||{};
  const lpHolds=new Set(D.holds||[]);
  const lpStockHolds=new Set(D.stockHolds||[]);
  const lpTrucks={};
  for(const r of D.generatedPlan){if(!lpTrucks[r.truckId])lpTrucks[r.truckId]={id:r.truckId,date:r.date,dest:r.destination,plt:0,qty:0};lpTrucks[r.truckId].plt+=r.pallets||0;lpTrucks[r.truckId].qty+=r.qty||0}
  const lpList=Object.values(lpTrucks);
  const lpMaxPlt=D.maxPallets||26;
  const nom=D.nomenclature||{};
  const clDisp=d=>D.destNames[d]||d;

  // Total demand from materialPlan (includes held items)
  const _isTruck=d=>{const u=(d||'').toUpperCase();return u.includes('MEX')||u.includes('CAN')||u.includes('RIC')};
  const _allDemand=(D.materialPlan||[]).filter(d=>_isTruck(d.destination));
  const lpTotalQty=_allDemand.reduce((s,d)=>s+(d.effQty||0),0);
  const lpTotalPlt=Math.round(_allDemand.reduce((s,d)=>{const n=nom[d.sku];const pq=n?.palletQty||0;const ps=n?.palletSpc||0;return s+(pq>0?(d.effQty||0)/pq*ps:0)},0));
  const lpTotalTrucks=lpMaxPlt>0?Math.ceil(lpTotalPlt/lpMaxPlt):0;
  const lpTotal=Math.max(lpList.length,lpTotalTrucks);

  const lpDispatched=lpList.filter(t=>dispatched.has(t.id)&&lsrNumbers[t.id]&&t.date<=dShort).length;
  const lpReady=lpList.filter(t=>dispatched.has(t.id)&&lsrNumbers[t.id]&&t.date>dShort).length;
  const lpPending=lpTotal-lpDispatched-lpReady;
  const lpPctDone=lpTotal>0?Math.round(lpDispatched/lpTotal*100):0;

  // ── LM Status (pre-computed with dedup in index.html) ──
  const _lm=D.lmTotals||{trucks:0,cort:0,cortPcs:0,items:0,dispatched:0};
  const lmTrucks=_lm.trucks;
  const lmCort=_lm.cort;
  const lmCortPcs=_lm.cortPcs;
  const lmItems=_lm.items;
  const _stpQty=D.stpQty||0;

  // ── Inbounds ──
  const contMap={};
  for(const a of D.arrivals){
    const key=a.container||a._localName||('Ungrouped-'+(a.arrivalDate||'?'));
    const isLocal=!!a._localName||!a.container;
    if(!contMap[key])contMap[key]={name:a._localName||a.container||'Ungrouped',readyDate:a.readyDate||'—',skuCount:0,skus:{},qty:0,isLocal};
    if(!contMap[key].skus[a.sku]){contMap[key].skus[a.sku]=1;contMap[key].skuCount++}
    contMap[key].qty+=(a.qty||0);
    if(a.readyDate&&a.readyDate<contMap[key].readyDate)contMap[key].readyDate=a.readyDate;
  }
  const allInbounds=Object.values(contMap).sort((a,b)=>(a.readyDate||'').localeCompare(b.readyDate||''));
  const arrived=allInbounds.filter(c=>c.readyDate<=dShort);
  const upcoming=allInbounds.filter(c=>c.readyDate>dShort);
  const upcoming3d=upcoming.filter(c=>c.readyDate<=d3Short);

  // ── Outbounds ──
  // Include all non-sent LP trucks: pending (not locked) + ready (locked+LSR but date > today)
  const _isSent=t=>dispatched.has(t.id)&&lsrNumbers[t.id]&&t.date<=dShort;
  const _isReady=t=>dispatched.has(t.id)&&lsrNumbers[t.id]&&t.date>dShort;
  const pendingShips=lpList.filter(t=>_isReady(t)).sort((a,b)=>a.date.localeCompare(b.date));
  const nextToShip=pendingShips.filter(t=>t.date<=d3Short);
  const nextToShipDisplay=nextToShip.length>0?nextToShip:pendingShips.slice(0,4);

  // ── Late Arrivals (from LM All Venues dashboard) — exclude +0d items ──
  const lmLate=(D.lmLateArrivals||[]).filter(l=>(l.daysLate!=null&&l.daysLate>0)||l._held);
  const lateByDest={};
  for(const it of lmLate){
    if(!lateByDest[it.dest])lateByDest[it.dest]={dest:it.dest,path:it.path||'',skus:new Set(),trucks:new Set(),items:[],qty:0,maxDays:0};
    lateByDest[it.dest].items.push(it);
    lateByDest[it.dest].skus.add(it.sku);
    lateByDest[it.dest].trucks.add(it.truckId);
    lateByDest[it.dest].qty+=(it.qty||0);
    if(it.daysLate!=null&&it.daysLate>lateByDest[it.dest].maxDays)lateByDest[it.dest].maxDays=it.daysLate;
  }

  // ── Kickoff ──
  const daysToKickoff=Math.round((new Date('2026-06-11T12:00:00')-today)/86400000);

  // ── Generate Excel → upload to Supabase ──
  let downloadUrl='';
  const statusEl=document.getElementById('uploadStatus');
  try{
    statusEl.textContent='Generating Excel...';
    const wb=new ExcelJS.Workbook();
    const _hdr=ws=>{const r=ws.getRow(1);const colCount=ws.columns.length;for(let c=1;c<=colCount;c++){const cell=r.getCell(c);cell.font={bold:true,size:10};cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF0F1F3'}};cell.border={bottom:{style:'medium',color:{argb:'FFE2E4E9'}}}}ws.views=[{state:'frozen',ySplit:1}]};
    const _autoFilter=ws=>{const rc=ws.rowCount;const cc=ws.columns.length;if(rc>1&&cc>0)ws.autoFilter={from:{row:1,column:1},to:{row:rc,column:cc}}};
    const _fmtD=d=>(d&&d!=='—'&&d!=='In stock')?new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):(d==='In stock'?'In stock':'—');

    const _greenFill={type:'pattern',pattern:'solid',fgColor:{argb:'FFE6F5ED'}};
    const _greenFont={color:{argb:'FF12804A'},bold:true};

    // Sheet 1: FF&E Arrivals
    const wsArr=wb.addWorksheet('FF&E Arrivals');
    wsArr.columns=[{header:'Arrival Date',key:'arrDate',width:14},{header:'Ready Date',key:'readyDate',width:14},{header:'Source',key:'name',width:22},{header:'Type',key:'type',width:12},{header:'SKU',key:'sku',width:18},{header:'Item',key:'itemName',width:35},{header:'Qty',key:'qty',width:10},{header:'Status',key:'status',width:12}];
    _hdr(wsArr);
    const _arrSorted=[...D.arrivals].sort((a,b)=>(a.arrivalDate||a.readyDate||'').localeCompare(b.arrivalDate||b.readyDate||''));
    for(const a of _arrSorted){
      const isArr=(a.readyDate||'9')<=dShort;
      const isLocal=!!a._localName||!a.container;
      wsArr.addRow({arrDate:_fmtD(a.arrivalDate||a.readyDate),readyDate:_fmtD(a.readyDate),name:a._localName||a.container||'',type:isLocal?'Local':'Container',sku:a.sku,itemName:a.name||'',qty:a.qty,status:isArr?'Arrived':'Upcoming'});
      if(isArr){const row=wsArr.lastRow;row.eachCell(cell=>{cell.fill=_greenFill;cell.font=_greenFont})}
    }
    wsArr.getColumn('qty').numFmt='#,##0';wsArr.getColumn('qty').alignment={horizontal:'right'};
    _autoFilter(wsArr);

    // Sheet 2: LP Forecast (per-SKU, aggregated by truck+sku)
    const oorSet=new Set(D.oorTrucks||[]);
    const wsLP=wb.addWorksheet('LP Forecast');
    wsLP.columns=[{header:'Date',key:'date',width:14},{header:'Truck',key:'truckId',width:10},{header:'Destination',key:'dest',width:30},{header:'SKU',key:'sku',width:18},{header:'Item',key:'itemName',width:35},{header:'Pallets',key:'plt',width:10},{header:'Qty',key:'qty',width:10},{header:'LSR',key:'lsr',width:14},{header:'Status',key:'status',width:14}];
    _hdr(wsLP);
    const _lpAgg={};
    for(const r of D.generatedPlan){
      const k=r.truckId+'|'+r.sku;
      if(!_lpAgg[k])_lpAgg[k]={date:r.date,truckId:r.truckId,dest:r.destination,sku:r.sku,plt:0,qty:0};
      _lpAgg[k].plt+=(r.pallets||0);_lpAgg[k].qty+=(r.qty||0);
    }
    const _lpRows=Object.values(_lpAgg).sort((a,b)=>(a.date||'').localeCompare(b.date||'')||a.truckId-b.truckId||(a.sku||'').localeCompare(b.sku||''));
    for(const r of _lpRows){
      const isSent=dispatched.has(r.truckId)&&lsrNumbers[r.truckId]&&r.date<=dShort;
      const isReady=dispatched.has(r.truckId)&&lsrNumbers[r.truckId]&&r.date>dShort;
      const isOOR=oorSet.has(r.truckId);
      const status=isSent?'Dispatched':isOOR?'OOR':isReady?'Ready':'Pending';
      const n=nom[r.sku];
      wsLP.addRow({date:_fmtD(r.date),truckId:'LP-'+r.truckId,dest:clDisp(r.dest),sku:r.sku,itemName:n?.name||r.sku,plt:Math.round((r.plt||0)*100)/100,qty:r.qty,lsr:lsrNumbers[r.truckId]||'',status});
      if(isSent){const row=wsLP.lastRow;row.eachCell(cell=>{cell.fill=_greenFill;cell.font=_greenFont})}
    }
    wsLP.getColumn('plt').numFmt='#,##0.00';wsLP.getColumn('plt').alignment={horizontal:'right'};
    wsLP.getColumn('qty').numFmt='#,##0';wsLP.getColumn('qty').alignment={horizontal:'right'};
    _autoFilter(wsLP);

    // Sheet 3: LM Forecast (per-SKU)
    const wsLM=wb.addWorksheet('LM Forecast');
    wsLM.columns=[{header:'Date',key:'date',width:14},{header:'Truck',key:'truckId',width:10},{header:'Destination',key:'dest',width:30},{header:'Cluster',key:'cluster',width:28},{header:'SKU',key:'sku',width:18},{header:'Item',key:'itemName',width:35},{header:'Qty',key:'qty',width:10},{header:'LSR',key:'lsr',width:14},{header:'Status',key:'status',width:14}];
    _hdr(wsLM);
    const _xlLmTrucks=D.lmTrucks||[];
    const _lmSorted=[..._xlLmTrucks].sort((a,b)=>(a.dd||'').localeCompare(b.dd||'')||String(a.id).localeCompare(String(b.id)));
    for(const t of _lmSorted){
      const isSent=t.dispatched&&t.lsr&&t.dd<=dShort;
      const isReady=t.dispatched&&t.lsr&&t.dd>dShort;
      const isLocked=t.dispatched&&!t.lsr;
      const status=isSent?'Dispatched':isReady?'Ready':isLocked?'Locked':'Pending';
      for(const it of (t.items||[])){
        wsLM.addRow({date:_fmtD(t.dd),truckId:t.id,dest:clDisp(t.dest),cluster:t.cluster||'',sku:it.sku,itemName:it.nm||it.sku,qty:it.qty,lsr:t.lsr||'',status});
        if(isSent){const row=wsLM.lastRow;row.eachCell(cell=>{cell.fill=_greenFill;cell.font=_greenFont})}
      }
      if(!t.items||!t.items.length){
        wsLM.addRow({date:_fmtD(t.dd),truckId:t.id,dest:clDisp(t.dest),cluster:t.cluster||'',sku:'',itemName:'',qty:t.pcs,lsr:t.lsr||'',status});
        if(isSent){const row=wsLM.lastRow;row.eachCell(cell=>{cell.fill=_greenFill;cell.font=_greenFont})}
      }
    }
    wsLM.getColumn('qty').numFmt='#,##0';wsLM.getColumn('qty').alignment={horizontal:'right'};
    _autoFilter(wsLM);

    // Sheet 4: Late Arrivals
    const _xlLate=(D.lmLateArrivals||[]).filter(l=>(l.daysLate!=null&&l.daysLate>0)||l._held);
    const wsLate=wb.addWorksheet('Late Arrivals');
    wsLate.columns=[
      {header:'Destination',key:'dest',width:32},{header:'Path',key:'path',width:8},
      {header:'SKU',key:'sku',width:18},{header:'Item',key:'name',width:35},{header:'Source',key:'src',width:10},
      {header:'Truck',key:'truckId',width:10},
      {header:'Arrives Dallas',key:'rawArr',width:14},{header:'Ready Dallas',key:'arrDal',width:14},
      {header:'LP Ship',key:'lpShip',width:14},{header:'Arrives WHS',key:'satArr',width:14},
      {header:'WHS Processing',key:'whsProc',width:14},
      {header:'LM Dispatch',key:'dispatch',width:14},{header:'Bump-in',key:'bumpin',width:14},
      {header:'Why Late',key:'lateType',width:20},{header:'Days Late',key:'daysLate',width:10},
      {header:'Qty',key:'qty',width:10}
    ];
    _hdr(wsLate);
    for(const r of [..._xlLate].sort((a,b)=>(b.daysLate||0)-(a.daysLate||0))){
      wsLate.addRow({dest:r.dest,path:r.path||'',sku:r.sku,name:r.name,src:r.src||'—',truckId:r.truckId,
        rawArr:r.rawArrival==='In stock'?'In stock':_fmtD(r.rawArrival),
        arrDal:r.arrDallas==='In stock'?'':_fmtD(r.arrDallas),
        lpShip:r.path==='LP'?(r.notInLp?'None':_fmtD(r.lpShip)):'—',
        satArr:r.path==='LP'?(r.notInLp?'None':_fmtD(r.satArr)):'—',
        whsProc:r.whsProc>0?r.whsProc+'d':'—',
        dispatch:_fmtD(r.dispatch),bumpin:_fmtD(r.bumpin),
        lateType:r.notInLp?'Not in LP plan':r.lateType||'—',daysLate:r.daysLate,qty:r.qty})
    }
    wsLate.getColumn('daysLate').numFmt='#,##0';wsLate.getColumn('daysLate').alignment={horizontal:'right'};

          {v:'<span style="font-family:Courier New,monospace;font-weight:700">'+t.id+'</span>'+(t.lsr?'<br><span style="font-size:9px;color:#888">LSR '+t.lsr+'</span>':'')+(_fcFaOvr?_faBadgeHtml(_fcFaOvr):'')},
          {v:'<span style="font-size:10px;font-weight:700;color:'+typeClr+';background:'+typeBg+';padding:2px 6px">'+t.type+'</span>'},
          {v:t.dest},
          {v:_st},
          {v:t.pallets,style:'text-align:right;font-family:Courier New,monospace;font-weight:600'}
        ],bg);
        _outRowIdx++;
      }
    }
    if(onTime.length===0&&overdue.length===0){
      html+='<tr><td colspan="6" bgcolor="#F9F9FB" style="padding:5px 10px;font-size:11px;color:#BBB;border-bottom:1px solid #E8E8ED">'+dayLabel+' &#8212; <span style="font-style:italic">No dispatches</span></td></tr>';
    }else if(onTime.length>0){
      for(let j=0;j<onTime.length;j++){
        const t=onTime[j];const bg=_outRowIdx%2?'#FAFBFC':'#ffffff';
        const typeClr=t.type==='LP'?'#4A148C':'#304FFE';
        const typeBg=t.type==='LP'?'#F0EBFE':'#E3F2FD';
        const _st=t.status==='ready'?'<span style="font-size:9px;font-weight:700;color:#304FFE;background:#E3F2FD;padding:2px 6px">READY</span>':'<span style="font-size:9px;font-weight:700;color:#C4550A;background:#FEF3EB;padding:2px 6px">PENDING</span>';
        const _fcFa=t.type==='LP'?_faForLP(parseInt(t.id.replace('LP-',''))):_faForLM(t.dest,t.lsr);
        html+=_trow([
          {v:j===0?'<span style="font-weight:700">'+dayLabel+'</span>':''},
          {v:'<span style="font-family:Courier New,monospace;font-weight:700">'+t.id+'</span>'+(t.lsr?'<br><span style="font-size:9px;color:#888">LSR '+t.lsr+'</span>':'')+(_fcFa?_faBadgeHtml(_fcFa):'')},
          {v:'<span style="font-size:10px;font-weight:700;color:'+typeClr+';background:'+typeBg+';padding:2px 6px">'+t.type+'</span>'},
          {v:t.dest},
          {v:_st},
          {v:t.pallets,style:'text-align:right;font-family:Courier New,monospace;font-weight:600'}
        ],bg);
        _outRowIdx++;
      }
    }
  }
  html+='</table></td></tr>';

  // ── FA Goods Forecast Section ──
  if(_faItems.length>0){
    // Resolve dispatch date from linked truck
    // Build LP truck date map: truckId → date
    const _lpDateMap={};
    const _lpSeen=new Set();
    for(const r of (D.generatedPlan||[])){
      const tid=r.truckId||r['Truck ID'];if(!tid||_lpSeen.has(tid))continue;_lpSeen.add(tid);
      _lpDateMap['LP-'+tid]=r.date||r.Date||'';
    }
    // Build LM truck date map: various refs → dd
    const _lmDateMap={};
    for(const t of (D.lmTrucks||[])){
      if(t.dd){_lmDateMap[t.id]=t.dd;if(t.lsr)_lmDateMap[t.lsr]=t.dd;_lmDateMap['LM '+t.dest]=t.dd}
    }
    // Resolve each FA item's dispatch date
    const _faResolved=_faItems.map(it=>{
      let dd='';
      if(it.linkedTruck){
        dd=_lpDateMap[it.linkedTruck]||'';
        if(!dd){// LM truck — match by LSR or dest
          for(const k in _lmDateMap){if(it.linkedTruck.includes(k)&&k.length>2){dd=_lmDateMap[k];break}}
        }
      }
      return{...it,dispDate:dd};
    });

    const _faTotalQty=_faItems.reduce((s,i)=>s+i.qty,0);
    // Pallets: sum per unique group (not per item — items have pallets=0, group has _groupPlt)
    const _faGrpPlt={};_faItems.forEach(i=>{const k=i._groupSku||i.sku;if(!_faGrpPlt[k])_faGrpPlt[k]=i._groupPlt||i.pallets||0});
    const _faTotalPlt=Object.values(_faGrpPlt).reduce((s,v)=>s+v,0);
    const _faVenues=[...new Set(_faItems.map(i=>i.venue))];
    const _faTrucks=[...new Set(_faItems.map(i=>i.linkedTruck).filter(Boolean))];

    // Group by truck — only show locked trucks
    // Build locked truck set from LM + LP dispatched
    const _lmDispMap={};const _lmDispByLsr={};const _lmDispByDest={};
    for(const t of (D.lmTrucks||[])){
      if(!t.dispatched)continue;
      _lmDispMap[t.id]=t;
      if(t.lsr)_lmDispByLsr[t.lsr]=t;
      if(t.dest)_lmDispByDest['LM '+t.dest]=t;
    }
    const _lpDispSet=dispatched;// LP dispatched Set (line 140)
    // Match FA truck ref to locked LM truck (handles manual links like "LM New York / CORT · LSR631-001")
    const _findLmLocked=ref=>{
      if(!ref)return null;
      if(_lmDispMap[ref])return _lmDispMap[ref];// exact match (engine: "LM-3")
      // Match by LSR substring
      for(const lsr in _lmDispByLsr){if(ref.includes(lsr))return _lmDispByLsr[lsr]}
      // Match by dest substring
      for(const k in _lmDispByDest){if(ref.includes(k)||k.includes(ref))return _lmDispByDest[k]}
      // Match by LM-N pattern in ref
      const m=ref.match(/LM-(\d+)/);if(m&&_lmDispMap['LM-'+m[1]])return _lmDispMap['LM-'+m[1]];
      return null;
    };
    // Group FA groups by truck (use faGroups which has lmTruck/lpTruck)
    const _faGrps=D.faGroups||[];
    const _faByTruck2={};// truckRef → {truck info + groups[]}
    for(const g of _faGrps){
      const trk=g.lmTruck||g.lpTruck;if(!trk)continue;
      // Check if truck is locked
      const lmLocked=_findLmLocked(trk);
      const lpId=trk.startsWith('LP-')?parseInt(trk.replace('LP-','')):null;
      const lpLocked=lpId!==null&&_lpDispSet.has(lpId);
      if(!lmLocked&&!lpLocked)continue;// skip unlocked trucks
      if(!_faByTruck2[trk])_faByTruck2[trk]={truckId:trk,dd:lmLocked?lmLocked.dd:(g.lpDate||''),dest:lmLocked?lmLocked.dest:'',lsr:lmLocked?lmLocked.lsr:'',groups:[],totalItems:0,totalQty:0,totalPlt:0,totalValue:0};
      _faByTruck2[trk].groups.push(g);
      _faByTruck2[trk].totalItems+=g.items||0;
      _faByTruck2[trk].totalPlt+=g.pallets||0;
      _faByTruck2[trk].totalValue+=g.value||0;
    }
    // Also sum qty from resolved items
    for(const it of _faResolved){
      const trk=it.linkedTruck||it.linkedLP;if(!trk||!_faByTruck2[trk])continue;
      _faByTruck2[trk].totalQty+=it.qty||0;
    }
    const _faTruckList=Object.values(_faByTruck2).sort((a,b)=>(a.dd||'9').localeCompare(b.dd||'9'));
    const _faLockedCount=_faTruckList.length;
    const _faLockedPlt=_faTruckList.reduce((s,t)=>s+t.totalPlt,0);
    const _faLockedQty=_faTruckList.reduce((s,t)=>s+t.totalQty,0);
    const _faLockedVal=_faTruckList.reduce((s,t)=>s+t.totalValue,0);
    const _faLockedVenues=[...new Set(_faTruckList.flatMap(t=>t.groups.map(g=>g.venue)))];

    html+=_sec('&#128230;','FA Goods &#8212; Locked Trucks','#0891B2');
    html+='<tr><td style="padding:0 32px 20px">';
    // KPI chips
    html+='<table cellpadding="0" cellspacing="0" border="0" style="margin-bottom:8px"><tr>';
    html+='<td bgcolor="#ECFEFF" style="padding:5px 14px;font-size:12px;font-weight:700;color:#0891B2;border:none">&#128274; '+_faLockedCount+' trucks</td><td style="width:8px"></td>';
    html+='<td bgcolor="#ECFEFF" style="padding:5px 14px;font-size:12px;font-weight:700;color:#0891B2;border:none">'+_faLockedPlt+' plt</td><td style="width:8px"></td>';
    html+='<td bgcolor="#ECFEFF" style="padding:5px 14px;font-size:12px;font-weight:700;color:#0891B2;border:none">'+_faLockedQty+' qty</td><td style="width:8px"></td>';
    html+='<td bgcolor="#ECFEFF" style="padding:5px 14px;font-size:12px;font-weight:700;color:#0891B2;border:none">'+_faLockedVenues.length+' venues</td><td style="width:8px"></td>';
    html+='</tr></table>';
    if(!_faTruckList.length){
      html+='<table width="100%" cellpadding="0" cellspacing="0" border="0" style="'+_T+'"><tr><td style="padding:12px;font-size:12px;color:#999;text-align:center">No locked FA trucks yet</td></tr></table>';
    } else {
      // Table grouped by truck
      html+='<table width="100%" cellpadding="0" cellspacing="0" border="0" style="'+_T+'">';
      const _fh='padding:6px 10px;font-size:10px;font-weight:700;color:#0891B2';
      html+='<tr bgcolor="#E0F7FA"><td style="'+_fh+'">TRUCK</td><td style="'+_fh+'">DISPATCH</td><td style="'+_fh+'">VENUE</td><td style="'+_fh+'">FA</td><td style="'+_fh+'">DELIVERY</td><td style="'+_fh+';text-align:right">ITEMS</td><td style="'+_fh+';text-align:right">PALLETS</td><td style="'+_fh+'">KIT</td></tr>';
      let _faIdx2=0;
      for(const t of _faTruckList){
        for(const g of t.groups){
          const bg=_faIdx2%2?'#F0FDFE':'#ffffff';
          let _vBi=(D.venueBiDates||{})[g.venue]||'';
          if(!_vBi){const vl=(g.venue||'').toLowerCase();for(const k in(D.venueBiDates||{})){if(k.toLowerCase()===vl||vl.includes(k.toLowerCase())){_vBi=D.venueBiDates[k];break}}}
          const _b='padding:5px 10px;border-bottom:1px solid #E0F2F1';
          html+='<tr bgcolor="'+bg+'">';
          html+='<td style="'+_b+';font-size:11px;font-weight:700;color:#4A148C">'+t.truckId+' &#128274;</td>';
          html+='<td style="'+_b+';font-size:10px;font-weight:700">'+(t.dd?fD(t.dd):'—')+'</td>';
          html+='<td style="'+_b+';font-size:10px;font-weight:600;color:#333">'+g.venue+'</td>';
          html+='<td style="'+_b+';font-size:10px;color:#0891B2;font-weight:600">'+g.fa+'</td>';
          html+='<td style="'+_b+';font-size:10px;font-weight:600;color:#12804A">'+(_vBi?fD(_vBi):'—')+'</td>';
          html+='<td style="'+_b+';font-size:11px;font-family:Courier New,monospace;font-weight:700;text-align:right">'+(g.items||0)+'</td>';
          html+='<td style="'+_b+';font-size:11px;font-family:Courier New,monospace;font-weight:700;text-align:right;color:#CF5D5D">'+(g.pallets||0)+'</td>';
          html+='<td style="'+_b+';font-size:10px;color:#12804A;font-weight:600">'+(g.kit||'—')+'</td>';
          html+='</tr>';_faIdx2++;
        }
      }
      html+='</table>';
    }
    html+='</td></tr>';
  }

  const _lateDestKeys=Object.keys(lateByDest).sort((a,b)=>lateByDest[b].maxDays-lateByDest[a].maxDays);
  const _lateTotalSKUs=[...new Set(lmLate.map(l=>l.sku))].length;
  const _lateTotalTrucks=[...new Set(lmLate.map(l=>l.truckId))].length;
  const _lateTotalQty=lmLate.reduce((s,l)=>s+(l.qty||0),0);
  const _maxLateAll=lmLate.length>0?Math.max(...lmLate.filter(l=>l.daysLate!=null).map(l=>l.daysLate),0):0;

  html+=
  _sec('&#9888;&#65039;','Risks &#8212; Late Arrivals','#C62828')+
  '<tr><td style="padding:0 32px 20px">'+
  (lmLate.length===0?
    '<table width="100%" cellpadding="0" cellspacing="0"><tr><td bgcolor="#E6F5ED" style="padding:14px 18px;font-size:13px;color:#12804A;font-weight:600;border:none">&#10004; No late arrival risks detected. All items on track.</td></tr></table>'
  :
    '<table width="100%" cellpadding="0" cellspacing="0" border="0" style="'+_T+'">'+
    '<tr><td colspan="6" bgcolor="#FDEBED" style="padding:12px 18px;font-size:13px;color:#C62828;font-weight:600;border:none">'+
      lmLate.length+' items &middot; '+_lateTotalSKUs+' SKUs &middot; '+_lateTotalTrucks+' trucks &middot; max +'+_maxLateAll+'d'+
    '</td></tr>'+
    '<tr bgcolor="#FDEBED"><td style="padding:6px 10px;font-size:10px;font-weight:700;color:#C62828">DESTINATION</td><td style="padding:6px 10px;font-size:10px;font-weight:700;color:#C62828">PATH</td><td style="padding:6px 10px;font-size:10px;font-weight:700;color:#C62828;text-align:right">SKUs</td><td style="padding:6px 10px;font-size:10px;font-weight:700;color:#C62828;text-align:right">TRUCKS</td><td style="padding:6px 10px;font-size:10px;font-weight:700;color:#C62828;text-align:right">QTY</td><td style="padding:6px 10px;font-size:10px;font-weight:700;color:#C62828;text-align:right">MAX LATE</td></tr>'+
    _lateDestKeys.map((dest,i)=>{const d=lateByDest[dest];return _trow([
      {v:'<b>'+dest+'</b>'},
      {v:d.path||'—',style:'font-weight:600'},
      {v:d.skus.size,style:'text-align:right;font-weight:600'},
      {v:d.trucks.size,style:'text-align:right;font-weight:600'},
      {v:d.qty.toLocaleString(),style:'text-align:right;font-family:Courier New,monospace;font-weight:600'},
      {v:'<span style="color:#C62828;font-weight:800">+'+d.maxDays+'d</span>',style:'text-align:right'}
    ],i%2?'#FFF8F8':'#fff')}).join('')+
    '<tr bgcolor="#F0F1F3" style="font-weight:700;border-top:2px solid #F5B8BA"><td style="padding:6px 10px;font-size:10px">Total &middot; '+_lateDestKeys.length+' destinations</td><td style="padding:6px 10px"></td><td style="padding:6px 10px;font-size:10px;text-align:right">'+_lateTotalSKUs+'</td><td style="padding:6px 10px;font-size:10px;text-align:right">'+_lateTotalTrucks+'</td><td style="padding:6px 10px;font-size:10px;text-align:right;font-family:Courier New,monospace">'+_lateTotalQty.toLocaleString()+'</td><td style="padding:6px 10px;font-size:10px;text-align:right;color:#C62828;font-weight:800">+'+_maxLateAll+'d</td></tr>'+
    '</table>'
  )+'</td></tr>';

  // On Hold section removed — too large for email digest

  html+=(downloadUrl?
    '<tr><td style="padding:0 32px 24px"><table width="100%" cellpadding="0" cellspacing="0"><tr>'+
      '<td bgcolor="#F0EBFE" style="padding:18px 24px;border:none">'+
        '<b style="font-size:12px">&#128206; Reports &amp; Links</b><br><br>'+
        '<table width="100%" cellpadding="0" cellspacing="0" border="0">'+
          '<tr><td bgcolor="#F4F5F7" style="padding:8px 14px;border-bottom:1px solid #E2E4E9">&#128202; <a href="'+downloadUrl+'" style="color:#4A148C;font-size:12px;font-weight:600;text-decoration:none">Download Excel Report</a> <span style="font-size:10px;color:#888">(Arrivals &middot; LP Forecast &middot; LM Forecast &middot; Late Arrivals &middot; Assembly &middot; Kitting)</span></td></tr>'+
          '<tr><td bgcolor="#F4F5F7" style="padding:8px 14px;border-bottom:1px solid #E2E4E9">&#127760; <a href="https://ml3000.smmarta.com/supply-chain-overview.html" style="color:#4A148C;font-size:12px;font-weight:600;text-decoration:none">FF&amp;E Supply Chain Overview</a></td></tr>'+
          '<tr><td bgcolor="#F4F5F7" style="padding:8px 14px;border-bottom:1px solid #E2E4E9">&#128214; <a href="https://ecatalogs.plytix.com/68a86f753a74399b2298f8ee" style="color:#4A148C;font-size:12px;font-weight:600;text-decoration:none">Product Catalog &amp; Assembly Instructions</a></td></tr>'+
          '<tr><td bgcolor="#F4F5F7" style="padding:8px 14px">&#128230; <a href="https://stwopndhnxcjyomkufii.supabase.co/storage/v1/object/public/digests/Palletisation_Guide.pdf" style="color:#4A148C;font-size:12px;font-weight:600;text-decoration:none">Palletisation Guide (PDF)</a></td></tr>'+
        '</table>'+
      '</td></tr></table></td></tr>'
  :'')+
  '<tr><td bgcolor="#F8F8FC" style="padding:20px 32px;border-top:1px solid #E0E0EE">'+
    '<table cellpadding="0" cellspacing="0"><tr><td style="font-size:11px;color:#888888;font-family:Segoe UI,Helvetica,Arial,sans-serif">Generated from <a href="https://ml3000.smmarta.com" style="color:#4A148C;font-weight:600;text-decoration:none">ML3K</a> &middot; <a href="https://ml3000.smmarta.com" style="color:#4A148C;text-decoration:none">ml3000.smmarta.com</a> &middot; view &middot; me</td></tr>'+
    '<tr><td style="font-size:11px;font-family:Segoe UI,Helvetica,Arial,sans-serif;padding-top:4px;color:#666666;font-weight:600">Materials Management Team</td></tr></table>'+
  '</td></tr></table>'+
  '<!--[if mso]></td></tr></table><![endif]-->'+
  '</td></tr></table>';

  // ── Render ──
  document.getElementById('emailContent').innerHTML=html;
  const mailSubj=encodeURIComponent('FF&E Supply Chain \u2014 '+dStr);

  // ── Wire up buttons ──
  const btnCopy=document.getElementById('btnCopy');
  const btnMail=document.getElementById('btnMail');
  btnCopy.disabled=false;btnMail.disabled=false;
  const btnXl=document.getElementById('btnXl');
  if(window._digestExcelBlob){
    btnXl.style.display='';
    btnXl.onclick=function(){
      var a=document.createElement('a');
      a.href=URL.createObjectURL(window._digestExcelBlob);
      a.download=window._digestExcelName;
      a.click();
      setTimeout(function(){URL.revokeObjectURL(a.href)},1000);
    };
  }

  btnCopy.onclick=async function(){
    const el=document.getElementById('emailContent');
    const rawHtml=el.innerHTML;
    const st=document.getElementById('copyStatus');
    try{
      // Use clipboard API with raw HTML — preserves all inline styles including color
      await navigator.clipboard.write([new ClipboardItem({
        'text/html':new Blob([rawHtml],{type:'text/html'}),
        'text/plain':new Blob([el.innerText],{type:'text/plain'})
      })]);
      st.textContent='Copied! Paste into your email.';
    }catch(e){
      // Fallback: execCommand (may lose some colors)
      const range=document.createRange();range.selectNodeContents(el);
      const sel2=window.getSelection();sel2.removeAllRanges();sel2.addRange(range);
      document.execCommand('copy');sel2.removeAllRanges();
      st.textContent='Copied (basic). Some formatting may differ.';
    }
    st.style.display='inline';
    setTimeout(function(){st.style.display='none'},3000);
  };
  btnMail.onclick=function(){window.location.href='mailto:?subject='+mailSubj};
}catch(e){console.error('Digest error:',e);document.getElementById('emailContent').innerHTML='<div class="loading" style="color:#C62828">Digest generation failed: '+e.message+'</div>'}
})();
</script>

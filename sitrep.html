<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF&E RADAR</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');
:root{--bg:#080C10;--panel:#0D1117;--bezel:#1B2130;--bd:#253040;--glow:#00FF88;--glow2:#00CC6A;--amber:#FFB300;--amber2:#FF8F00;--red:#FF3D3D;--cyan:#00D4FF;--white:#D0D8E8;--dim:#4A5568;--mono:'Share Tech Mono',monospace;--fm:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--mono);background:var(--bg);color:var(--glow);min-height:100vh;overflow-x:hidden}

/* Scanline overlay */
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,0.012) 2px,rgba(0,255,136,0.012) 4px);z-index:999}

/* Radar sweep */
@keyframes sweep{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.radar-bg{position:fixed;top:50%;left:50%;width:900px;height:900px;margin:-450px 0 0 -450px;pointer-events:none;z-index:0;opacity:0.04}
.radar-bg::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;border-radius:50%;border:1px solid var(--glow)}
.radar-bg::after{content:'';position:absolute;top:0;left:50%;width:50%;height:50%;transform-origin:bottom left;background:linear-gradient(90deg,transparent,rgba(0,255,136,0.3));animation:sweep 8s linear infinite;border-radius:0 100% 0 0}
.radar-ring{position:fixed;border-radius:50%;border:1px solid rgba(0,255,136,0.03);pointer-events:none;z-index:0}
.radar-ring-1{top:50%;left:50%;width:600px;height:600px;margin:-300px 0 0 -300px}
.radar-ring-2{top:50%;left:50%;width:400px;height:400px;margin:-200px 0 0 -200px}
.radar-ring-3{top:50%;left:50%;width:200px;height:200px;margin:-100px 0 0 -100px}
.radar-cross{position:fixed;pointer-events:none;z-index:0;opacity:0.03}
.radar-cross-h{top:50%;left:50%;width:900px;height:1px;margin-top:0;margin-left:-450px;background:var(--glow)}
.radar-cross-v{top:50%;left:50%;width:1px;height:900px;margin-top:-450px;margin-left:0;background:var(--glow)}

/* Top HUD */
.hud{display:flex;justify-content:space-between;align-items:center;padding:8px 20px;background:var(--panel);border-bottom:2px solid var(--glow);position:relative;z-index:1}
.hud::before{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--glow),transparent);opacity:0.5}
.hud-title{font-size:14px;letter-spacing:4px;color:var(--glow);text-shadow:0 0 10px rgba(0,255,136,0.5)}
.hud-clock{font-size:20px;color:var(--glow);text-shadow:0 0 15px rgba(0,255,136,0.6)}
.hud-kickoff{font-size:13px;color:var(--amber);text-shadow:0 0 10px rgba(255,179,0,0.4);background:rgba(255,179,0,0.1);padding:4px 14px;border:1px solid rgba(255,179,0,0.3);border-radius:2px}

/* Instrument bezel */
.instr{background:var(--panel);border:2px solid var(--bd);border-radius:4px;padding:12px;margin-bottom:8px;position:relative;box-shadow:inset 0 1px 0 rgba(255,255,255,0.03),0 2px 8px rgba(0,0,0,0.5)}
.instr::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,136,0.15),transparent)}
.instr-label{font-size:9px;letter-spacing:2px;color:var(--dim);margin-bottom:6px}
.instr-value{font-size:28px;font-weight:700;line-height:1;text-shadow:0 0 12px currentColor}
.instr-sub{font-size:10px;color:var(--dim);margin-top:4px}

/* Gauge bar */
.gbar{height:6px;background:var(--bezel);border-radius:1px;margin-top:6px;position:relative;overflow:hidden}
.gbar::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(90deg,transparent,transparent 8px,rgba(0,0,0,0.3) 8px,rgba(0,0,0,0.3) 9px)}
.gbar-fill{height:100%;border-radius:1px;box-shadow:0 0 6px currentColor}

/* Grid layout */
.cockpit{display:grid;grid-template-columns:260px 1fr 320px;gap:0;min-height:calc(100vh - 44px);position:relative;z-index:1}
.col-l{background:var(--bg);padding:12px;border-right:1px solid var(--bd)}
.col-c{background:var(--bg);padding:12px 16px}
.col-r{background:var(--bg);padding:12px;border-left:1px solid var(--bd)}

/* Dest cards */
.dest{background:var(--panel);border:1px solid var(--bd);border-radius:4px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:border-color 0.2s,box-shadow 0.2s}
.dest:hover{border-color:var(--glow);box-shadow:0 0 8px rgba(0,255,136,0.15)}
.dest-name{font-size:12px;color:var(--white);letter-spacing:1px}
.dest-badges{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}

/* Badges */
.b{display:inline-block;padding:2px 8px;border-radius:2px;font-size:9px;letter-spacing:0.5px}
.b-gn{background:rgba(0,255,136,0.12);color:var(--glow);border:1px solid rgba(0,255,136,0.25)}
.b-am{background:rgba(255,179,0,0.12);color:var(--amber);border:1px solid rgba(255,179,0,0.25)}
.b-rd{background:rgba(255,61,61,0.12);color:var(--red);border:1px solid rgba(255,61,61,0.25)}
.b-cy{background:rgba(0,212,255,0.12);color:var(--cyan);border:1px solid rgba(0,212,255,0.25)}

/* Truck row */
.tr-row{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:3px;margin-bottom:2px;cursor:pointer;font-size:11px;transition:background 0.15s}
.tr-row:hover{background:var(--bezel)}
.tr-id{width:52px;font-weight:700;flex-shrink:0}
.tr-dest{flex:1;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px}
.tr-bar{width:50px;height:4px;background:var(--bezel);border-radius:1px;flex-shrink:0;overflow:hidden}
.tr-bar-f{height:100%;border-radius:1px}

/* Alert */
.alert{padding:8px 10px;border-radius:3px;margin-bottom:5px;cursor:pointer;border-left:3px solid;transition:opacity 0.15s}
.alert:hover{opacity:0.85}
.al-rd{border-color:var(--red);background:rgba(255,61,61,0.08)}
.al-am{border-color:var(--amber);background:rgba(255,179,0,0.08)}
.al-gn{border-color:var(--glow);background:rgba(0,255,136,0.05)}
.al-cy{border-color:var(--cyan);background:rgba(0,212,255,0.08)}
.al-title{font-size:10px;font-weight:700;letter-spacing:0.5px}
.al-desc{font-size:9px;color:var(--dim);margin-top:2px}

/* Section header */
.sec-hd{font-size:9px;letter-spacing:2px;color:var(--dim);padding:8px 0 4px;border-bottom:1px solid var(--bd);margin-bottom:8px}

/* Timeline */
.tl-r{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:11px;border-bottom:1px solid rgba(37,48,64,0.4)}
.tl-r:last-of-type{border-bottom:none}
.tl-d{width:52px;color:var(--dim);flex-shrink:0;font-size:10px}
.tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor}
.tl-txt{flex:1;color:var(--white);font-size:11px}
.tl-past{opacity:0.25}

/* Modal */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:100;display:none;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.modal-bg.show{display:flex}
.modal{background:var(--panel);border:2px solid var(--glow);border-radius:6px;padding:20px;max-width:850px;width:92%;max-height:80vh;overflow-y:auto;box-shadow:0 0 30px rgba(0,255,136,0.15)}
.modal h2{font-size:14px;letter-spacing:2px;color:var(--glow);margin-bottom:12px;text-shadow:0 0 8px rgba(0,255,136,0.4)}
.modal table{width:100%;border-collapse:collapse;font-size:10px}
.modal th{text-align:left;padding:5px 8px;font-size:8px;letter-spacing:1px;color:var(--dim);border-bottom:1px solid var(--bd)}
.modal td{padding:4px 8px;border-bottom:1px solid rgba(37,48,64,0.5)}
.modal-x{float:right;background:none;border:1px solid var(--dim);color:var(--dim);width:24px;height:24px;border-radius:2px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.modal-x:hover{border-color:var(--red);color:var(--red)}

/* Refresh animation */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.loading{text-align:center;padding:40px;color:var(--glow);animation:pulse 1.5s infinite}

/* Button */
.btn-refresh{padding:5px 14px;background:transparent;color:var(--glow);border:1px solid var(--glow);border-radius:2px;font-family:var(--mono);font-size:10px;cursor:pointer;letter-spacing:1px;transition:all 0.15s}
.btn-refresh:hover{background:rgba(0,255,136,0.1);box-shadow:0 0 8px rgba(0,255,136,0.2)}
</style>
</head>
<body>

<!-- Radar background -->
<div class="radar-bg"></div>
<div class="radar-ring radar-ring-1"></div>
<div class="radar-ring radar-ring-2"></div>
<div class="radar-ring radar-ring-3"></div>
<div class="radar-cross radar-cross-h"></div>
<div class="radar-cross radar-cross-v"></div>

<div class="hud">
  <div style="display:flex;align-items:center;gap:16px">
    <div class="hud-title">FF&E RADAR</div>
    <span style="font-size:9px;color:var(--dim);letter-spacing:1px">FIFA WORLD CUP 2026вДҐ ¬Ј MATERIALS MANAGEMENT</span>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="hud-clock" id="clock">--:--:--</div>
    <div class="hud-kickoff" id="kickoff">T-?? DAYS</div>
    <button class="btn-refresh" onclick="generate()">вЖї REFRESH</button>
  </div>
</div>

<div class="cockpit">
  <div class="col-l" id="leftCol"><div class="loading">LOADING...</div></div>
  <div class="col-c" id="centerCol"></div>
  <div class="col-r" id="rightCol"></div>
</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="mc"></div>
</div>

<script>
const SB='https://stwopndhnxcjyomkufii.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN0d29wbmRobnhjanlvbWt1ZmlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDgyNjgsImV4cCI6MjA4ODQ4NDI2OH0.YNhp7z5kxnzpX15Vw8NVVWaZG1-Lj3Q9uaZDiKmBvf8';
let _plan,_ts,_arr,_nom,_stk,_trucks,_disp,_oor,_ss,_sq;

async function get(id){const u=new URL(SB+'/rest/v1/shared_state');u.searchParams.set('select','value');u.searchParams.set('id','eq.'+id);const r=await fetch(u.toString(),{headers:{apikey:SK,Authorization:'Bearer '+SK}});const d=await r.json();return d?.length?JSON.parse(d[0].value):null}
const CITY={TOR:'Toronto',VAN:'Vancouver',CDMX:'Mexico City',GDL:'Guadalajara',MTY:'Monterrey',ATL:'Atlanta',BOS:'Boston',DAL:'Dallas',HOU:'Houston',KC:'Kansas City',LA:'Los Angeles',MIA:'Miami',NY:'New York',PHI:'Philadelphia',SF:'San Francisco',SEA:'Seattle'};
function clDisp(raw){if(!raw)return raw;let s=raw.replace(/\s*\/\s*CORT\s*$/i,'').replace(/\s*\/\s*RIC\s*$/i,'').trim();if(s.startsWith('CAN ')||s.startsWith('MEX ')){const rest=s.slice(4).trim();const parts=rest.split(/\s*\/\s*/).filter(p=>!/^(RGS|RGN|REGION)$/i.test(p.trim()));if(!parts.length)return s.startsWith('CAN ')?'Canada':'Mexico';return parts.map(p=>CITY[p.trim()]||p.trim()).join(' / ')}return s}
function fD(d){if(!d)return'вАФ';try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}catch{return d}}
function fDw(d){if(!d)return'вАФ';try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}catch{return d}}
function dN(d){if(!d)return null;const n=new Date();n.setHours(0,0,0,0);const t=new Date(d+'T12:00:00');t.setHours(0,0,0,0);return Math.round((t-n)/864e5)}
function dL(d){const n=dN(d);if(n===null)return'';if(n<0)return Math.abs(n)+'D LATE';if(n===0)return'TODAY';if(n===1)return'TMRW';return'+'+n+'D'}

function openModal(h){document.getElementById('mc').innerHTML='<button class="modal-x" onclick="closeModal()">вЬХ</button>'+h;document.getElementById('modalBg').classList.add('show')}
function closeModal(){document.getElementById('modalBg').classList.remove('show')}

function showTruck(id){
  const rows=_plan.filter(r=>r.truckId===id);if(!rows.length)return;
  const t=_trucks[id];const isD=_disp.has(id);
  let h='<h2>LP-'+id+' // '+clDisp(t.dest)+'</h2>';
  h+='<div style="display:flex;gap:10px;margin-bottom:14px;font-size:11px">';
  h+='<span class="b '+(isD?'b-gn':t._ready?'b-cy':'b-rd')+'">'+(isD?'DISPATCHED':t._ready?'READY':'PENDING')+'</span>';
  h+='<span style="color:var(--white)">'+t.pallets.toFixed(1)+' / 26 PLT</span>';
  h+='<span style="color:var(--dim)">'+t.qty+' ITEMS ¬Ј '+t.skuCount+' SKUS</span>';
  h+='<span style="color:var(--amber)">'+fDw(t.date)+' ('+dL(t.date)+')</span></div>';
  h+='<table><thead><tr><th>SKU</th><th>ITEM</th><th>QTY</th><th>PLT</th><th>STOCK</th></tr></thead><tbody>';
  const agg={};for(const r of rows){if(!agg[r.sku])agg[r.sku]={sku:r.sku,name:r.name||'',qty:0,plt:0};agg[r.sku].qty+=r.qty||0;agg[r.sku].plt+=r.pallets||0}
  const wf=_wfSnap[id]||{};
  for(const s of Object.values(agg).sort((a,b)=>b.plt-a.plt)){
    const inS=_ss.has(s.sku);const sq=wf[s.sku]!==undefined?wf[s.sku]:(_sq[s.sku]);
    const stk=!inS?'<span class="b b-rd">NO STK</span>':(sq!==undefined&&sq<s.qty?'<span class="b b-am">LOW '+Math.round(sq)+'</span>':'<span class="b b-gn">OK '+Math.round(sq)+'</span>');
    h+='<tr><td style="color:var(--cyan)">'+s.sku+'</td><td style="color:var(--dim)">'+s.name+'</td><td>'+s.qty+'</td><td>'+s.plt.toFixed(1)+'</td><td>'+stk+'</td></tr>';
  }
  h+='</tbody></table>';openModal(h);
}

function showDest(dest){
  const dt=Object.values(_trucks).filter(t=>t.dest===dest).sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);
  let h='<h2>'+clDisp(dest)+'</h2><div style="margin-bottom:10px;font-size:10px;color:var(--dim)">'+dt.length+' TRUCKS</div>';
  h+='<table><thead><tr><th>TRUCK</th><th>DATE</th><th>PLT</th><th>QTY</th><th>SKUS</th><th>STATUS</th></tr></thead><tbody>';
  for(const t of dt){
    const isD=_disp.has(t.id);const isO=_oor.has(t.id);
    const st=isD?'<span class="b b-gn">SENT</span>':isO?'<span class="b b-am">OOR</span>':t._ready?'<span class="b b-cy">READY</span>':'<span class="b b-rd">PEND</span>';
    h+='<tr onclick="showTruck('+t.id+')" style="cursor:pointer"><td style="font-weight:700;color:var(--glow)">LP-'+t.id+'</td><td style="color:var(--white)">'+fD(t.date)+' <span style="color:var(--dim);font-size:8px">'+dL(t.date)+'</span></td><td>'+t.pallets.toFixed(1)+'</td><td>'+t.qty+'</td><td>'+t.skuCount+'</td><td>'+st+'</td></tr>';
  }
  h+='</tbody></table>';openModal(h);
}

function showArrivals(){
  if(!_arr)return;
  const bd={};for(const a of _arr){const rd=a.readyDate||'';if(!rd)continue;if(!bd[rd])bd[rd]=[];bd[rd].push(a)}
  const today=new Date().toISOString().slice(0,10);
  let h='<h2>CONTAINER ARRIVALS</h2><table><thead><tr><th>READY DATE</th><th>STATUS</th><th>ITEMS</th><th>QTY</th></tr></thead><tbody>';
  for(const d of Object.keys(bd).sort()){
    const items=bd[d];const qty=items.reduce((s,a)=>s+(a.qty||0),0);
    const n=dN(d);const st=d<=today?'<span class="b b-gn">ARRIVED</span>':n<=3?'<span class="b b-am">'+dL(d)+'</span>':'<span class="b b-cy">'+dL(d)+'</span>';
    h+='<tr><td style="color:var(--white)">'+fDw(d)+'</td><td>'+st+'</td><td>'+items.length+'</td><td>'+qty.toLocaleString()+'</td></tr>';
  }
  h+='</tbody></table>';openModal(h);
}

async function generate(){
  const now=new Date();const today=now.toISOString().slice(0,10);
  const h72=new Date(now.getTime()+72*36e5).toISOString().slice(0,10);

  [_plan,_ts,_arr,_nom,_stk]=await Promise.all([get('lp-plan'),get('lp-truck-state'),get('lp-arrivals'),get('lp-nom'),get('fm-stock')]);
  _disp=new Set(_ts?.dispatched||[]);_oor=new Set(_ts?.oorTrucks||[]);
  _ss=new Set(_stk?.skus||_ts?.stockSkus||[]);_sq=_stk?.qtys||{};

  _trucks={};
  if(_plan)for(const r of _plan){
    if(!_trucks[r.truckId])_trucks[r.truckId]={id:r.truckId,dest:r.destination,date:r.date,pallets:0,qty:0,skuCount:0,_s:new Set()};
    _trucks[r.truckId].pallets+=r.pallets||0;_trucks[r.truckId].qty+=r.qty||0;_trucks[r.truckId]._s.add(r.sku);
  }
  for(const t of Object.values(_trucks))t.skuCount=t._s.size;

  // Waterfall вАФ mirrors LP_renderPlan waterfall exactly
  const pool={};if(_ss.size)for(const s of _ss)pool[s]=_sq[s]!==undefined?_sq[s]:Infinity;
  const _wfSnap={};// truckId вЖТ {sku: availQty BEFORE this truck deducts}
  const tl=Object.values(_trucks).sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);
  let readyCnt=0,pendCnt=0;
  for(const t of tl){
    // Snapshot BEFORE deduction
    const snap={};for(const s in pool)snap[s]=pool[s];
    _wfSnap[t.id]=snap;
    if(_disp.has(t.id)||_oor.has(t.id)){t._ready=true;continue}
    if(!_ss.size){t._ready=false;pendCnt++;continue}
    const items={};for(const r of _plan.filter(r=>r.truckId===t.id))items[r.sku]=(items[r.sku]||0)+(r.qty||0);
    if(Object.keys(items).every(s=>(pool[s]||0)>=items[s])){
      t._ready=true;readyCnt++;for(const s in items)pool[s]-=items[s];
    }else{t._ready=false;pendCnt++}
  }

  const total=tl.length,dispCnt=[...new Set(tl.filter(t=>_disp.has(t.id)).map(t=>t.id))].length;
  const oorCnt=[...new Set(tl.filter(t=>_oor.has(t.id)).map(t=>t.id))].length;
  const up72=tl.filter(t=>!_disp.has(t.id)&&!_oor.has(t.id)&&dN(t.date)>=0&&dN(t.date)<=3);

  // вХРвХРвХР LEFT: INSTRUMENTS вХРвХРвХР
  let L='';
  const dispPct=total?Math.round(dispCnt/total*100):0;

  L+='<div class="instr"><div class="instr-label">DISPATCHED</div>';
  L+='<div class="instr-value" style="color:var(--glow)">'+dispCnt+'<span style="font-size:14px;color:var(--dim)"> / '+total+'</span></div>';
  L+='<div class="gbar"><div class="gbar-fill" style="width:'+dispPct+'%;background:var(--glow);color:var(--glow)"></div></div>';
  L+='<div class="instr-sub">'+dispPct+'% COMPLETE</div></div>';

  L+='<div class="instr"><div class="instr-label">READY</div>';
  L+='<div class="instr-value" style="color:var(--cyan)">'+readyCnt+'</div>';
  L+='<div class="instr-sub">FULL STOCK COVERAGE</div></div>';

  L+='<div class="instr"><div class="instr-label">PENDING STOCK</div>';
  L+='<div class="instr-value" style="color:'+(pendCnt?'var(--red)':'var(--glow)')+'">'+pendCnt+'</div>';
  L+='<div class="instr-sub">WAITING ARRIVALS</div></div>';

  L+='<div class="instr"><div class="instr-label">OOR SUBMITTED</div>';
  L+='<div class="instr-value" style="color:var(--amber)">'+oorCnt+'</div>';
  L+='<div class="instr-sub">STOCK RESERVED</div></div>';

  L+='<div class="instr" style="border-color:var(--cyan)"><div class="instr-label">72H WINDOW</div>';
  L+='<div class="instr-value" style="color:var(--cyan)">'+up72.length+'</div>';
  L+='<div class="instr-sub">'+fD(today)+' вЖТ '+fD(h72)+'</div></div>';

  // Arrivals
  if(_arr){
    const ad=[...new Set(_arr.map(a=>a.readyDate||'').filter(d=>d))].sort();
    const arv=ad.filter(d=>d<=today).length,a72=ad.filter(d=>d>today&&d<=h72).length,fut=ad.filter(d=>d>h72).length;
    L+='<div class="instr" onclick="showArrivals()" style="cursor:pointer;border-color:var(--amber)"><div class="instr-label">ARRIVALS вЦЄ</div>';
    L+='<div style="display:flex;gap:4px;margin-top:4px">';
    L+='<div style="flex:1;text-align:center"><div style="font-size:16px;font-weight:700;color:var(--glow)">'+arv+'</div><div style="font-size:8px;color:var(--dim)">ARRIVED</div></div>';
    L+='<div style="flex:1;text-align:center"><div style="font-size:16px;font-weight:700;color:var(--amber)">'+a72+'</div><div style="font-size:8px;color:var(--dim)">NEXT 72H</div></div>';
    L+='<div style="flex:1;text-align:center"><div style="font-size:16px;font-weight:700;color:var(--dim)">'+fut+'</div><div style="font-size:8px;color:var(--dim)">FUTURE</div></div>';
    L+='</div></div>';
  }

  document.getElementById('leftCol').innerHTML=L;

  // вХРвХРвХР CENTER: DESTINATIONS + 72H вХРвХРвХР
  let C='';
  C+='<div class="sec-hd">DESTINATIONS</div>';
  const bd={};
  for(const t of tl){
    if(!bd[t.dest])bd[t.dest]={tot:0,disp:0,rdy:0,pend:0,oor:0,plt:0};
    bd[t.dest].tot++;bd[t.dest].plt+=t.pallets;
    if(_disp.has(t.id))bd[t.dest].disp++;else if(_oor.has(t.id))bd[t.dest].oor++;else if(t._ready)bd[t.dest].rdy++;else bd[t.dest].pend++;
  }
  const destKeys=Object.keys(bd).sort((a,b)=>{const am=a.toUpperCase().includes('MEX'),bm=b.toUpperCase().includes('MEX'),ac=a.toUpperCase().includes('CAN'),bc=b.toUpperCase().includes('CAN');const ap=am?0:ac?1:2,bp=bm?0:bc?1:2;return ap!==bp?ap-bp:a.localeCompare(b)});
  for(const d of destKeys){
    const s=bd[d];const pct=s.tot?Math.round(s.disp/s.tot*100):0;
    const mx=d.toUpperCase().includes('MEX'),ca=d.toUpperCase().includes('CAN');
    const fl=mx?'рЯЗ≤рЯЗљ':ca?'рЯЗ®рЯЗ¶':'рЯЗЇрЯЗЄ';
    C+='<div class="dest" onclick="showDest(\''+d.replace(/'/g,"\\'")+'\')">';
    C+='<div style="display:flex;justify-content:space-between;align-items:center">';
    C+='<div class="dest-name">'+fl+' '+clDisp(d)+'</div>';
    C+='<span style="font-size:10px;color:var(--dim)">'+s.tot+' TRUCKS</span></div>';
    C+='<div class="dest-badges">';
    if(s.disp)C+='<span class="b b-gn">'+s.disp+' SENT</span>';
    if(s.rdy)C+='<span class="b b-cy">'+s.rdy+' READY</span>';
    if(s.pend)C+='<span class="b b-rd">'+s.pend+' PEND</span>';
    if(s.oor)C+='<span class="b b-am">'+s.oor+' OOR</span>';
    C+='</div>';
    C+='<div class="gbar" style="margin-top:4px"><div class="gbar-fill" style="width:'+pct+'%;background:var(--glow);color:var(--glow)"></div></div>';
    C+='<div style="font-size:8px;color:var(--dim);margin-top:2px">'+Math.round(s.plt)+' PLT ¬Ј '+pct+'%</div></div>';
  }

  if(up72.length){
    C+='<div class="sec-hd" style="margin-top:14px">72-HOUR DISPATCH QUEUE</div>';
    for(const t of up72){
      const pct=Math.round(t.pallets/26*100);const clr=t._ready?'var(--cyan)':'var(--red)';
      const dl=dL(t.date);const dlc=dN(t.date)===0?'b-rd':dN(t.date)===1?'b-am':'b-cy';
      C+='<div class="tr-row" onclick="showTruck('+t.id+')">';
      C+='<div class="tr-id" style="color:'+clr+'">LP-'+t.id+'</div>';
      C+='<div class="tr-dest">'+clDisp(t.dest)+'</div>';
      C+='<span class="b '+dlc+'">'+dl+'</span>';
      C+='<span style="font-size:10px;width:52px;text-align:right;flex-shrink:0">'+t.pallets.toFixed(1)+'</span>';
      C+='<div class="tr-bar"><div class="tr-bar-f" style="width:'+pct+'%;background:'+clr+'"></div></div>';
      C+='<span class="b '+(t._ready?'b-cy':'b-rd')+'">'+(t._ready?'RDY':'PND')+'</span>';
      C+='</div>';
    }
  }

  document.getElementById('centerCol').innerHTML=C;

  // вХРвХРвХР RIGHT: ALERTS + TIMELINE вХРвХРвХР
  let R='';
  const alerts=[];

  for(const t of tl){if(!_disp.has(t.id)&&!_oor.has(t.id)&&dN(t.date)<0)
    alerts.push({c:'rd',t:'OVERDUE LP-'+t.id,d:clDisp(t.dest)+' ¬Ј DUE '+fD(t.date)+' ¬Ј '+Math.abs(dN(t.date))+'D LATE',f:()=>showTruck(t.id)})}
  for(const t of up72){if(dN(t.date)===0&&!t._ready)
    alerts.push({c:'rd',t:'TODAY NOT READY LP-'+t.id,d:clDisp(t.dest)+' ¬Ј MISSING STOCK',f:()=>showTruck(t.id)})}
  for(const t of up72){if(dN(t.date)===1&&!t._ready)
    alerts.push({c:'am',t:'TMRW NOT READY LP-'+t.id,d:clDisp(t.dest)+' ¬Ј CHECK STOCK',f:()=>showTruck(t.id)})}
  const rdyWait=tl.filter(t=>!_disp.has(t.id)&&!_oor.has(t.id)&&t._ready&&dN(t.date)<=0);
  if(rdyWait.length)alerts.push({c:'cy',t:rdyWait.length+' TRUCKS READY TO DISPATCH',d:'ALL STOCK AVAILABLE ¬Ј CAN SEND NOW',f:()=>{
    let h='<h2>READY FOR DISPATCH</h2><table><thead><tr><th>TRUCK</th><th>DEST</th><th>DATE</th><th>PLT</th></tr></thead><tbody>';
    for(const t of rdyWait)h+='<tr onclick="showTruck('+t.id+')" style="cursor:pointer"><td style="font-weight:700;color:var(--glow)">LP-'+t.id+'</td><td>'+clDisp(t.dest)+'</td><td>'+fD(t.date)+'</td><td>'+t.pallets.toFixed(1)+'</td></tr>';
    h+='</tbody></table>';openModal(h)}});
  if(!alerts.length)alerts.push({c:'gn',t:'ALL CLEAR',d:'NO OVERDUE ¬Ј NO URGENT ACTIONS'});

  R+='<div class="sec-hd">вЪ† ALERTS</div>';
  for(const a of alerts){
    R+='<div class="alert al-'+a.c+'" '+(a.f?'onclick="('+a.f.toString()+')()"':'')+' style="cursor:pointer">';
    R+='<div class="al-title" style="color:var(--'+(a.c==='rd'?'red':a.c==='am'?'amber':a.c==='cy'?'cyan':'glow')+')">'+a.t+'</div>';
    R+='<div class="al-desc">'+a.d+'</div></div>';
  }

  R+='<div class="sec-hd" style="margin-top:12px">TIMELINE</div>';
  const ms=[
    {d:'2026-03-09',l:'FIRST CONTAINER',c:'var(--glow)'},
    {d:'2026-03-16',l:'FIRST LP TRUCK',c:'var(--glow)'},
    {d:'2026-04-01',l:'USA BUCKET START',c:'var(--cyan)'},
    {d:'2026-04-03',l:'FIRST LM TRUCK',c:'var(--cyan)'},
    {d:'2026-04-15',l:'FIRST BUMP-IN',c:'var(--amber)'},
    {d:'2026-04-29',l:'LAST LP TRUCK',c:'var(--glow)'},
    {d:'2026-06-09',l:'LAST LM TRUCK',c:'var(--cyan)'},
    {d:'2026-06-11',l:'вШЕ KICKOFF',c:'var(--amber)'},
  ];
  for(const m of ms){
    const n=dN(m.d);const past=n!==null&&n<0;
    R+='<div class="tl-r'+(past?' tl-past':'')+'"><div class="tl-d">'+fD(m.d)+'</div><div class="tl-dot" style="background:'+m.c+'"></div><div class="tl-txt">'+m.l+(n!==null&&n>=0?' <span class="b b-cy">'+dL(m.d)+'</span>':'')+'</div></div>';
  }

  R+='<div style="margin-top:16px;padding-top:8px;border-top:1px solid var(--bd);font-size:8px;color:var(--dim);text-align:center;letter-spacing:1px">GENERATED '+now.toLocaleString().toUpperCase()+'<br>ML3K SUPABASE LIVE DATA</div>';

  document.getElementById('rightCol').innerHTML=R;
}

setInterval(()=>{
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString('en-US',{hour12:false});
  const k=new Date('2026-06-11');const d=Math.ceil((k-n)/864e5);
  document.getElementById('kickoff').textContent='T-'+d+' DAYS';
},1000);

generate();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF&E RADAR</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');
:root{--bg:#080C10;--pn:#0D1117;--bz:#1B2130;--bd:#253040;--gn:#00FF88;--am:#FFB300;--rd:#FF3D3D;--cy:#00D4FF;--wh:#D0D8E8;--dm:#4A5568;--mn:'Share Tech Mono',monospace;--fm:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:var(--mn);background:var(--bg);color:var(--gn)}

/* Scanlines */
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,0.01) 2px,rgba(0,255,136,0.01) 4px);z-index:999}

/* Radar bg */
@keyframes sweep{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.rbg{position:fixed;top:50%;left:50%;width:800px;height:800px;margin:-400px 0 0 -400px;pointer-events:none;opacity:0.05}
.rbg::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;border-radius:50%;border:1px solid var(--gn)}
.rbg::after{content:'';position:absolute;top:0;left:50%;width:50%;height:50%;transform-origin:bottom left;background:linear-gradient(90deg,transparent,rgba(0,255,136,0.3));animation:sweep 8s linear infinite;border-radius:0 100% 0 0}
.rr{position:fixed;border-radius:50%;border:1px solid rgba(0,255,136,0.04);pointer-events:none}
.rr1{top:50%;left:50%;width:550px;height:550px;margin:-275px 0 0 -275px}
.rr2{top:50%;left:50%;width:300px;height:300px;margin:-150px 0 0 -150px}

/* HUD top */
.hud{display:flex;justify-content:space-between;align-items:center;padding:6px 20px;background:linear-gradient(180deg,var(--pn),var(--bg));border-bottom:1px solid var(--gn);position:relative;z-index:2;height:38px}
.hud::after{content:'⊕                                                                                                          ⊕';position:absolute;bottom:4px;left:8px;right:8px;font-size:6px;color:rgba(37,48,64,0.8);display:flex;justify-content:space-between}
.hud-t{font-size:14px;letter-spacing:5px;text-shadow:0 0 10px rgba(0,255,136,0.5)}
.hud-c{font-size:20px;text-shadow:0 0 16px rgba(0,255,136,0.5)}
.hud-k{font-size:12px;color:var(--am);background:rgba(255,179,0,0.1);padding:3px 12px;border:1px solid rgba(255,179,0,0.3);border-radius:2px;text-shadow:0 0 6px rgba(255,179,0,0.3)}

/* Main grid: fixed height */
.main{display:grid;grid-template-columns:220px 1fr 260px;height:calc(100vh - 38px);position:relative;z-index:1}
.col{padding:8px;overflow:hidden}
.col-l{border-right:1px solid var(--bd);position:relative}
.col-l::after{content:'⊕\\A⊕\\A⊕\\A⊕';white-space:pre;position:absolute;top:20px;right:-4px;font-size:6px;color:var(--bd);line-height:80px}
.col-r{border-left:1px solid var(--bd);position:relative}
.col-r::after{content:'⊕\\A⊕\\A⊕\\A⊕';white-space:pre;position:absolute;top:20px;left:-4px;font-size:6px;color:var(--bd);line-height:80px}

/* Instrument */
.I{background:var(--pn);border:1px solid var(--bd);border-radius:4px;padding:6px 8px;margin-bottom:4px;position:relative;box-shadow:inset 0 0 12px rgba(0,0,0,0.3)}
.I::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,136,0.15),transparent)}
/* Bolt screws on instruments */
.I::after{content:'⊕    ⊕';position:absolute;top:3px;right:6px;font-size:6px;color:var(--bd);letter-spacing:0}
.I-l{font-size:7px;letter-spacing:2px;color:var(--dm)}
.I-v{font-size:22px;font-weight:700;line-height:1;text-shadow:0 0 8px currentColor}
.I-s{font-size:8px;color:var(--dm);margin-top:2px}

/* Mini gauge */
.mg{height:3px;background:var(--bz);border-radius:1px;margin-top:3px;overflow:hidden}
.mg-f{height:100%;border-radius:1px;box-shadow:0 0 4px currentColor}

/* Badge */
.B{display:inline-block;padding:1px 6px;border-radius:2px;font-size:8px;letter-spacing:0.3px}
.Bg{background:rgba(0,255,136,0.12);color:var(--gn);border:1px solid rgba(0,255,136,0.2)}
.Ba{background:rgba(255,179,0,0.12);color:var(--am);border:1px solid rgba(255,179,0,0.2)}
.Br{background:rgba(255,61,61,0.12);color:var(--rd);border:1px solid rgba(255,61,61,0.2)}
.Bc{background:rgba(0,212,255,0.12);color:var(--cy);border:1px solid rgba(0,212,255,0.2)}

/* Dest grid */
.dg{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.D{background:var(--pn);border:1px solid var(--bd);border-radius:3px;padding:6px 8px;cursor:pointer;transition:border-color 0.15s;position:relative}
.D:hover{border-color:var(--gn);box-shadow:0 0 6px rgba(0,255,136,0.1)}
.D::before{content:'⊕';position:absolute;top:3px;right:5px;font-size:5px;color:var(--bd)}
.D-n{font-size:10px;color:var(--wh);letter-spacing:0.5px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.D-b{display:flex;gap:3px;flex-wrap:wrap}

/* Truck row */
.T{display:flex;align-items:center;gap:4px;padding:3px 6px;border-radius:2px;cursor:pointer;font-size:9px;transition:background 0.1s}
.T:hover{background:var(--bz)}

/* Section */
.S{font-size:7px;letter-spacing:2.5px;color:var(--gn);padding:4px 0 3px;border-bottom:1px solid rgba(0,255,136,0.12);margin-bottom:4px;text-shadow:0 0 4px rgba(0,255,136,0.2)}

/* Alert */
@keyframes ap{0%,100%{box-shadow:none}50%{box-shadow:0 0 8px rgba(255,61,61,0.25)}}
.A{padding:5px 8px;border-radius:3px;margin-bottom:3px;cursor:pointer;border-left:2px solid;font-size:9px;transition:transform 0.1s}
.A:hover{transform:translateX(2px)}
.Ar{border-color:var(--rd);background:rgba(255,61,61,0.06);animation:ap 3s infinite}
.Aa{border-color:var(--am);background:rgba(255,179,0,0.06)}
.Ag{border-color:var(--gn);background:rgba(0,255,136,0.04)}
.Ac{border-color:var(--cy);background:rgba(0,212,255,0.06)}

/* Timeline */
.TL{display:flex;align-items:center;gap:5px;padding:3px 0;font-size:9px}
.TL-d{width:42px;color:var(--dm);font-size:8px;flex-shrink:0}
.TL-o{width:6px;height:6px;border-radius:50%;flex-shrink:0;box-shadow:0 0 4px currentColor}
.TL-t{flex:1;color:var(--wh);font-size:9px}
.TL-p{opacity:0.2}

/* Modal */
.MBg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);z-index:100;display:none;justify-content:center;align-items:center;backdrop-filter:blur(3px)}
.MBg.show{display:flex}
.M{background:var(--pn);border:1px solid var(--gn);border-radius:6px;padding:16px 20px;max-width:800px;width:90%;max-height:75vh;overflow-y:auto;box-shadow:0 0 30px rgba(0,255,136,0.1),inset 0 0 20px rgba(0,0,0,0.3)}
.M h2{font-size:13px;letter-spacing:2px;color:var(--gn);margin-bottom:10px;text-shadow:0 0 6px rgba(0,255,136,0.3)}
.M table{width:100%;border-collapse:collapse;font-size:10px}
.M th{text-align:left;padding:4px 8px;font-size:8px;letter-spacing:1px;color:var(--dm);border-bottom:1px solid var(--bd)}
.M td{padding:3px 8px;border-bottom:1px solid rgba(37,48,64,0.4)}
.Mx{float:right;background:none;border:1px solid var(--dm);color:var(--dm);width:20px;height:20px;border-radius:2px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center}
.Mx:hover{border-color:var(--rd);color:var(--rd)}

/* Radial */
.RG{display:flex;gap:8px;justify-content:center;padding:6px 0}

/* Btn */
.btn{padding:3px 10px;background:transparent;color:var(--gn);border:1px solid var(--gn);border-radius:2px;font-family:var(--mn);font-size:9px;cursor:pointer;letter-spacing:1px}
.btn:hover{background:rgba(0,255,136,0.08)}
</style>
</head>
<body>
<div class="rbg"></div><div class="rr rr1"></div><div class="rr rr2"></div>

<div class="hud">
  <div style="display:flex;align-items:center;gap:12px">
    <div class="hud-t">FF&E RADAR</div>
    <span style="font-size:8px;color:var(--dm);letter-spacing:1px">FWC26 · MATERIALS</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="hud-c" id="ck">--:--:--</div>
    <div class="hud-k" id="ko">T-??</div>
    <button class="btn" onclick="gen()">↻ REFRESH</button>
  </div>
</div>

<div class="main">
  <div class="col col-l" id="L"></div>
  <div class="col" id="C" style="padding:8px 10px"></div>
  <div class="col col-r" id="R"></div>
</div>

<div class="MBg" id="mBg" onclick="if(event.target===this)cm()"><div class="M" id="mc"></div></div>

<script>
const SB='https://stwopndhnxcjyomkufii.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN0d29wbmRobnhjanlvbWt1ZmlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDgyNjgsImV4cCI6MjA4ODQ4NDI2OH0.YNhp7z5kxnzpX15Vw8NVVWaZG1-Lj3Q9uaZDiKmBvf8';
let _p,_ts,_a,_n,_sk,_rw,_tr,_di,_oo,_ss,_sq;

async function g(id){const u=new URL(SB+'/rest/v1/shared_state');u.searchParams.set('select','value');u.searchParams.set('id','eq.'+id);const r=await fetch(u.toString(),{headers:{apikey:SK,Authorization:'Bearer '+SK}});const d=await r.json();return d?.length?JSON.parse(d[0].value):null}
const CT={TOR:'Toronto',VAN:'Vancouver',CDMX:'Mexico City',GDL:'Guadalajara',MTY:'Monterrey',HOU:'Houston',KC:'Kansas City',NY:'New York',ATL:'Atlanta',BOS:'Boston',DAL:'Dallas',LA:'Los Angeles',MIA:'Miami',PHI:'Philadelphia',SF:'San Francisco',SEA:'Seattle'};
function cd(r){if(!r)return r;let s=r.replace(/\s*\/\s*(CORT|RIC)\s*$/i,'').trim();if(s.startsWith('CAN ')||s.startsWith('MEX ')){const p=s.slice(4).trim().split(/\s*\/\s*/).filter(x=>!/^(RGS|RGN|REGION)$/i.test(x.trim()));return p.length?p.map(x=>CT[x.trim()]||x.trim()).join(' / '):s.startsWith('CAN ')?'Canada':'Mexico'}return s}
function fD(d){if(!d)return'—';try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}catch{return d}}
function fW(d){if(!d)return'—';try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}catch{return d}}
function dN(d){if(!d)return null;const n=new Date();n.setHours(0,0,0,0);const t=new Date(d+'T12:00:00');t.setHours(0,0,0,0);return Math.round((t-n)/864e5)}
function dL(d){const n=dN(d);if(n===null)return'';if(n<0)return Math.abs(n)+'D';if(n===0)return'NOW';if(n===1)return'TMR';return'+'+n+'D'}

function om(h){document.getElementById('mc').innerHTML='<button class="Mx" onclick="cm()">✕</button>'+h;document.getElementById('mBg').classList.add('show')}
function cm(){document.getElementById('mBg').classList.remove('show')}

function sT(id){
  const rows=_p.filter(r=>r.truckId===id);if(!rows.length)return;const t=_tr[id];
  let h='<h2>LP-'+id+' // '+cd(t.dest)+'</h2>';
  h+='<div style="display:flex;gap:8px;margin-bottom:10px;font-size:10px">';
  const lsr=(_ts?.lsrNumbers||{})[id];
  h+='<span class="B '+(_di.has(id)?'Bg':t._r?'Bc':'Br')+'">'+(_di.has(id)?'SENT':t._r?'READY':'PEND')+'</span>';
  if(lsr)h+='<span style="color:var(--am)">'+lsr+'</span>';
  h+='<span style="color:var(--wh)">'+t.plt.toFixed(1)+'/26</span>';
  h+='<span style="color:var(--dm)">'+t.qty+' items · '+fW(t.date)+' ('+dL(t.date)+')</span></div>';
  h+='<table><thead><tr><th>SKU</th><th>ITEM</th><th>QTY</th><th>PLT</th><th>STOCK</th></tr></thead><tbody>';
  const ag={};for(const r of rows){if(!ag[r.sku])ag[r.sku]={s:r.sku,n:r.name||'',q:0,p:0};ag[r.sku].q+=r.qty||0;ag[r.sku].p+=r.pallets||0}
  const wf=_wf[id]||{};
  for(const s of Object.values(ag).sort((a,b)=>b.p-a.p)){
    const inS=_ss.has(s.s);const sq=wf[s.s]!==undefined?wf[s.s]:_sq[s.s];
    const st=!inS?'<span class="B Br">NO STK</span>':(sq!==undefined&&sq<s.q?'<span class="B Ba">LOW '+Math.round(sq)+'</span>':'<span class="B Bg">OK '+Math.round(sq)+'</span>');
    h+='<tr><td style="color:var(--cy)">'+s.s+'</td><td style="color:var(--dm)">'+s.n+'</td><td>'+s.q+'</td><td>'+s.p.toFixed(1)+'</td><td>'+st+'</td></tr>';
  }
  h+='</tbody></table>';om(h);
}

function sD(dest){
  const dt=Object.values(_tr).filter(t=>t.dest===dest).sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);
  const lsr=_ts?.lsrNumbers||{};
  let h='<h2>'+cd(dest)+'</h2><div style="margin-bottom:8px;font-size:9px;color:var(--dm)">'+dt.length+' TRUCKS</div>';
  h+='<table><thead><tr><th>TRUCK</th><th>DATE</th><th>LSR</th><th>PLT</th><th>QTY</th><th>STATUS</th></tr></thead><tbody>';
  for(const t of dt){
    const st=_di.has(t.id)?'<span class="B Bg">SENT</span>':_oo.has(t.id)?'<span class="B Ba">OOR</span>':t._r?'<span class="B Bc">READY</span>':'<span class="B Br">PEND</span>';
    h+='<tr onclick="sT('+t.id+')" style="cursor:pointer"><td style="font-weight:700;color:var(--gn)">LP-'+t.id+'</td><td>'+fD(t.date)+' <span style="color:var(--dm);font-size:8px">'+dL(t.date)+'</span></td><td style="color:var(--am)">'+(lsr[t.id]||'')+'</td><td>'+t.plt.toFixed(1)+'</td><td>'+t.qty+'</td><td>'+st+'</td></tr>';
  }
  h+='</tbody></table>';om(h);
}

function sA(){
  if(!_a)return;const bd={};for(const a of _a){const rd=a.readyDate||'';if(!rd)continue;if(!bd[rd])bd[rd]=[];bd[rd].push(a)}
  const td=new Date().toISOString().slice(0,10);
  let h='<h2>ARRIVALS</h2><table><thead><tr><th>DATE</th><th>STATUS</th><th>ITEMS</th><th>QTY</th></tr></thead><tbody>';
  for(const d of Object.keys(bd).sort()){
    const it=bd[d];const q=it.reduce((s,a)=>s+(a.qty||0),0);
    const st=d<=td?'<span class="B Bg">ARRIVED</span>':dN(d)<=3?'<span class="B Ba">'+dL(d)+'</span>':'<span class="B Bc">'+dL(d)+'</span>';
    h+='<tr><td style="color:var(--wh)">'+fW(d)+'</td><td>'+st+'</td><td>'+it.length+'</td><td>'+q.toLocaleString()+'</td></tr>';
  }
  h+='</tbody></table>';om(h);
}

let _wf={};
async function gen(){
  const now=new Date(),td=now.toISOString().slice(0,10),h72=new Date(now.getTime()+72*36e5).toISOString().slice(0,10);
  [_p,_ts,_a,_n,_sk,_rw]=await Promise.all([g('lp-plan'),g('lp-truck-state'),g('lp-arrivals'),g('lp-nom'),g('fm-stock'),g('fm-rw')]);
  _di=new Set(_ts?.dispatched||[]);_oo=new Set(_ts?.oorTrucks||[]);
  _ss=new Set(_sk?.skus||_ts?.stockSkus||[]);_sq=_sk?.qtys||{};

  _tr={};if(_p)for(const r of _p){if(!_tr[r.truckId])_tr[r.truckId]={id:r.truckId,dest:r.destination,date:r.date,plt:0,qty:0,sc:0,_s:new Set()};_tr[r.truckId].plt+=r.pallets||0;_tr[r.truckId].qty+=r.qty||0;_tr[r.truckId]._s.add(r.sku)}
  for(const t of Object.values(_tr))t.sc=t._s.size;

  const pool={};if(_ss.size)for(const s of _ss)pool[s]=_sq[s]!==undefined?_sq[s]:Infinity;
  _wf={};
  const tl=Object.values(_tr).sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);
  let rC=0,pC=0;
  for(const t of tl){
    const sn={};for(const s in pool)sn[s]=pool[s];_wf[t.id]=sn;
    if(_oo.has(t.id)){t._r=true;continue}
    if(_di.has(t.id)){t._r=true;const di={};for(const r of _p.filter(r=>r.truckId===t.id))di[r.sku]=(di[r.sku]||0)+(r.qty||0);for(const s in di)if(pool[s]!==undefined)pool[s]=Math.max(0,(pool[s]||0)-di[s]);continue}
    if(!_ss.size){t._r=false;pC++;continue}
    const it={};for(const r of _p.filter(r=>r.truckId===t.id))it[r.sku]=(it[r.sku]||0)+(r.qty||0);
    if(Object.keys(it).every(s=>(pool[s]||0)>=it[s])){t._r=true;rC++;for(const s in it)pool[s]-=it[s]}else{t._r=false;pC++}
  }
  const tot=tl.length,dC=tl.filter(t=>_di.has(t.id)).length,oC=tl.filter(t=>_oo.has(t.id)).length;
  const lsr=_ts?.lsrNumbers||{};
  const up72=tl.filter(t=>!_di.has(t.id)&&!_oo.has(t.id)&&dN(t.date)>=0&&dN(t.date)<=3);
  const rec72=tl.filter(t=>_di.has(t.id)&&dN(t.date)>=-3&&dN(t.date)<=0);

  // LM progress
  let lmT=0,lmD=0;
  if(_rw){const vs=new Set();for(const r of _rw)vs.add(r.Venue||'');lmT=vs.size;const vb={};for(const r of _rw){const v=r.Venue||'',bi=r['Estimated bump-in date']||'';if(!bi)continue;const m=bi.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);const p=m?m[3]+'-'+m[2]+'-'+m[1]:'';if(p&&(!vb[v]||p>vb[v]))vb[v]=p}for(const v of vs)if(vb[v]&&vb[v]<=td)lmD++}
  const lpP=tot?Math.round(dC/tot*100):0,lmP=lmT?Math.round(lmD/lmT*100):0,ovP=Math.round(lpP*0.4+lmP*0.6);

  // Radial SVG
  function rg(pct,clr,lbl,sub,sz){
    const r=sz/2-6,cx=sz/2,cy=sz/2,c=2*Math.PI*r,o=c-(pct/100)*c;
    const ticks=Array.from({length:12},(_,i)=>{const a=(i*30-90)*Math.PI/180;return'<line x1="'+(cx+Math.cos(a)*(r+1))+'" y1="'+(cy+Math.sin(a)*(r+1))+'" x2="'+(cx+Math.cos(a)*(r+4))+'" y2="'+(cy+Math.sin(a)*(r+4))+'" stroke="var(--dm)" stroke-width="0.7"/>'}).join('');
    return'<div style="text-align:center"><svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'" style="filter:drop-shadow(0 0 6px rgba(0,255,136,0.1))">'
      +'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--bz)" stroke-width="3"/>'
      +'<circle cx="'+cx+'" cy="'+cy+'" r="'+(r-8)+'" fill="none" stroke="var(--bz)" stroke-width="0.5" stroke-dasharray="1.5,3"/>'
      +ticks
      +'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+clr+'" stroke-width="4" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+o+'" transform="rotate(-90 '+cx+' '+cy+')" style="transition:stroke-dashoffset 0.8s"/>'
      +'<text x="'+cx+'" y="'+(cy-2)+'" text-anchor="middle" font-family="var(--mn)" font-size="16" font-weight="700" fill="'+clr+'" style="text-shadow:0 0 6px '+clr+'">'+pct+'%</text>'
      +'<text x="'+cx+'" y="'+(cy+10)+'" text-anchor="middle" font-family="var(--mn)" font-size="7" fill="var(--dm)">'+sub+'</text>'
      +'</svg><div style="font-size:7px;letter-spacing:1.5px;color:var(--dm);margin-top:2px">'+lbl+'</div></div>';
  }

  // ═══ LEFT ═══
  let L='';
  L+='<div class="I"><div class="I-l">DISPATCHED</div><div class="I-v" style="color:var(--gn)">'+dC+'<span style="font-size:12px;color:var(--dm)"> / '+tot+'</span></div><div class="mg"><div class="mg-f" style="width:'+lpP+'%;background:var(--gn);color:var(--gn)"></div></div><div class="I-s">'+lpP+'% COMPLETE</div></div>';
  L+='<div class="I"><div class="I-l">READY</div><div class="I-v" style="color:var(--cy)">'+rC+'</div><div class="I-s">FULL STOCK</div></div>';
  L+='<div class="I"><div class="I-l">PENDING</div><div class="I-v" style="color:'+(pC?'var(--rd)':'var(--gn)')+'">'+pC+'</div><div class="I-s">AWAITING STOCK</div></div>';
  L+='<div class="I"><div class="I-l">OOR</div><div class="I-v" style="color:var(--am)">'+oC+'</div><div class="I-s">RESERVED</div></div>';
  // 72H
  L+='<div class="I" style="border-color:rgba(0,212,255,0.3)"><div class="I-l">72H WINDOW</div><div style="display:flex;gap:4px;margin-top:2px"><div style="flex:1;text-align:center"><div style="font-size:14px;font-weight:700;color:var(--gn)">'+rec72.length+'</div><div style="font-size:7px;color:var(--dm)">SENT</div></div><div style="flex:1;text-align:center"><div style="font-size:14px;font-weight:700;color:var(--cy)">'+up72.length+'</div><div style="font-size:7px;color:var(--dm)">QUEUE</div></div></div><div class="I-s">'+fD(td)+' → '+fD(h72)+'</div></div>';
  // Arrivals
  if(_a){const ad=[...new Set(_a.map(a=>a.readyDate||'').filter(d=>d))].sort();const av=ad.filter(d=>d<=td).length,a7=ad.filter(d=>d>td&&d<=h72).length,af=ad.filter(d=>d>h72).length;
  L+='<div class="I" onclick="sA()" style="cursor:pointer;border-color:rgba(255,179,0,0.2)"><div class="I-l">ARRIVALS ▸</div><div style="display:flex;gap:4px;margin-top:2px"><div style="flex:1;text-align:center"><div style="font-size:14px;font-weight:700;color:var(--gn)">'+av+'</div><div style="font-size:7px;color:var(--dm)">IN</div></div><div style="flex:1;text-align:center"><div style="font-size:14px;font-weight:700;color:var(--am)">'+a7+'</div><div style="font-size:7px;color:var(--dm)">72H</div></div><div style="flex:1;text-align:center"><div style="font-size:14px;font-weight:700;color:var(--dm)">'+af+'</div><div style="font-size:7px;color:var(--dm)">FUT</div></div></div></div>'}
  document.getElementById('L').innerHTML=L;

  // ═══ CENTER ═══
  let C='';
  // Radial gauges
  C+='<div class="RG">'+rg(lpP,'var(--gn)','LP PROGRESS',dC+'/'+tot,100)+rg(lmP,'var(--cy)','LM PROGRESS',lmD+'/'+lmT,100)+rg(ovP,'var(--am)','OVERALL',lpP+'%LP · '+lmP+'%LM',100)+'</div>';
  // Destinations
  C+='<div class="S">DESTINATIONS</div>';
  const bd={};for(const t of tl){if(!bd[t.dest])bd[t.dest]={t:0,d:0,r:0,p:0,o:0,pl:0};bd[t.dest].t++;bd[t.dest].pl+=t.plt;if(_di.has(t.id))bd[t.dest].d++;else if(_oo.has(t.id))bd[t.dest].o++;else if(t._r)bd[t.dest].r++;else bd[t.dest].p++}
  const dk=Object.keys(bd).sort((a,b)=>{const am=a.toUpperCase().includes('MEX'),bm=b.toUpperCase().includes('MEX'),ac=a.toUpperCase().includes('CAN'),bc=b.toUpperCase().includes('CAN');return(am?0:ac?1:2)-(bm?0:bc?1:2)||a.localeCompare(b)});
  C+='<div class="dg">';
  for(const d of dk){
    const s=bd[d],pc=s.t?Math.round(s.d/s.t*100):0;
    const mx=d.toUpperCase().includes('MEX'),ca=d.toUpperCase().includes('CAN');
    C+='<div class="D" onclick="sD(\''+d.replace(/'/g,"\\'")+'\')">';
    C+='<div class="D-n">'+(mx?'🇲🇽':ca?'🇨🇦':'🇺🇸')+' '+cd(d)+'</div>';
    C+='<div class="D-b">';
    if(s.d)C+='<span class="B Bg">'+s.d+'</span>';if(s.r)C+='<span class="B Bc">'+s.r+'</span>';if(s.p)C+='<span class="B Br">'+s.p+'</span>';if(s.o)C+='<span class="B Ba">'+s.o+'</span>';
    C+='</div>';
    C+='<div class="mg"><div class="mg-f" style="width:'+pc+'%;background:var(--gn);color:var(--gn)"></div></div></div>';
  }
  C+='</div>';
  // 72h trucks
  if(rec72.length||up72.length){
    C+='<div class="S" style="margin-top:6px">'+(rec72.length?'RECENT':'')+(rec72.length&&up72.length?' + ':'')+(up72.length?'QUEUE':'')+'</div>';
    for(const t of rec72){C+='<div class="T" onclick="sT('+t.id+')" style="opacity:0.6"><span style="width:44px;color:var(--gn);font-weight:700">LP-'+t.id+'</span><span style="flex:1;color:var(--dm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+cd(t.dest)+'</span>'+(lsr[t.id]?'<span style="color:var(--am);font-size:8px">'+lsr[t.id]+'</span>':'')+'<span style="width:36px;text-align:right">'+t.plt.toFixed(1)+'</span><span class="B Bg">SENT</span></div>'}
    for(const t of up72){const cl=t._r?'var(--cy)':'var(--rd)';C+='<div class="T" onclick="sT('+t.id+')"><span style="width:44px;color:'+cl+';font-weight:700">LP-'+t.id+'</span><span style="flex:1;color:var(--dm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+cd(t.dest)+'</span>'+(lsr[t.id]?'<span style="color:var(--am);font-size:8px">'+lsr[t.id]+'</span>':'')+'<span class="B '+(dN(t.date)===0?'Br':dN(t.date)===1?'Ba':'Bc')+'">'+dL(t.date)+'</span><span style="width:36px;text-align:right">'+t.plt.toFixed(1)+'</span><span class="B '+(t._r?'Bc':'Br')+'">'+(t._r?'RDY':'PND')+'</span></div>'}
  }
  document.getElementById('C').innerHTML=C;

  // ═══ RIGHT ═══
  let R='';const al=[];
  for(const t of tl){if(!_di.has(t.id)&&!_oo.has(t.id)&&dN(t.date)<0)al.push({c:'r',t:'OVERDUE LP-'+t.id,d:cd(t.dest)+' · '+Math.abs(dN(t.date))+'D',f:()=>sT(t.id)})}
  for(const t of up72){if(dN(t.date)===0&&!t._r)al.push({c:'r',t:'TODAY LP-'+t.id,d:cd(t.dest)+' · NO STK',f:()=>sT(t.id)})}
  for(const t of up72){if(dN(t.date)===1&&!t._r)al.push({c:'a',t:'TMRW LP-'+t.id,d:cd(t.dest)+' · CHECK',f:()=>sT(t.id)})}
  const rw=tl.filter(t=>!_di.has(t.id)&&!_oo.has(t.id)&&t._r&&dN(t.date)<=0);
  if(rw.length)al.push({c:'c',t:rw.length+' READY TO SEND',d:'STOCK OK · DISPATCH NOW',f:()=>{let h='<h2>READY</h2><table><thead><tr><th>TRUCK</th><th>DEST</th><th>DATE</th><th>PLT</th></tr></thead><tbody>';for(const t of rw)h+='<tr onclick="sT('+t.id+')" style="cursor:pointer"><td style="color:var(--gn);font-weight:700">LP-'+t.id+'</td><td>'+cd(t.dest)+'</td><td>'+fD(t.date)+'</td><td>'+t.plt.toFixed(1)+'</td></tr>';h+='</tbody></table>';om(h)}});
  if(!al.length)al.push({c:'g',t:'ALL CLEAR',d:'NO OVERDUE · NO URGENT'});

  R+='<div class="S">⚠ ALERTS</div>';
  for(const a of al)R+='<div class="A A'+a.c+'" '+(a.f?'onclick="('+a.f.toString()+')()"':'')+'><div style="font-weight:700;letter-spacing:0.3px;color:var(--'+(a.c==='r'?'rd':a.c==='a'?'am':a.c==='c'?'cy':'gn')+')">'+a.t+'</div><div style="font-size:8px;color:var(--dm);margin-top:1px">'+a.d+'</div></div>';

  R+='<div class="S" style="margin-top:8px">TIMELINE</div>';
  const ms=[{d:'2026-03-09',l:'1ST CONTAINER',c:'var(--gn)'},{d:'2026-03-16',l:'1ST LP TRUCK',c:'var(--gn)'},{d:'2026-04-01',l:'USA START',c:'var(--cy)'},{d:'2026-04-03',l:'1ST LM TRUCK',c:'var(--cy)'},{d:'2026-04-15',l:'1ST BUMP-IN',c:'var(--am)'},{d:'2026-04-29',l:'LAST LP',c:'var(--gn)'},{d:'2026-06-09',l:'LAST LM',c:'var(--cy)'},{d:'2026-06-11',l:'★ KICKOFF',c:'var(--am)'}];
  for(const m of ms){const n=dN(m.d);R+='<div class="TL'+(n<0?' TL-p':'')+'"><div class="TL-d">'+fD(m.d)+'</div><div class="TL-o" style="background:'+m.c+'"></div><div class="TL-t">'+m.l+(n>=0?' <span class="B Bc">'+dL(m.d)+'</span>':'')+'</div></div>'}

  R+='<div style="margin-top:8px;padding-top:4px;border-top:1px solid var(--bd);font-size:7px;color:var(--dm);text-align:center;letter-spacing:1px">'+now.toLocaleTimeString()+' · ML3K LIVE</div>';
  document.getElementById('R').innerHTML=R;
}

setInterval(()=>{const n=new Date();document.getElementById('ck').textContent=n.toLocaleTimeString('en-US',{hour12:false});const d=Math.ceil((new Date('2026-06-11')-n)/864e5);document.getElementById('ko').textContent='T-'+d},1000);
gen();
</script>
</body>
